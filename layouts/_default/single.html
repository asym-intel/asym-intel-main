{{ define "main" }}
<main class="single">
  <article class="post">
    <header class="post__header">
      <div class="post__meta">
        <span class="post__monitor">{{ .Section }}</span>
        <time class="post__date" datetime="{{ .Date.Format "2006-01-02" }}">
          {{ .Date.Format "2 January 2006" }}
        </time>
      </div>
      <h1 class="post__title">{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="post__summary">{{ . }}</p>
      {{ end }}
    </header>

    <div class="post__body">
      {{ .Content }}
    </div>

    <footer class="post__footer">
      <a class="post__back" href="{{ .Section | relURL }}">← All {{ .Section }} briefings</a>
    </footer>
  </article>
</main>
{{ end }}
