{{/*
  site-header.html  — Blueprint v2.1
  White bar below network bar. About (plain link) + Search (plain link) + Subscribe (button).
  No hamburger — About and Search are always visible.
*/}}
<nav class="site-nav" aria-label="Site navigation">
  <div class="site-nav__spacer"></div>

  <ul class="site-nav__links" role="list">
    <li><a href="/about/"{{ if eq .RelPermalink "/about/" }} class="active"{{ end }}>About</a></li>
    <li><a href="/search/"{{ if hasPrefix .RelPermalink "/search" }} class="active"{{ end }}>Search</a></li>
  </ul>

  <div class="site-nav__actions">
    <a class="site-nav__subscribe" href="/subscribe/">Subscribe</a>
  </div>
</nav>
