<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Health — Asymmetric Intelligence</title>
<script src="../monitors/shared/js/theme.js"></script>
<script src="../monitors/shared/js/nav.js"></script>
<script src="../monitors/shared/js/monitor-urls.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --surface: #161b22;
    --surface-2: #1f2630;
    --border: #2a3340;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #61a5d2;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --neutral: #6b7280;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  body { padding-top: 40px; }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  header.page {
    text-align: center;
    margin-bottom: 2rem;
  }
  header.page h1 {
    margin: 0 0 0.4rem 0;
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header.page .sub {
    color: var(--text-muted);
    font-size: 0.95rem;
  }
  .last-updated {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    margin-top: 0.6rem;
  }
  .engine-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.75rem;
    margin: 1.5rem 0 2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }
  .engine-banner .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }
  .engine-banner .name {
    font-size: 1.15rem;
    font-weight: 600;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.95rem;
    text-transform: capitalize;
    border: 1px solid transparent;
  }
  .status-pill .dot {
    width: 0.65rem;
    height: 0.65rem;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
  }
  .status-pill.green  { color: var(--green);   background: rgba(34,197,94,0.10);  border-color: rgba(34,197,94,0.30); }
  .status-pill.amber  { color: var(--amber);   background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.30); }
  .status-pill.red    { color: var(--red);     background: rgba(239,68,68,0.10);  border-color: rgba(239,68,68,0.30); }
  .status-pill.neutral{ color: var(--neutral); background: rgba(107,114,128,0.10); border-color: rgba(107,114,128,0.30); }
  .status-pill.large {
    font-size: 1.05rem;
    padding: 0.6rem 1.25rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.9rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    min-height: 130px;
    text-decoration: none;
    color: inherit;
    transition: border-color 120ms ease, transform 120ms ease;
  }
  a.card:hover { border-color: var(--text-muted); transform: translateY(-1px); }
  a.card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card .head {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .card .icon {
    width: 32px;
    height: 32px;
    flex: 0 0 32px;
  }
  .card .icon img { width: 100%; height: 100%; display: block; }
  .card .titles { display: flex; flex-direction: column; min-width: 0; }
  .card .name {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.005em;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .slug {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 0.1rem;
  }
  .card .since {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-top: auto;
  }
  footer.page {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
  }
  footer.page a { color: var(--text-muted); text-decoration: underline; }
  footer.page a:hover { color: var(--text); }
  .err {
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.30);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<main>
  <header class="page">
    <h1>Pipeline Health</h1>
    <div class="sub">Asymmetric Intelligence</div>
    <div class="last-updated" id="updated"></div>
  </header>

  <section class="engine-banner" aria-label="Engine status">
    <div>
      <div class="label">Engine</div>
      <div class="name">Asymmetric Intelligence</div>
    </div>
    <span id="engine-pill" class="status-pill neutral large" aria-live="polite">
      <span class="dot"></span><span class="text">loading</span>
    </span>
  </section>

  <section aria-label="Monitor status">
    <div id="monitors" class="grid"></div>
    <div id="err" class="err" hidden></div>
  </section>

  <footer class="page">
    <a href="/">asym-intel.info</a>
    &nbsp;·&nbsp;
    Operational details are not publicly surfaced.
  </footer>
</main>

<script>
(function () {
  const STATUS_URL = 'pipeline-status.json';

  function relTime(iso) {
    if (!iso) return 'no data yet';
    const t = Date.parse(iso);
    if (isNaN(t)) return 'unknown';
    const diff = Date.now() - t;
    const m = Math.floor(diff / 60000);
    if (m < 1)    return 'just now';
    if (m < 60)   return m + ' min ago';
    const h = Math.floor(m / 60);
    if (h < 24)   return h + ' h ago';
    const d = Math.floor(h / 24);
    if (d < 14)   return d + ' day' + (d === 1 ? '' : 's') + ' ago';
    const w = Math.floor(d / 7);
    return w + ' week' + (w === 1 ? '' : 's') + ' ago';
  }

  function classFor(status) {
    if (status === 'green' || status === 'amber' || status === 'red') return status;
    return 'neutral';
  }

  // ENGINE-RULES §17: monitor URLs and icon paths come from the registry
  // resolver (window.MonitorRegistry from monitor-urls.js), never from
  // string concatenation. The pipeline-status.json `slug` field is the
  // monitor abbreviation (e.g. "WDM", "AIM"); look it up via byAbbrSafe()
  // so an unknown abbr renders as an inert chip without crashing.
  function resolveMonitor(abbr) {
    if (!window.MonitorRegistry) return null;
    try { return window.MonitorRegistry.byAbbrSafe(abbr); } catch (e) { return null; }
  }

  function render(data) {
    const updated = document.getElementById('updated');
    if (data.generated_at) {
      updated.textContent = 'Updated ' + relTime(data.generated_at);
    }

    const enginePill = document.getElementById('engine-pill');
    const engine = data.engine || {};
    enginePill.className = 'status-pill ' + classFor(engine.status) + ' large';
    enginePill.querySelector('.text').textContent = engine.status || 'unknown';

    const monitorsEl = document.getElementById('monitors');
    monitorsEl.innerHTML = '';
    (data.monitors || []).forEach(function (m) {
      const meta = resolveMonitor(m.slug);

      // Wrap the card as a link to the monitor page when registry knows it;
      // otherwise render an inert div so unknown monitors still surface.
      const card = document.createElement(meta ? 'a' : 'div');
      card.className = 'card';
      if (meta) {
        card.href = meta.url;
        card.setAttribute('aria-label', meta.name + ' — status ' + (m.status || 'unknown'));
      }

      const head = document.createElement('div');
      head.className = 'head';

      const iconWrap = document.createElement('span');
      iconWrap.className = 'icon';
      if (meta && meta.svg_url) {
        const img = document.createElement('img');
        img.src = meta.svg_url;
        img.alt = '';
        img.loading = 'lazy';
        iconWrap.appendChild(img);
      }
      head.appendChild(iconWrap);

      const titles = document.createElement('div');
      titles.className = 'titles';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = meta ? meta.name : m.slug;
      titles.appendChild(name);
      const slug = document.createElement('div');
      slug.className = 'slug';
      slug.textContent = m.slug;
      titles.appendChild(slug);
      head.appendChild(titles);

      card.appendChild(head);

      const pill = document.createElement('span');
      pill.className = 'status-pill ' + classFor(m.status);
      const dot = document.createElement('span');
      dot.className = 'dot';
      pill.appendChild(dot);
      const txt = document.createElement('span');
      txt.className = 'text';
      txt.textContent = m.status || 'unknown';
      pill.appendChild(txt);
      card.appendChild(pill);

      const since = document.createElement('div');
      since.className = 'since';
      since.textContent = m.last_updated ? ('Last activity ' + relTime(m.last_updated)) : 'No recent activity';
      card.appendChild(since);

      monitorsEl.appendChild(card);
    });
  }

  function showError(msg) {
    const err = document.getElementById('err');
    err.hidden = false;
    err.textContent = msg;
  }

  // Load the registry alongside pipeline-status. On registry-load failure,
  // we still render with raw slugs (no links, no icons) so the page degrades
  // gracefully rather than crashing.
  Promise.all([
    window.MonitorRegistry
      ? window.MonitorRegistry.load().catch(function (e) { console.warn('[pipeline] registry load failed', e); return null; })
      : Promise.resolve(null),
    fetch(STATUS_URL, { cache: 'no-store' }).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
  ])
    .then(function (results) { render(results[1]); })
    .catch(function (e) {
      showError('Status data is temporarily unavailable.');
      const ep = document.getElementById('engine-pill');
      ep.className = 'status-pill neutral large';
      ep.querySelector('.text').textContent = 'unknown';
    });
})();
</script>
</body>
</html>
