<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Health — Asymmetric Intelligence</title>
<script src="../monitors/shared/js/theme.js"></script>
<script src="../monitors/shared/js/nav.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --surface: #161b22;
    --surface-2: #1f2630;
    --border: #2a3340;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #61a5d2;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --neutral: #6b7280;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  body { padding-top: 40px; }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  header.page {
    text-align: center;
    margin-bottom: 2rem;
  }
  header.page h1 {
    margin: 0 0 0.4rem 0;
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header.page .sub {
    color: var(--text-muted);
    font-size: 0.95rem;
  }
  .last-updated {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    margin-top: 0.6rem;
  }
  .engine-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 1.75rem;
    margin: 1.5rem 0 2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }
  .engine-banner .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }
  .engine-banner .name {
    font-size: 1.15rem;
    font-weight: 600;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.95rem;
    text-transform: capitalize;
    border: 1px solid transparent;
  }
  .status-pill .dot {
    width: 0.65rem;
    height: 0.65rem;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
  }
  .status-pill.green  { color: var(--green);   background: rgba(34,197,94,0.10);  border-color: rgba(34,197,94,0.30); }
  .status-pill.amber  { color: var(--amber);   background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.30); }
  .status-pill.red    { color: var(--red);     background: rgba(239,68,68,0.10);  border-color: rgba(239,68,68,0.30); }
  .status-pill.neutral{ color: var(--neutral); background: rgba(107,114,128,0.10); border-color: rgba(107,114,128,0.30); }
  .status-pill.large {
    font-size: 1.05rem;
    padding: 0.6rem 1.25rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.9rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    min-height: 110px;
  }
  .card .slug {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .card .since {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-top: auto;
  }
  footer.page {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
  }
  footer.page a { color: var(--text-muted); text-decoration: underline; }
  footer.page a:hover { color: var(--text); }
  .err {
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.30);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<main>
  <header class="page">
    <h1>Pipeline Health</h1>
    <div class="sub">Asymmetric Intelligence</div>
    <div class="last-updated" id="updated"></div>
  </header>

  <section class="engine-banner" aria-label="Engine status">
    <div>
      <div class="label">Engine</div>
      <div class="name">Asymmetric Intelligence</div>
    </div>
    <span id="engine-pill" class="status-pill neutral large" aria-live="polite">
      <span class="dot"></span><span class="text">loading</span>
    </span>
  </section>

  <section aria-label="Monitor status">
    <div id="monitors" class="grid"></div>
    <div id="err" class="err" hidden></div>
  </section>

  <footer class="page">
    <a href="/">asym-intel.info</a>
    &nbsp;·&nbsp;
    Operational details are not publicly surfaced.
  </footer>
</main>

<script>
(function () {
  const STATUS_URL = 'pipeline-status.json';

  function relTime(iso) {
    if (!iso) return 'no data yet';
    const t = Date.parse(iso);
    if (isNaN(t)) return 'unknown';
    const diff = Date.now() - t;
    const m = Math.floor(diff / 60000);
    if (m < 1)    return 'just now';
    if (m < 60)   return m + ' min ago';
    const h = Math.floor(m / 60);
    if (h < 24)   return h + ' h ago';
    const d = Math.floor(h / 24);
    if (d < 14)   return d + ' day' + (d === 1 ? '' : 's') + ' ago';
    const w = Math.floor(d / 7);
    return w + ' week' + (w === 1 ? '' : 's') + ' ago';
  }

  function classFor(status) {
    if (status === 'green' || status === 'amber' || status === 'red') return status;
    return 'neutral';
  }

  function render(data) {
    const updated = document.getElementById('updated');
    if (data.generated_at) {
      updated.textContent = 'Updated ' + relTime(data.generated_at);
    }

    const enginePill = document.getElementById('engine-pill');
    const engine = data.engine || {};
    enginePill.className = 'status-pill ' + classFor(engine.status) + ' large';
    enginePill.querySelector('.text').textContent = engine.status || 'unknown';

    const monitorsEl = document.getElementById('monitors');
    monitorsEl.innerHTML = '';
    (data.monitors || []).forEach(function (m) {
      const card = document.createElement('div');
      card.className = 'card';

      const slug = document.createElement('div');
      slug.className = 'slug';
      slug.textContent = m.slug;
      card.appendChild(slug);

      const pill = document.createElement('span');
      pill.className = 'status-pill ' + classFor(m.status);
      const dot = document.createElement('span');
      dot.className = 'dot';
      pill.appendChild(dot);
      const txt = document.createElement('span');
      txt.className = 'text';
      txt.textContent = m.status || 'unknown';
      pill.appendChild(txt);
      card.appendChild(pill);

      const since = document.createElement('div');
      since.className = 'since';
      since.textContent = m.last_updated ? ('Last activity ' + relTime(m.last_updated)) : 'No recent activity';
      card.appendChild(since);

      monitorsEl.appendChild(card);
    });
  }

  function showError(msg) {
    const err = document.getElementById('err');
    err.hidden = false;
    err.textContent = msg;
  }

  fetch(STATUS_URL, { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(render)
    .catch(function (e) {
      showError('Status data is temporarily unavailable.');
      const ep = document.getElementById('engine-pill');
      ep.className = 'status-pill neutral large';
      ep.querySelector('.text').textContent = 'unknown';
    });
})();
</script>
</body>
</html>
