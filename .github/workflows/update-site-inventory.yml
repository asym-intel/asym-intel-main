name: "Update Site Inventory"

on:
  schedule:
    - cron: "0 7 * * 1"    # Monday 07:00 UTC
  workflow_dispatch:

jobs:
  update-inventory:
    name: Regenerate site-inventory.md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate inventory
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          {
            echo "# Site Inventory — asym-intel.info"
            echo "<!-- Auto-generated by update-site-inventory.yml — do not edit manually -->"
            echo "<!-- Last updated: $NOW -->"
            echo ""

            echo "## Monitor Pages (static/monitors/)"
            echo ""
            echo "| Monitor | File | Size |"
            echo "|---|---|---|"
            find static/monitors -name "*.html" -o -name "*.css" -o -name "*.js" | sort | while read f; do
              [ -f "$f" ] || continue
              size=$(wc -c < "$f")
              monitor=$(echo "$f" | cut -d/ -f3)
              echo "| ${monitor} | ${f} | ${size}B |"
            done

            echo ""
            echo "## Shared Library (static/monitors/shared/)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            find static/monitors/shared -type f | sort | while read f; do
              size=$(wc -c < "$f")
              echo "| ${f} | ${size}B |"
            done

            echo ""
            echo "## Hugo Layouts (layouts/)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            find layouts -type f | sort | while read f; do
              size=$(wc -c < "$f")
              echo "| ${f} | ${size}B |"
            done

            echo ""
            echo "## Hugo Assets (assets/)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            find assets -type f | sort | while read f; do
              size=$(wc -c < "$f")
              echo "| ${f} | ${size}B |"
            done

            echo ""
            echo "## Pipeline — Monitor Scripts (pipeline/monitors/)"
            echo ""
            echo "| Monitor | File | Size |"
            echo "|---|---|---|"
            find pipeline/monitors -name "*.py" -o -name "*.txt" | sort | while read f; do
              [ -f "$f" ] || continue
              size=$(wc -c < "$f")
              monitor=$(echo "$f" | cut -d/ -f3)
              echo "| ${monitor} | ${f} | ${size}B |"
            done

            echo ""
            echo "## Pipeline — Synthesisers (pipeline/synthesisers/)"
            echo ""
            echo "| Monitor | File | Size |"
            echo "|---|---|---|"
            find pipeline/synthesisers -name "*.py" -o -name "*.txt" | sort | while read f; do
              [ -f "$f" ] || continue
              size=$(wc -c < "$f")
              monitor=$(echo "$f" | cut -d/ -f3)
              echo "| ${monitor} | ${f} | ${size}B |"
            done

            echo ""
            echo "## Pipeline — Shared Library (pipeline/shared/ + pipeline/publishers/)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            find pipeline/shared pipeline/publishers pipeline/chatter -name "*.py" -o -name "*.txt" 2>/dev/null | sort | while read f; do
              [ -f "$f" ] || continue
              size=$(wc -c < "$f")
              echo "| ${f} | ${size}B |"
            done

            echo ""
            echo "## Tools (tools/)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            find tools -type f | sort | while read f; do
              size=$(wc -c < "$f")
              echo "| ${f} | ${size}B |"
            done

            echo ""
            echo "## Data Files (static/monitors/*/data/)"
            echo ""
            echo "| Monitor | File | Size |"
            echo "|---|---|---|"
            find static/monitors -path "*/data/*.json" | sort | while read f; do
              size=$(wc -c < "$f")
              monitor=$(echo "$f" | cut -d/ -f3)
              echo "| ${monitor} | $(basename ${f}) | ${size}B |"
            done

            echo ""
            echo "## GitHub Actions Workflows (.github/workflows/)"
            echo ""
            echo "| Workflow | Size |"
            echo "|---|---|"
            find .github/workflows -name "*.yml" | sort | while read f; do
              size=$(wc -c < "$f")
              echo "| $(basename ${f}) | ${size}B |"
            done

            echo ""
            echo "## Summary"
            echo ""
            TOTAL_HTML=$(find static/monitors -name "*.html" | wc -l)
            TOTAL_JSON=$(find static/monitors -path "*/data/*.json" | wc -l)
            TOTAL_WF=$(find .github/workflows -name "*.yml" | wc -l)
            TOTAL_PY=$(find pipeline -name "*.py" | wc -l)
            TOTAL_TOOLS=$(find tools -name "*.py" | wc -l)
            echo "- Monitor HTML pages: ${TOTAL_HTML}"
            echo "- Data JSON files: ${TOTAL_JSON}"
            echo "- Pipeline Python scripts: ${TOTAL_PY}"
            echo "- Tool scripts: ${TOTAL_TOOLS}"
            echo "- GitHub Actions workflows: ${TOTAL_WF}"
            echo "- Generated: ${NOW}"

          } > site-inventory.md

          echo "Generated site-inventory.md ($(wc -l < site-inventory.md) lines)"

      - name: Commit to internal repo
        run: |
          ENCODED=$(base64 -w0 site-inventory.md)
          SHA=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/site-inventory.md \
            --jq '.sha' 2>/dev/null || echo "")
          ARGS=(-f "message=ops: auto-update site-inventory.md ($(date -u '+%Y-%m-%d'))" \
                -f "content=$ENCODED" -f "branch=main")
          [ -n "$SHA" ] && ARGS+=(-f "sha=$SHA")
          gh api --method PUT /repos/asym-intel/asym-intel-internal/contents/ops/site-inventory.md \
            "${ARGS[@]}" --silent
          echo "Committed to asym-intel-internal"
