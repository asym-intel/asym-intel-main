name: "Update Site Inventory"

on:
  schedule:
    - cron: "0 7 * * 1"    # Monday 07:00 UTC (before Housekeeping cron)
  workflow_dispatch:

jobs:
  update-inventory:
    name: Regenerate site-inventory.md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate inventory
        run: |
          cat > site-inventory.md << 'HEADER'
          # Site Inventory — asym-intel.info
          <!-- Auto-generated by update-site-inventory.yml — do not edit manually -->
          <!-- Last updated: $(date -u '+%Y-%m-%d %H:%M UTC') -->

          ## Monitor Pages (static/monitors/)

          HEADER

          echo "| Monitor | File | Size |" >> site-inventory.md
          echo "|---|---|---|" >> site-inventory.md
          for f in $(find static/monitors -name "*.html" -o -name "*.css" -o -name "*.js" | sort); do
            size=$(wc -c < "$f")
            monitor=$(echo "$f" | cut -d/ -f3)
            echo "| ${monitor} | ${f} | ${size} bytes |" >> site-inventory.md
          done

          echo "" >> site-inventory.md
          echo "## Shared Library (static/monitors/shared/)" >> site-inventory.md
          echo "" >> site-inventory.md
          echo "| File | Size |" >> site-inventory.md
          echo "|---|---|" >> site-inventory.md
          for f in $(find static/monitors/shared -type f | sort); do
            size=$(wc -c < "$f")
            echo "| ${f} | ${size} bytes |" >> site-inventory.md
          done

          echo "" >> site-inventory.md
          echo "## Hugo Layouts (layouts/)" >> site-inventory.md
          echo "" >> site-inventory.md
          echo "| File | Size |" >> site-inventory.md
          echo "|---|---|" >> site-inventory.md
          for f in $(find layouts -type f | sort); do
            size=$(wc -c < "$f")
            echo "| ${f} | ${size} bytes |" >> site-inventory.md
          done

          echo "" >> site-inventory.md
          echo "## Data Files (static/monitors/*/data/)" >> site-inventory.md
          echo "" >> site-inventory.md
          echo "| Monitor | File | Size |" >> site-inventory.md
          echo "|---|---|---|" >> site-inventory.md
          for f in $(find static/monitors -path "*/data/*.json" | sort); do
            size=$(wc -c < "$f")
            monitor=$(echo "$f" | cut -d/ -f3)
            echo "| ${monitor} | $(basename ${f}) | ${size} bytes |" >> site-inventory.md
          done

          echo "" >> site-inventory.md
          echo "## GitHub Actions Workflows (.github/workflows/)" >> site-inventory.md
          echo "" >> site-inventory.md
          echo "| Workflow | Size |" >> site-inventory.md
          echo "|---|---|" >> site-inventory.md
          for f in $(find .github/workflows -name "*.yml" | sort); do
            size=$(wc -c < "$f")
            echo "| $(basename ${f}) | ${size} bytes |" >> site-inventory.md
          done

          echo "" >> site-inventory.md
          TOTAL_HTML=$(find static/monitors -name "*.html" | wc -l)
          TOTAL_JSON=$(find static/monitors -path "*/data/*.json" | wc -l)
          TOTAL_WF=$(find .github/workflows -name "*.yml" | wc -l)
          echo "## Summary" >> site-inventory.md
          echo "" >> site-inventory.md
          echo "- Monitor HTML pages: ${TOTAL_HTML}" >> site-inventory.md
          echo "- Data JSON files: ${TOTAL_JSON}" >> site-inventory.md
          echo "- GitHub Actions workflows: ${TOTAL_WF}" >> site-inventory.md

          echo "Generated site-inventory.md ($(wc -l < site-inventory.md) lines)"

      - name: Commit to internal repo
        run: |
          # Encode content
          ENCODED=$(base64 -w0 site-inventory.md)

          # Get current SHA (if file exists)
          SHA=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/site-inventory.md \
            --jq '.sha' 2>/dev/null || echo "")

          # Commit
          if [ -n "$SHA" ]; then
            gh api --method PUT /repos/asym-intel/asym-intel-internal/contents/ops/site-inventory.md \
              -f message="ops: auto-update site-inventory.md ($(date -u '+%Y-%m-%d'))" \
              -f content="$ENCODED" \
              -f sha="$SHA" \
              -f branch="main" \
              --silent
          else
            gh api --method PUT /repos/asym-intel/asym-intel-internal/contents/ops/site-inventory.md \
              -f message="ops: auto-update site-inventory.md ($(date -u '+%Y-%m-%d'))" \
              -f content="$ENCODED" \
              -f branch="main" \
              --silent
          fi
          echo "Committed to asym-intel-internal"
