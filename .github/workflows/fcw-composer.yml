name: "FIMI & Cognitive Warfare Monitor Composer"

# ── Sprint AM (AD-2026-04-26-AM) — FCW Composer role ──
# Chained after FCW Reviewer success. Reads interpret-latest.json +
# review-latest.json and composes a grounded weekly brief draft
# (no new claims; claim_trace[] tied to interpreter claim IDs).
#
# Reviewer verdict handling:
#   APPROVE / APPROVE_WITH_FLAGS / SKIP_NULL_CYCLE → normal render.
#   REJECT / SKIP_ERROR_CYCLE                     → skip (publisher fallback).
#
# No cron schedule — workflow_dispatch only at Sprint AM merge time.
# No ANTHROPIC_API_KEY — stays on Sonar per D1 §7.1.
# Chain-depth reset: Composer triggers Applier via explicit gh workflow run
# (GitHub limits workflow_run chains to 3 levels deep; mirrors AGM pattern).
#
# Topology mirrors AGM composer.yml (Sprint 3 Step 1, AD-2026-04-26-AM).
# Paired with asym-intel-internal:pipeline/monitors/fimi-cognitive-warfare/
# cascade-trio artefacts wired in Sprint AM (AD-2026-04-26-AM).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override composer model (default: sonar-pro)'
        required: false
        default: ''
  workflow_run:
    workflows: ["FIMI & Cognitive Warfare Monitor Reviewer"]
    types:
      - completed

jobs:
  compose:
    # Gate: only run if the upstream reviewer workflow actually succeeded.
    # workflow_dispatch runs always pass this guard.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/fimi-cognitive-warfare
          sparse-checkout-cone-mode: false

      - name: Fetch FCW identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/identity

          # Identity card (analytical quality standard — shared across roles)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-FCW.md" \
            -o docs/identity/fcw-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/fcw-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/fimi-cognitive-warfare
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/metadata.yml          pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/composer-prompt.txt   pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/composer-schema.json  pipeline/monitors/fimi-cognitive-warfare/

      - name: Check interpreter disposition + reviewer verdict
        id: disposition
        run: |
          INTERPRET_PATH="pipeline/monitors/fimi-cognitive-warfare/synthesised/interpret-latest.json"
          REVIEW_PATH="pipeline/monitors/fimi-cognitive-warfare/synthesised/review-latest.json"

          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"       >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Composer."
            exit 0
          fi
          DISPOSITION=$(python -c "import json; d=json.load(open('$INTERPRET_PATH')); print((d.get('_meta') or {}).get('cycle_disposition',''))")
          echo "disposition=$DISPOSITION"
          if [ "$DISPOSITION" = "error_cycle" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=error_cycle" >> "$GITHUB_OUTPUT"
            echo "Interpreter reported error_cycle — skipping Composer."
            exit 0
          fi

          if [ -f "$REVIEW_PATH" ]; then
            VERDICT=$(python -c "import json; d=json.load(open('$REVIEW_PATH')); print(d.get('verdict',''))")
            echo "verdict=$VERDICT"
            if [ "$VERDICT" = "REJECT" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=reviewer_reject" >> "$GITHUB_OUTPUT"
              echo "Reviewer verdict=REJECT — skipping Composer."
              exit 0
            fi
            if [ "$VERDICT" = "SKIP_ERROR_CYCLE" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=reviewer_skip_error_cycle" >> "$GITHUB_OUTPUT"
              echo "Reviewer verdict=SKIP_ERROR_CYCLE — skipping Composer."
              exit 0
            fi
          else
            echo "verdict=(no review-latest.json; proceeding on Interpreter disposition alone)"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "reason=ok"  >> "$GITHUB_OUTPUT"

      - name: Run FCW composer (engine dispatch)
        if: steps.disposition.outputs.skip != 'true'
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:     ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:    ${{ github.workspace }}
          SYNTH_MODEL:  ${{ github.event.inputs.model }}
          monitor:      fimi-cognitive-warfare
          PYTHONPATH:   internal
        run: python -m pipeline.engine.compose_base --monitor fimi-cognitive-warfare

      - name: Commit compose output
        if: steps.disposition.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/fimi-cognitive-warfare/synthesised/
          git diff --cached --quiet || git commit -m "chore(fcw): composer run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done

      # Chain-depth reset: GitHub limits workflow_run chains to 3 levels deep.
      # Cron path: fcw-reasoner [dispatch] → Interpreter [wf_run-1] →
      # Reviewer [wf_run-2] → Composer [wf_run-3 — LIMIT].
      # A wf_run trigger on Applier would be a 4th level and silently never fire.
      # Composer triggers Applier via explicit gh workflow run (chain-depth reset),
      # enabling Applier→Curator [wf_run-1] to complete. Mirrors AGM pattern.
      - name: Trigger Applier (chain-depth reset)
        if: steps.disposition.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          gh workflow run fcw-applier.yml \
            --repo ${{ github.repository }} \
            --ref main
