name: Staging deploy

on:
  push:
    branches:
      - staging
    paths-ignore:
      - '.github/workflows/**'
      - 'publishing-workflow.md'
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to staging.asym-intel.info
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build with staging base URL
        run: |
          hugo --minify --buildFuture --baseURL "https://staging.asym-intel.info/" --destination staging_build

      - name: Fix CNAME for staging domain
        run: |
          echo "staging.asym-intel.info" > staging_build/CNAME

      - name: Deploy to asym-intel/asym-intel-staging
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          external_repository: asym-intel/asym-intel-staging
          publish_dir: ./staging_build
          publish_branch: main
          commit_message: "staging deploy from ${{ github.sha }}"
