name: FCW Chatter — Daily Signal

on:
  workflow_dispatch:  # Schedule DISABLED 13 Apr 2026 — replaced by unified-chatter.yml

jobs:
  chatter:
    name: FCW Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run FCW Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/fimi-cognitive-warfare/fcw-chatter.py
      - name: Commit chatter output
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          commit-message: "data(fcw-chatter): daily signal — $(date -u +%Y-%m-%d)"
          add-paths: "static/monitors/fimi-cognitive-warfare/data/chatter*.json"
          bot-name: "FCW Chatter Bot"
          bot-email: "chatter@asym-intel.info"
