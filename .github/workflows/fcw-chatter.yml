name: FCW Chatter — Daily Signal

on:
  schedule:
    - cron: "0 6 * * 1,3,5"   # Mon/Wed/Fri 06:00 UTC (efficiency 2026-04-03)
  workflow_dispatch:

jobs:
  chatter:
    name: FCW Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run FCW Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/fimi-cognitive-warfare/fcw-chatter.py
      - name: Commit chatter output
        run: |
          git config user.name "FCW Chatter Bot"
          git config user.email "chatter@asym-intel.info"
          git add static/monitors/fimi-cognitive-warfare/data/chatter*.json
          git diff --staged --quiet && echo "No chatter output to commit" && exit 0
          git commit -m "data(fcw-chatter): daily signal — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
