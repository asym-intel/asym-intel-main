name: TEST — SCEM Daily Collector Sample

on:
  workflow_dispatch:

jobs:
  test:
    name: SCEM Daily sonar test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run SCEM daily test
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/conflict-escalation/daily/scem-daily-test.py
      - name: Commit test output
        run: |
          git config user.name "Test Bot"
          git config user.email "test@asym-intel.info"
          git add pipeline/monitors/conflict-escalation/daily/
          git diff --staged --quiet && echo "No output" && exit 0
          git commit -m "test(scem): daily sonar sample output"
          git pull --rebase --autostash origin main
          git push
