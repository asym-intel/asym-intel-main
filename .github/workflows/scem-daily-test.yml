name: TEST — SCEM Daily Collector Sample

on:
  workflow_dispatch:

jobs:
  test:
    name: SCEM Daily sonar test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run SCEM daily test
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/conflict-escalation/daily/scem-daily-test.py
      - name: Commit test output
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          commit-message: "test(scem): daily sonar sample output"
          add-paths: "pipeline/monitors/conflict-escalation/daily/"
          bot-name: "Test Bot"
          bot-email: "test@asym-intel.info"
