name: "Global Macro Monitor Synthesiser"

on:
  # Uncomment after first manual test passes:
  # schedule:
  #   - cron: "0 20 * * 1"  # Monday 20:00 UTC (before Global Macro Monitor Analyst Tuesday 08:00 UTC)
  workflow_dispatch:

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GMM prompt from internal repo
        env:
          INTERNAL_REPO_PAT: ${{ secrets.INTERNAL_REPO_PAT }}
        run: |
          curl -sf -H "Authorization: token ${INTERNAL_REPO_PAT}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/gmm-prompts/macro-monitor-synthesiser-api-prompt.txt" \
            -o pipeline/synthesisers/gmm/macro-monitor-synthesiser-api-prompt.txt
          echo "GMM prompt fetched ($(wc -c < pipeline/synthesisers/gmm/macro-monitor-synthesiser-api-prompt.txt) bytes)"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run GMM synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          python pipeline/synthesisers/gmm/macro-monitor-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/macro-monitor/synthesised/
          git diff --cached --quiet || git commit -m "chore(gmm): synthesiser run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
