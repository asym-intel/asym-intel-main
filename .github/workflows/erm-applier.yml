name: "Environmental Risks Monitor Applier"

# ── Sprint AM — ERM Applier role ──
# workflow_dispatch only at Sprint AM merge time per AD-2026-04-26-AM
# §"What this AD does NOT do" item 6.
#
# Mirrors AGM applier workflow structure verbatim (AD-2026-04-26-AM).
# LLM-FREE — deterministic stitching only (design E6). No PPLX_API_KEY
# needed. No prompt/schema staging. Replay-safe given the same three
# input SHAs + today's date.
#
# Entry: Composer triggers this via `gh workflow run` (chain-depth reset,
# mirrors AGM applier 2026-04-26 amendment). Applier→Curator wf_run hop
# remains valid (depth 0 → 1).

on:
  workflow_dispatch: {}

jobs:
  apply:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      monitor: environmental-risks

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/environmental-risks
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/environmental-risks
          cp -v internal/pipeline/monitors/environmental-risks/metadata.yml \
                pipeline/monitors/environmental-risks/

      # Skip-on-missing guard. All three upstream artefacts are required.
      - name: Check upstream artefacts
        id: check
        run: |
          I="pipeline/monitors/environmental-risks/synthesised/interpret-latest.json"
          R="pipeline/monitors/environmental-risks/synthesised/review-latest.json"
          C="pipeline/monitors/environmental-risks/synthesised/compose-latest.json"
          MISSING=""
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          [ -f "$R" ] || MISSING="${MISSING} review-latest"
          [ -f "$C" ] || MISSING="${MISSING} compose-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Applier."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run ERM applier (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:        ${{ github.workspace }}
          PYTHONPATH:       internal
          INTERPRET_RUN_ID: ${{ github.event.workflow_run.id }}
          REVIEW_RUN_ID:    ${{ github.event.workflow_run.id }}
          COMPOSE_RUN_ID:   ${{ github.event.workflow_run.id }}
        run: python -m pipeline.engine.apply_base --monitor environmental-risks

      - name: Commit applier output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          rm -f pipeline/monitors/environmental-risks/applied/apply-debug-*.json
          git add pipeline/monitors/environmental-risks/applied/
          git diff --cached --quiet || git commit -m "chore(erm): applier run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
