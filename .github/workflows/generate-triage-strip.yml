name: Generate Triage Strip (sonar-pro)

on:
  workflow_dispatch:    # triggered manually — Computer calls this via API

jobs:
  generate:
    name: Generate triage strip HTML draft
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run generation script
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/generate-triage-strip.py
