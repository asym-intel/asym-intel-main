name: Generate Sprint 1 Components (batched)

on:
  workflow_dispatch:    # triggered manually — Computer calls this via API

jobs:
  generate:
    name: Generate all Sprint 1 shared components
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run batched generation
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: python tools/generate-sprint1-batch.py
