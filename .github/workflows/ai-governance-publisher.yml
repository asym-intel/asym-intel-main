name: AIM Publisher — Weekly Report

on:
  # Schedule: Friday 09:00 UTC (after synthesiser completes)
  # DISABLED until validated — enable by uncommenting the schedule line
  schedule:
    - cron: "0 9 * * 5"    # Friday 09:00 UTC
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish AIM Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AIM Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: ai-governance
        run: python3 pipeline/publishers/publisher.py

      - name: Commit published report
        run: |
          git config user.name "AIM Publisher Bot"
          git config user.email "aim-publisher@asym-intel.info"
          git add static/monitors/ai-governance/data/
          git add docs/monitors/ai-governance/data/
          git add content/monitors/ai-governance/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(aim): Issue $(python3 -c 'import json; print(json.load(open(\"static/monitors/ai-governance/data/report-latest.json\"))[\"meta\"][\"issue\"])') published by AIM Publisher Bot [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
