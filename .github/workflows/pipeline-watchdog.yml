name: Pipeline Watchdog — Dispatch All Workflows

on:
  schedule:
    # Daily jobs: fire at 05:50 UTC (10 min before first chatter at 06:00)
    - cron: "50 5 * * *"
    # Weekly cascade: fire 10 min before each stage
    - cron: "50 7 * * *"
    # Reasoner at 08:30 — watchdog at 08:20
    - cron: "20 8 * * *"
    # Synthesiser at 09:00 — watchdog at 08:50
    - cron: "50 8 * * *"
    # Publisher at 09:30 — watchdog at 09:20
    - cron: "20 9 * * *"
    # Ramparts publisher at 10:00 Fri — watchdog at 09:50
    - cron: "50 9 * * 5"
  workflow_dispatch:

jobs:
  dispatch:
    name: Dispatch due workflows
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Dispatch workflows due now
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
          REPO="asym-intel/asym-intel-main"

          dispatch() {
            echo "Dispatching $1..."
            gh workflow run "$1" --repo "$REPO" 2>&1 || echo "  ⚠ Failed to dispatch $1"
          }

          # Map day-of-week to monitor for weekly cascade
          declare -A DAY_MONITOR
          DAY_MONITOR[1]="wdm"   # Monday
          DAY_MONITOR[2]="gmm"   # Tuesday
          DAY_MONITOR[3]="esa"   # Wednesday
          DAY_MONITOR[4]="fcw"   # Thursday
          DAY_MONITOR[5]="agm"   # Friday
          DAY_MONITOR[6]="erm"   # Saturday
          DAY_MONITOR[7]="scem"  # Sunday
          MON="${DAY_MONITOR[$DOW]}"

          # Publisher workflow names differ from the pattern
          declare -A PUBLISHER_WF
          PUBLISHER_WF[wdm]="democratic-integrity-publisher.yml"
          PUBLISHER_WF[gmm]="macro-monitor-publisher.yml"
          PUBLISHER_WF[esa]="european-strategic-autonomy-publisher.yml"
          PUBLISHER_WF[fcw]="fimi-cognitive-warfare-publisher.yml"
          PUBLISHER_WF[agm]="ai-governance-publisher.yml"
          PUBLISHER_WF[erm]="environmental-risks-publisher.yml"
          PUBLISHER_WF[scem]="conflict-escalation-publisher.yml"

          # Use HOUR:MIN window to determine which stage to dispatch
          SLOT="${HOUR}:${MIN}"
          echo "Watchdog firing at ${SLOT} UTC (DOW=$DOW, monitor=$MON)"

          case "$HOUR" in
            05)
              echo "=== Daily chatter + collector dispatch ==="
              for m in fcw gmm wdm scem esa agm erm; do
                dispatch "${m}-chatter.yml"
              done
              for m in wdm gmm esa fcw agm erm scem; do
                dispatch "${m}-collector.yml"
              done
              ;;
            07)
              echo "=== Weekly research: $MON ==="
              dispatch "${MON}-weekly-research.yml"
              ;;
            08)
              if [ "$MIN" -lt 30 ]; then
                echo "=== Weekly reasoner: $MON ==="
                dispatch "${MON}-reasoner.yml"
              else
                echo "=== Weekly synthesiser: $MON ==="
                dispatch "${MON}-synthesiser.yml"
              fi
              ;;
            09)
              if [ "$MIN" -lt 30 ]; then
                echo "=== Weekly publisher: $MON ==="
                dispatch "${PUBLISHER_WF[$MON]}"
              else
                echo "=== Ramparts publisher (Friday only) ==="
                dispatch "ramparts-publisher.yml"
              fi
              ;;
            *)
              echo "No workflows due at $SLOT"
              ;;
          esac

          echo "Done."
