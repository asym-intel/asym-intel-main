name: Update Pipeline Status

on:
  schedule:
    # Run 3 times daily: after morning pipeline (08:00), after evening cascades (23:00), and midday (14:00)
    - cron: "0 8 * * *"
    - cron: "0 14 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:    # allow manual trigger from Actions tab

jobs:
  update-status:
    name: Refresh pipeline-status.json + dashboard
    runs-on: ubuntu-latest
    permissions:
      actions: read     # read own workflow runs
      contents: write   # write to static/ops/ and docs/ops/
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}    # PAT for cross-repo write to asym-intel-internal

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run status updater
        run: python3 ops/update-pipeline-status.py

      - name: Copy dashboard to public site
        if: ${{ hashFiles('pipeline-dashboard.html') != '' }}
        run: |
          cp pipeline-dashboard.html static/ops/pipeline.html
          cp pipeline-dashboard.html docs/ops/pipeline.html

      - name: Deploy dashboard to public site
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          commit-message: "ops: auto-update pipeline dashboard ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
          add-paths: "static/ops/pipeline.html docs/ops/pipeline.html"
          bot-name: "github-actions[bot]"
          bot-email: "github-actions[bot]@users.noreply.github.com"
        if: ${{ hashFiles('pipeline-dashboard.html') != '' }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-status
          path: |
            pipeline-status.json
            pipeline-dashboard.html
          retention-days: 7

