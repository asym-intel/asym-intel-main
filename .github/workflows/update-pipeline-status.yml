name: Update Pipeline Status

on:
  schedule:
    # Run 3 times daily: after morning pipeline (08:00), after evening cascades (23:00), and midday (14:00)
    - cron: "0 8 * * *"
    - cron: "0 14 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:    # allow manual trigger from Actions tab

jobs:
  update-status:
    name: Refresh pipeline-status.json (internal full-fidelity + public roll-up)
    runs-on: ubuntu-latest
    permissions:
      actions: read     # read own workflow runs
      contents: write   # write to static/ops/pipeline-status.json
    env:
      GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}    # PAT for cross-repo write to asym-intel-internal

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        # Sprint BH BRIEF #2 (AD-2026-04-30-BJ): pyyaml required by the new
        # ops/_pipeline_triggers_loader.py helper. Without it the helper
        # degrades to manifest_loaded:false and the _trigger_health block
        # cannot be populated (acceptance #2 fails).
        run: pip install pyyaml

      - name: Run status updater
        # Writes internal full-fidelity to pipeline-status.json (ws root) and
        # commits to asym-intel-internal:ops/pipeline-status.json via PAT.
        # Writes public roll-up (schema v3.0) to static/ops/pipeline-status.json.
        # Writes internal dashboard to pipeline-dashboard.html (ws root) and
        # commits to asym-intel-internal:ops/pipeline-dashboard.html via PAT.
        # Sprint AZ BRIEF #1: no longer copies the internal dashboard onto
        # the public surface. Public surface is methodology-free.
        run: python3 ops/update-pipeline-status.py

      - name: Deploy public roll-up to asym-intel-main
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          commit-message: "ops: auto-update public pipeline-status.json ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
          add-paths: "static/ops/pipeline-status.json"
          bot-name: "github-actions[bot]"
          bot-email: "github-actions[bot]@users.noreply.github.com"
        if: ${{ hashFiles('static/ops/pipeline-status.json') != '' }}

      - name: Produce engine status (Sprint H Item 2)
        # Reads the public roll-up (just written) and writes the engine
        # summary to KV `engine:status:latest` on the advennt-admin Pages
        # project's ADMIN_PACKETS namespace. Consumed by /api/engine/status
        # on admin.advennt.io (EngineBanner, every page).
        # AD: asym-intel/asym-intel-internal docs/sprints/2026-04-30-H/AD-2026-04-30-BG.md
        # AD-2026-04-30-BP: STATUS_PATH points at the public roll-up (schema v4.0+)
        # so produce_engine_status.py reads `engine.status` and `monitors[].status`
        # from the canonical classifier's output (no in-script re-classification).
        if: ${{ hashFiles('static/ops/pipeline-status.json') != '' }}
        env:
          CF_API_TOKEN:    ${{ secrets.PPLX_COMPUTER_ASYM_ENGINE }}
          CF_ACCOUNT_ID:   d5ccaabd2ba0bc8fe65d44a98e43a8f8
          KV_NAMESPACE_ID: 6e59bb13ba75479690e94bf42e70e185
          STATUS_PATH:     static/ops/pipeline-status.json
        run: python3 ops/produce_engine_status.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-status
          path: |
            pipeline-status.json
            pipeline-dashboard.html
            static/ops/pipeline-status.json
          retention-days: 7
