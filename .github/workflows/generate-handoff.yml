name: "Generate HANDOFF.md"

on:
  schedule:
    - cron: "30 7 * * 1"    # Monday 07:30 UTC (after site-inventory, before Housekeeping)
    - cron: "0 23 * * *"    # Daily 23:00 UTC (catch end-of-day state)
  workflow_dispatch:

jobs:
  generate-handoff:
    name: Auto-generate HANDOFF.md from live state
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Generate HANDOFF.md
        run: |
          set -e

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Fetch pipeline-status.json from internal repo
          PIPELINE_STATUS=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/pipeline-status.json \
            --jq '.content' | base64 -d 2>/dev/null || echo '{}')

          # Fetch cron-schedule.md from internal repo
          CRON_SCHEDULE=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/cron-schedule.md \
            --jq '.content' | base64 -d 2>/dev/null || echo 'Not available')

          # Fetch notes-for-computer.md (last 30 lines = recent entries)
          NOTES=$(gh api /repos/asym-intel/asym-intel-internal/contents/notes-for-computer.md \
            --jq '.content' | base64 -d 2>/dev/null | tail -30 || echo 'Not available')

          # Get last 10 commits
          RECENT_COMMITS=$(gh api /repos/asym-intel/asym-intel-main/commits?per_page=10 \
            --jq '.[] | "- \(.commit.author.date | split("T")[0]) \(.commit.message | split("\n")[0])"' 2>/dev/null || echo 'Not available')

          # Get staging vs main status
          STAGING_STATUS=$(gh api /repos/asym-intel/asym-intel-main/compare/main...staging \
            --jq '"ahead: \(.ahead_by), behind: \(.behind_by)"' 2>/dev/null || echo 'unknown')

          # Extract publish dates from pipeline status
          PUBLISH_SUMMARY=$(echo "$PIPELINE_STATUS" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              for abbr in ['WDM','GMM','ESA','FCW','AIM','ERM','SCEM']:
                  if abbr in data:
                      pub = data[abbr].get('stations',{}).get('published',{})
                      last = pub.get('last_run','never')
                      status = pub.get('last_conclusion','unknown')
                      msg = pub.get('message','')
                      if last and last != 'never':
                          last = last[:10]
                      print(f'| {abbr} | {last} | {status} | {msg[:50]} |')
          except: pass
          " 2>/dev/null || echo '| - | - | - | - |')

          # Build HANDOFF.md
          cat > handoff.md << HANDOFF_EOF
          # HANDOFF.md — Asymmetric Intelligence Platform
          **Auto-generated:** ${NOW}
          **Source:** pipeline-status.json + cron-schedule.md + recent commits

          ## Last Published

          | Monitor | Date | Status | Message |
          |---------|------|--------|---------|
          ${PUBLISH_SUMMARY}

          ## Staging

          ${STAGING_STATUS}

          ## Recent Commits (last 10)

          ${RECENT_COMMITS}

          ## Recent Notes

          ${NOTES}

          ---
          *Auto-generated by generate-handoff.yml. Do not edit manually.*
          HANDOFF_EOF

          # Clean up leading whitespace from heredoc
          sed -i 's/^          //' handoff.md

          echo "Generated HANDOFF.md ($(wc -l < handoff.md) lines)"
          cat handoff.md

      - name: Commit to internal repo
        run: |
          ENCODED=$(base64 -w0 handoff.md)
          SHA=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/HANDOFF.md \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(-f "message=ops: auto-generate HANDOFF.md ($(date -u '+%Y-%m-%d %H:%M UTC'))")
          ARGS+=(-f "content=$ENCODED")
          ARGS+=(-f "branch=main")
          if [ -n "$SHA" ]; then
            ARGS+=(-f "sha=$SHA")
          fi

          gh api --method PUT /repos/asym-intel/asym-intel-internal/contents/ops/HANDOFF.md \
            "${ARGS[@]}" --silent

          echo "Committed HANDOFF.md to asym-intel-internal"
