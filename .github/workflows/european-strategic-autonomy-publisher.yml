name: ESA Publisher — Weekly Report

on:
  # Schedule: Wednesday 19:00 UTC (after synthesiser completes)
  # DISABLED until validated — enable by uncommenting the schedule line
  schedule:
    - cron: "0 14 * * 3"    # Wednesday 14:00 UTC — final stage, synthesiser at 12:00
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish ESA Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ESA Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: european-strategic-autonomy
        run: python3 pipeline/publishers/publisher.py

      - name: Commit published report
        run: |
          git config user.name "ESA Publisher Bot"
          git config user.email "esa-publisher@asym-intel.info"
          git add static/monitors/european-strategic-autonomy/data/
          git add docs/monitors/european-strategic-autonomy/data/
          git add content/monitors/european-strategic-autonomy/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(esa): Issue $(python3 -c 'import json; print(json.load(open(\"static/monitors/european-strategic-autonomy/data/report-latest.json\"))[\"meta\"][\"issue\"])') published by ESA Publisher Bot [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
