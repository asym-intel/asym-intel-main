name: GMM Reasoner — Macro Regime Analysis

on:
  schedule:
    - cron: "0 18 * * 1"  # Monday 18:00 UTC (weekly-research Mon 16:00, synthesiser Mon 20:00)
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  reason:
    name: GMM Macro Regime Reasoning (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch identity card from internal repo
        env:
          INTERNAL_REPO_PAT: ${{ secrets.INTERNAL_REPO_PAT }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${INTERNAL_REPO_PAT}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-GMM.md" \
            -o docs/identity/gmm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/gmm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Run GMM Reasoner
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/macro-monitor/gmm-reasoner.py

      - name: Commit reasoner output
        run: |
          git config user.name  "GMM Reasoner Bot"
          git config user.email "gmm-reasoner@asym-intel.info"
          git add pipeline/monitors/macro-monitor/reasoner/
          git diff --staged --quiet && echo "No reasoner output to commit" && exit 0
          git commit -m "data(gmm-reasoner): macro regime analysis — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
