name: "Global Macro Monitor Synthesiser"

on:
  schedule:
    - cron: "0 12 * * 2"  # Tuesday 12:00 UTC — reasoner at 10:00, publisher at 14:00
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (default: sonar-deep-research)'
        required: false
        default: ''

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GMM methodology from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Identity card (analytical quality standard)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-GMM.md" \
            -o docs/identity/gmm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/gmm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

          # Prompt is now in main repo — no fetch needed
          echo "GMM prompt in repo ($(wc -c < pipeline/synthesisers/gmm/macro-monitor-synthesiser-api-prompt.txt) bytes)"

          # Methodology (private IP — stays in internal repo)
          mkdir -p docs/methodology docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/macro-monitor-full.md" \
            -o docs/methodology/macro-monitor-full.md
          echo "GMM methodology fetched ($(wc -c < docs/methodology/macro-monitor-full.md) bytes)"

          # Addendum (optional — don't fail if absent)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/macro-monitor-imf-2026.md" \
            -o docs/methodology/macro-monitor-addendum.md \
            && echo "GMM addendum fetched ($(wc -c < docs/methodology/macro-monitor-addendum.md) bytes)" \
            || echo "No addendum found — continuing without it"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run GMM synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
          SYNTH_MODEL: ${{ github.event.inputs.model }}
        run: |
          python pipeline/synthesisers/gmm/macro-monitor-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/macro-monitor/synthesised/
          git diff --cached --quiet || git commit -m "chore(gmm): synthesiser run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
