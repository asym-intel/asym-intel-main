name: Mirror to GitLab

on:
  push:
    # S5 phase 1 Fix 3: only mirror main + staging branch pushes.
    # Tags continue to mirror so releases stay in sync. Feature/PR
    # branches don't need mirroring — they're transient.
    branches: [main, staging]
    tags: ["**"]
  delete:

concurrency:
  group: gitlab-mirror
  cancel-in-progress: true

jobs:
  mirror:
    name: Push mirror to GitLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Push to GitLab
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/asym-intel/asym-intel-main.git"
          git push gitlab --all --force
          git push gitlab --tags --force

