name: Mirror to GitLab

on:
  push:
    # S5 phase 1 Fix 3: only mirror main + staging branch pushes.
    # Tags continue to mirror so releases stay in sync. Feature/PR
    # branches don't need mirroring — they're transient.
    branches: [main, staging]
    tags: ["**"]
  delete:

concurrency:
  group: gitlab-mirror
  cancel-in-progress: true

jobs:
  mirror:
    name: Push mirror to GitLab
    runs-on: ubuntu-latest
    # Dependabot-triggered runs (and any other context without access to the
    # mirror PAT) can't authenticate the checkout or the GitLab push. Skip the
    # job cleanly instead of failing the checkout step with "Input required and
    # not supplied: token".
    if: >-
      github.actor != 'dependabot[bot]'
      && github.event.sender.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Push to GitLab
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/asym-intel/asym-intel-main.git"
          git push gitlab --all --force
          git push gitlab --tags --force

