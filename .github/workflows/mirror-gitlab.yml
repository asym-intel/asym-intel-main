name: Mirror to GitLab

on:
  push:
    branches: ["**"]
    tags: ["**"]
  delete:

jobs:
  mirror:
    name: Push mirror to GitLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/asym-intel/asym-intel-main.git"
          # Non-force push for main (GitLab branch protection)
          git push gitlab main
          # Force push non-main branches and tags
          git push gitlab --tags --force
          for branch in $(git branch -r --list 'origin/*' | grep -v '/main$' | grep -v '/HEAD' | sed 's|origin/||'); do
            git push gitlab "refs/heads/$branch" --force 2>/dev/null || true
          done
