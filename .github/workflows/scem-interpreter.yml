name: "SCEM Interpreter"

# ── Sprint AN — Interpreter role (SCEM) ──
# Sprint AN adds workflow_run trigger on SCEM Reasoner so cron-dispatched
# SCEM runs cascade automatically: Reasoner → Interpreter → Reviewer →
# Composer → Applier → Curator end-to-end.
# Reasoner finishing means both weekly-latest.json and
# reasoner-latest.json are committed — the two artefacts Interpreter
# reads from paths.weekly_latest + paths.reasoner_latest.
# Topology mirrors AGM: Interpreter → Reviewer → Composer → Applier →
# Curator chain. workflow_run trigger added per AD-2026-04-26-AN.
#
# No schedule trigger: workflow_dispatch + workflow_run (Reasoner success).
# Cron lines remain commented until cascade-validation runbook passes.
# Per AD-AN §acceptance gates.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (optional; blank = use metadata.yml default)'
        required: false
        default: ''
      weekly-file:
        description: 'Override weekly bundle filename (e.g. weekly-2026-05-01.json). Empty = use weekly-latest.json.'
        required: false
        default: ''
      force:
        description: 'Bypass E5 same-day guard. Requires force-reason, force-ad, force-operator.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force-reason:
        description: 'Justification (required when force=true). Logged to AD trail.'
        required: false
        default: ''
      force-ad:
        description: 'Architectural Decision authorising the force-reissue (e.g. AD-2026-04-27-AT).'
        required: false
        default: ''
      force-operator:
        description: 'Operator handle authorising the force-reissue (e.g. Peter-Pink-Howitt).'
        required: false
        default: ''
  workflow_run:
    workflows: ["SCEM Reasoner — Conflict Trajectory Analysis"]
    types:
      - completed

jobs:
  interpret:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      monitor: conflict-escalation

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/conflict-escalation
          sparse-checkout-cone-mode: false

      - name: Fetch SCEM methodology + identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/methodology docs/identity

          # Identity card (analytical quality standard)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-SCEM.md" \
            -o docs/identity/scem-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/scem-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

          # Methodology (private IP — stays in internal repo)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/conflict-escalation-full.md" \
            -o docs/methodology/conflict-escalation-full.md \
            && echo "SCEM methodology fetched ($(wc -c < docs/methodology/conflict-escalation-full.md) bytes)" \
            || echo "WARNING: Methodology not found — continuing without it"

          # Addendum (optional — do not fail if absent)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/conflict-escalation-addendum.md" \
            -o docs/methodology/conflict-escalation-addendum.md \
            && echo "SCEM addendum fetched ($(wc -c < docs/methodology/conflict-escalation-addendum.md) bytes)" \
            || echo "No addendum found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/conflict-escalation
          cp -v internal/pipeline/monitors/conflict-escalation/metadata.yml              pipeline/monitors/conflict-escalation/
          cp -v internal/pipeline/monitors/conflict-escalation/interpreter-prompt.txt    pipeline/monitors/conflict-escalation/
          cp -v internal/pipeline/monitors/conflict-escalation/interpreter-schema.json   pipeline/monitors/conflict-escalation/
          cp -v internal/pipeline/monitors/conflict-escalation/synthesiser-domain.md     pipeline/monitors/conflict-escalation/ || true

      - name: Run SCEM interpreter (engine dispatch)
        env:
          PPLX_API_KEY:         ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:             ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:            ${{ github.workspace }}
          SYNTH_MODEL:          ${{ github.event.inputs.model }}
          WEEKLY_FILE_OVERRIDE: ${{ github.event.inputs.weekly-file }}
          FORCE_FLAG:           ${{ github.event.inputs.force }}
          FORCE_REASON:         ${{ github.event.inputs.force-reason }}
          FORCE_AD:             ${{ github.event.inputs.force-ad }}
          FORCE_OPERATOR:       ${{ github.event.inputs.force-operator }}
          PYTHONPATH:           internal
        run: |
          ARGS=(--monitor conflict-escalation)
          if [ "${FORCE_FLAG}" = "true" ]; then
            ARGS+=(--force --force-reason "${FORCE_REASON}" --force-ad "${FORCE_AD}" --force-operator "${FORCE_OPERATOR}")
            echo "::notice::Force-reissue requested: ad=${FORCE_AD} operator=${FORCE_OPERATOR}"
          fi
          python -m pipeline.engine.interpret_base "${ARGS[@]}"

      - name: Commit interpret output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/conflict-escalation/synthesised/
          git diff --cached --quiet || git commit -m "chore(scem): interpreter run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
