name: FIM Collector — Tier 0 daily pre-verification
# Thin caller — delegates entirely to _reusable-collector.yml.
# Sprint-2 G-COLLECTOR-REUSABLE (2026-05-14). References PR #318 publisher pattern.

on:
  workflow_dispatch:        # Cloudflare Worker dispatches; also allows manual trigger

jobs:
  collect:
    name: FIM Tier 0 Collection
    uses: ./.github/workflows/_reusable-collector.yml
    with:
      slug:         "financial-integrity"
      slug_id:      "FIM"
      monitor_path: "financial-integrity"
      daily_path:   "pipeline/monitors/financial-integrity/daily/"
    secrets: inherit
