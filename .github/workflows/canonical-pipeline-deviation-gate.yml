# HK-2026-05-09: gate is ADVISORY-ONLY. Re-enable by removing --advisory from the
# check step. Retire conditions tracked in ops/TRIPWIRES.md entry 8.
name: Canonical pipeline deviation gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'pipeline/engine/**'
      - 'pipeline/monitors/**'
      - '.github/workflows/*collector*.yml'
      - '.github/workflows/*weekly-research*.yml'
      - '.github/workflows/*reasoner*.yml'
      - '.github/workflows/*synthesiser*.yml'
      - '.github/workflows/*interpreter*.yml'
      - '.github/workflows/*reviewer*.yml'
      - '.github/workflows/*composer*.yml'
      - '.github/workflows/*applier*.yml'
      - '.github/workflows/*curator*.yml'
      - '.github/workflows/*publisher*.yml'
      - '.github/workflows/_reusable-*.yml'
      - 'tools/consumer_readiness.py'
      - 'tools/scaffold_monitor.py'
      - 'tools/preflight_parity.py'
      - 'tools/commons_drift_scan.py'
      - 'docs/PIPELINE-CANONICAL.md'
      - 'docs/architecture/consumer-onboarding.md'
      - 'docs/architecture/canonical-monitor-shape.md'
      - 'docs/architecture/PIPELINE-TRIGGERS.md'
      - 'ops/PIPELINE-CONSUMER-KNOWHOW.md'
      - 'ops/PIPELINE-UPGRADE-TO-COMMON-SPEC-KNOWHOW.md'
      - 'ops/COLLECTION-SCHEMA-ALIGNMENT-CHECKLIST.md'
      - 'ops/METHODOLOGY-MAPPING-KNOWHOW.md'
      - 'tools/check_canonical_pipeline_deviation.py'
      - '.github/workflows/canonical-pipeline-deviation-gate.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: canonical-pipeline-deviation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Canonical pipeline review (advisory — HK-2026-05-09 pause)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout main (PR repo)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Sprint CL — load the canonical class contract from asym-intel-internal
      # at runtime so this gate and the internal consumer_readiness tool agree
      # on the same machine-readable manifest. Authority: AD-2026-05-04-CK.
      - name: Checkout asym-intel-internal (read-only)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.COMPUTER_SHIM_INTERNAL_READ }}
          path: _internal
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Write PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > /tmp/pr-body.md

      - name: Run advisory check
        id: advisory
        run: |
          set +e
          python3 _internal/tools/check_canonical_pipeline_deviation.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --body-file /tmp/pr-body.md \
            --manifest _internal/ops/generic-pipeline-class.yml \
            --advisory \
            --suggested-block-out /tmp/suggested-block.md
          echo "advisory_exit=$?" >> "$GITHUB_OUTPUT"
          # Re-run without --advisory to capture true gate verdict (still informational)
          python3 _internal/tools/check_canonical_pipeline_deviation.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --body-file /tmp/pr-body.md \
            --manifest _internal/ops/generic-pipeline-class.yml
          echo "true_verdict=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post suggested block (advisory)
        if: steps.advisory.outputs.true_verdict != '0' && hashFiles('/tmp/suggested-block.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # De-duplicate: if a recent comment already carries the advisory marker, skip.
          MARKER="<!-- canonical-pipeline-deviation-advisory -->"
          if gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json comments --jq '.comments[].body' | grep -q "$MARKER"; then
            echo "Advisory comment already posted; skipping duplicate."
            exit 0
          fi
          (
            echo "$MARKER"
            cat /tmp/suggested-block.md
          ) > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file /tmp/comment.md
