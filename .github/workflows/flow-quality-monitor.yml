name: Flow Quality Monitor

# Audits per-module pipeline-flow data quality across all live monitors and
# publishes a compact summary to the private operator surface only:
#   - asym-intel-internal:ops/pipeline-status.json (_flow_quality block)
#
# Triggers after each publisher run, on manual dispatch, and once daily as a
# catch-all. All commit/push steps use continue-on-error so a flow-quality
# update can never block a publish cycle.
#
# Source: docs/sprints/2026-05-02-BX/BRIEF-BX-4-consumer-wide-monitoring.md

"on":
  workflow_run:
    workflows:
      - "WDM Publisher — Weekly Report"
      - "GMM Publisher — Weekly Report"
      - "ESA Publisher — Weekly Report"
      - "FCW Publisher — Weekly Report"
      - "ERM Publisher — Weekly Report"
      - "SCEM Publisher — Weekly Report"
      - "AIM Publisher — Weekly Report"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  audit:
    name: Audit pipeline flow quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}

    steps:
      - name: Checkout asym-intel-main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Checkout asym-intel-internal (consumer registry only)
        # Sparse-checkout: only the private consumer registry module.
        # The audit harness imports tools.consumer_registry.fleet_consumers
        # when _internal is on PYTHONPATH; falls back to monitor-only mode
        # if the PAT does not have read access to asym-intel-internal.
        # Authority: AD-2026-05-05-CR §Decision (BRIEF CR-1 §C).
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          path: _internal
          sparse-checkout: |
            tools/consumer_registry.py
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
        continue-on-error: true
        # If ASYM_INTEL_PIPELINE PAT does not have read access to
        # asym-intel-internal, this step is skipped and the audit proceeds
        # in monitor-only mode (fail-soft by design).

      - name: Make internal registry importable
        run: |
          if [ -f "_internal/tools/consumer_registry.py" ]; then
            echo "PYTHONPATH=$PYTHONPATH:$GITHUB_WORKSPACE/_internal" >> $GITHUB_ENV
            echo "internal consumer registry available at _internal/tools/consumer_registry.py"
          else
            echo "notice: _internal/tools/consumer_registry.py not found — audit will run in monitor-only mode"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pipeline flow audit
        id: audit
        run: |
          set -euo pipefail
          python -m pipeline.tools.pipeline_flow_audit --all --output json > /tmp/audit-raw.json
          echo "raw audit bytes: $(wc -c < /tmp/audit-raw.json)"

      - name: Build private flow-quality summary
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          STATES = ("present", "absent_explained", "absent_unknown",
                    "blocked", "missing_artifact")

          raw = json.loads(Path("/tmp/audit-raw.json").read_text())
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          monitors_out = {}
          for slug, rows in (raw or {}).items():
              publish_rows = [r for r in rows if r.get("stage") == "publish"]
              counts = {s: 0 for s in STATES}
              module_detail = {}
              first_break_stage = None
              for r in publish_rows:
                  state = r.get("state") or "unknown"
                  if state in counts:
                      counts[state] += 1
                  mid = r.get("module_id")
                  if mid:
                      module_detail[mid] = state
                  fbs = r.get("first_break_stage")
                  if fbs and first_break_stage is None:
                      first_break_stage = fbs
              monitors_out[slug] = {
                  "present": counts["present"],
                  "absent_explained": counts["absent_explained"],
                  "absent_unknown": counts["absent_unknown"],
                  "blocked": counts["blocked"],
                  "missing_artifact": counts["missing_artifact"],
                  "first_break_stage": first_break_stage,
                  "has_unknown_absence": counts["absent_unknown"] > 0,
                  "module_detail": module_detail,
              }

          summary = {
              "_meta": {
                  "generated_at": now,
                  "schema_version": "flow-quality-v1.0",
                  "monitors_audited": sorted(monitors_out.keys()),
              },
              "monitors": monitors_out,
          }

          # Stash the payload for the internal-repo injection step. Do not write
          # it to static/ops: flow-quality details belong on the private
          # ops.asym-intel.info operator surface, not the public site.
          Path("/tmp/flow-quality-summary.json").write_text(json.dumps(summary))
          print(f"prepared private flow-quality summary for {len(monitors_out)} monitors")
          PY

      - name: Inject _flow_quality block into asym-intel-internal pipeline-status.json
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          python3 - <<'PY'
          import base64, json, os, subprocess, sys
          from pathlib import Path

          INTERNAL_REPO = "asym-intel/asym-intel-internal"
          FILEPATH = "ops/pipeline-status.json"

          summary = json.loads(Path("/tmp/flow-quality-summary.json").read_text())
          flow_block = {
              "generated_at": summary["_meta"]["generated_at"],
              "schema_version": summary["_meta"]["schema_version"],
              "monitors": {
                  slug: {
                      k: v for k, v in m.items()
                      if k in (
                          "present", "absent_explained", "absent_unknown",
                          "blocked", "missing_artifact", "first_break_stage",
                          "has_unknown_absence", "module_detail",
                      )
                  }
                  for slug, m in summary["monitors"].items()
              },
          }

          # Fetch current internal pipeline-status.json + sha.
          fetch = subprocess.run(
              ["gh", "api", f"/repos/{INTERNAL_REPO}/contents/{FILEPATH}"],
              capture_output=True, text=True,
          )
          if fetch.returncode != 0:
              print(f"fetch failed (continuing): {fetch.stderr[:200]}", file=sys.stderr)
              sys.exit(0)

          meta = json.loads(fetch.stdout)
          sha = meta.get("sha")
          current = json.loads(base64.b64decode(meta["content"]).decode())

          current["_flow_quality"] = flow_block
          new_content = json.dumps(current, indent=2) + "\n"
          encoded = base64.b64encode(new_content.encode()).decode()

          message = "ops: inject _flow_quality block"
          cmd = [
              "gh", "api", "--method", "PUT",
              f"/repos/{INTERNAL_REPO}/contents/{FILEPATH}",
              "-f", f"message={message}",
              "-f", f"content={encoded}",
              "-f", "branch=main",
              "-f", f"sha={sha}",
          ]
          result = subprocess.run(cmd, capture_output=True, text=True)
          if result.returncode != 0:
              print(f"PUT failed (continuing): {result.stderr[:300]}", file=sys.stderr)
              sys.exit(0)
          print("injected _flow_quality into internal pipeline-status.json")
          PY
