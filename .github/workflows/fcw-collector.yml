name: FCW Collector — Tier 0 daily pre-verification

on:
  workflow_dispatch:        # allow manual trigger from Actions tab for testing

jobs:
  collect:
    name: FCW Tier 0 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to commit pipeline/ output back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run FCW Collector
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/fimi-cognitive-warfare/collect.py

      - name: Commit Collector output
        run: |
          git config user.name  "FCW Collector Bot"
          git config user.email "fcw-collector@asym-intel.info"
          git add pipeline/monitors/fimi-cognitive-warfare/daily/
          git diff --staged --quiet && echo "No new findings to commit" && exit 0
          git commit -m "data(fcw-collector): Tier 0 daily pre-verification — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
