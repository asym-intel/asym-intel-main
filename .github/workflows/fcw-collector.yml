name: FCW Collector — Tier 0 daily pre-verification
# Thin caller — delegates entirely to _reusable-collector.yml.
# Sprint-2 G-COLLECTOR-REUSABLE (2026-05-14). References PR #318 publisher pattern.

on:
  workflow_dispatch:        # allow manual trigger from Actions tab for testing

jobs:
  collect:
    name: FCW Tier 0 Collection
    uses: ./.github/workflows/_reusable-collector.yml
    with:
      slug:         "fimi-cognitive-warfare"
      slug_id:      "FCW"
      monitor_path: "fimi-cognitive-warfare"
      daily_path:   "pipeline/monitors/fimi-cognitive-warfare/daily/"
    secrets: inherit
