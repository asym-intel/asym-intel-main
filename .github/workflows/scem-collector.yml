name: SCEM Collector — Tier 0 daily conflict pre-verification

on:
  schedule:
    - cron: "30 7 * * *"     # daily 07:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab for testing

jobs:
  collect:
    name: SCEM Tier 0 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to commit pipeline/ output back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run SCEM Collector
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/conflict-escalation/collect.py

      - name: Commit Collector output
        run: |
          git config user.name  "SCEM Collector Bot"
          git config user.email "scem-collector@asym-intel.info"
          git add pipeline/monitors/conflict-escalation/daily/
          git diff --staged --quiet && echo "No new findings to commit" && exit 0
          git commit -m "data(scem-collector): Tier 0 daily pre-verification — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
