name: Build and deploy

on:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/**'
      - 'publishing-workflow.md'
  workflow_dispatch:

concurrency:
  group: build-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    name: Blueprint structural validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Blueprint validator
        run: python3 .github/validate-blueprint.py

  build:
    name: Hugo build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build
        run: |
          hugo --minify --buildFuture
          touch docs/.nojekyll

      - name: Commit docs
        if: github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/; then
            echo "No changes to docs/ - skipping commit."
          else
            git add docs/
            git commit -m "build: auto-rebuild [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
