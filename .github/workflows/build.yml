name: Build and deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      # Don't re-trigger when Actions itself commits docs/
      - 'docs/**'
      # Don't trigger on workflow file changes alone
      - '.github/workflows/**'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Prevent concurrent builds — queue them instead
concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Hugo build → commit docs/
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit docs/ back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for .GitInfo and lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Commit docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if docs/ actually changed
          if git diff --quiet docs/; then
            echo "No changes to docs/ — skipping commit."
          else
            git add docs/
            git commit -m "build: auto-rebuild [skip ci]

  Triggered by: ${{ github.event_name }}
  Commit: ${{ github.sha }}"
            git push
          fi
