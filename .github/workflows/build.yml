name: Build and deploy

on:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/**'
      - 'publishing-workflow.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    name: Blueprint structural validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Run Blueprint validator
        run: python3 .github/validate-blueprint.py

  build:
    name: Hugo build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build
        run: |
          hugo --minify --buildFuture
          touch docs/.nojekyll

      - name: Commit docs
        if: github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/asym-intel/asym-intel-main.git
          if git diff --quiet docs/; then
            echo "No changes to docs/ - skipping commit."
          else
            git add docs/
            git commit -m "build: auto-rebuild [skip ci]"
            git push origin main
          fi

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build_health:
    name: Write build health signal
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: github.ref_name == 'main' && always()
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Update _build block in pipeline-status.json
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_CONCLUSION="${{ needs.build.result }}"
          DEPLOY_CONCLUSION="${{ needs.deploy.result }}"

          API_RESP=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/pipeline-status.json)
          FILE_SHA=$(echo "$API_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          CURRENT=$(echo "$API_RESP" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())")

          UPDATED=$(python3 -c "
import sys, json, os
d = json.loads(sys.stdin.read())
d['_build'] = {
    'hugo_last_run': os.environ['NOW'],
    'hugo_build_conclusion': os.environ['BUILD_CONCLUSION'],
    'deploy_conclusion': os.environ['DEPLOY_CONCLUSION'],
    'updated_by': 'build.yml build_health job'
}
print(json.dumps(d, indent=2))
" NOW="$NOW" BUILD_CONCLUSION="$BUILD_CONCLUSION" DEPLOY_CONCLUSION="$DEPLOY_CONCLUSION" <<< "$CURRENT")

          ENCODED=$(echo "$UPDATED" | base64 -w0)
          gh api --method PUT \
            /repos/asym-intel/asym-intel-internal/contents/ops/pipeline-status.json \
            -f message="ops: _build signal hugo=$BUILD_CONCLUSION deploy=$DEPLOY_CONCLUSION [skip ci]" \
            -f content="$ENCODED" \
            -f sha="$FILE_SHA" \
            -f branch="main" --silent

          echo "Build health: hugo=$BUILD_CONCLUSION deploy=$DEPLOY_CONCLUSION at $NOW"
