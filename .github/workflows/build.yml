name: Build and deploy

on:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/**'
      - 'publishing-workflow.md'
  workflow_dispatch:

concurrency:
  group: build-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Blueprint structural validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Blueprint validator
        run: python3 .github/validate-blueprint.py

  build:
    name: Hugo build and commit docs
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build
        run: |
          hugo --minify --buildFuture
          touch docs/.nojekyll

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/; then
            echo "No changes to docs/ - skipping commit."
          else
            git add docs/
            git commit -m "build: auto-rebuild [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
