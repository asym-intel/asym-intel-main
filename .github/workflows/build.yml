name: Build and deploy

on:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/**'
      - 'publishing-workflow.md'
      # S5 phase 1 Fix 4: publisher-bot data writes don't need a fresh
      # build/deploy. These dirs are data-only JSON outputs; layouts and
      # engine code live elsewhere (pipeline/engine/, layouts/, assets/).
      # Note: real dir name is `applied/` (past tense), not `applier/` as
      # in the AD prose — reconciled to actual repo state.
      - 'pipeline/monitors/**/curator/**'
      - 'pipeline/monitors/**/reasoner/**'
      - 'pipeline/monitors/**/synthesised/**'
      - 'pipeline/monitors/**/applied/**'
      - 'pipeline/monitors/**/daily/**'
      - 'pipeline/monitors/**/weekly/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  # S5 phase 1 Fix 2: cancel superseded staging (and any non-main) runs.
  # Main builds keep cancel-in-progress: false because publishers depend on
  # every main build completing for deploy.
  group: build-deploy-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    name: Blueprint structural validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Run Blueprint validator
        run: python3 .github/validate-blueprint.py

  build:
    name: Site build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: pip install python-frontmatter==1.1.0 markdown==3.7

      - name: Build site
        run: |
          python3 tools/build_site.py
          touch docs/.nojekyll

      - name: Commit docs
        if: github.ref_name == 'main'
        # GA-010: publisher-bot commits and this job's docs commit can race.
        # On non-fast-forward, rebase the local docs commit onto fresh origin/main
        # and retry; only the push is retried, not the build.
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.ASYM_INTEL_PIPELINE }}@github.com/asym-intel/asym-intel-main.git
          if git diff --quiet docs/; then
            echo "No changes to docs/ - skipping commit."
            exit 0
          fi
          git add docs/
          git commit -m "build: auto-rebuild [skip ci]"
          attempt=1
          max_attempts=5
          while true; do
            if git push origin main; then
              echo "Pushed docs commit on attempt $attempt."
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Push failed after $attempt attempts; giving up." >&2
              exit 1
            fi
            sleep_for=$(( attempt * 5 ))
            echo "Push attempt $attempt failed (likely non-fast-forward). Fetching and rebasing in ${sleep_for}s..."
            sleep "$sleep_for"
            git fetch origin main
            # Rebase our single docs commit onto the updated remote tip. Our
            # changes only touch docs/ (regenerated output), so conflicts with
            # publisher-bot data writes are not expected; if a rebase ever does
            # conflict, abort cleanly so the job fails loudly rather than
            # pushing a half-resolved state.
            if ! git rebase origin/main; then
              echo "Rebase produced conflicts; aborting and failing." >&2
              git rebase --abort || true
              exit 1
            fi
            attempt=$(( attempt + 1 ))
          done

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build_health:
    name: Write build health signal
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: github.ref_name == 'main' && always()
    env:
      GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}

    steps:
      - name: Update _build block in pipeline-status.json
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_CONCLUSION="${{ needs.build.result }}"
          DEPLOY_CONCLUSION="${{ needs.deploy.result }}"

          API_RESP=$(gh api /repos/asym-intel/asym-intel-internal/contents/ops/pipeline-status.json)
          FILE_SHA=$(echo "$API_RESP" | jq -r '.sha')
          CURRENT=$(echo "$API_RESP" | jq -r '.content' | base64 -d)

          UPDATED=$(echo "$CURRENT" | jq \
            --arg now "$NOW" \
            --arg build "$BUILD_CONCLUSION" \
            --arg deploy "$DEPLOY_CONCLUSION" \
            '._build = {"build_last_run": $now, "build_conclusion": $build, "deploy_conclusion": $deploy, "updated_by": "build.yml build_health job"}')

          ENCODED=$(echo "$UPDATED" | base64 -w0)
          gh api --method PUT \
            /repos/asym-intel/asym-intel-internal/contents/ops/pipeline-status.json \
            -f message="ops: _build signal build=$BUILD_CONCLUSION deploy=$DEPLOY_CONCLUSION [skip ci]" \
            -f content="$ENCODED" \
            -f sha="$FILE_SHA" \
            -f branch="main" --silent

          echo "Build health: build=$BUILD_CONCLUSION deploy=$DEPLOY_CONCLUSION at $NOW"
