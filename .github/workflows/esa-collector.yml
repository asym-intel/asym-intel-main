name: ESA Collector — Tier 0 daily pre-verification
# Thin caller — delegates entirely to _reusable-collector.yml.
# Sprint-2 G-COLLECTOR-REUSABLE (2026-05-14). References PR #318 publisher pattern.

on:
  workflow_dispatch:        # allow manual trigger from Actions tab for testing

jobs:
  collect:
    name: ESA Tier 0 Collection
    uses: ./.github/workflows/_reusable-collector.yml
    with:
      slug:         "european-strategic-autonomy"
      slug_id:      "ESA"
      monitor_path: "european-strategic-autonomy"
      daily_path:   "pipeline/monitors/european-strategic-autonomy/daily/"
    secrets: inherit
