name: "AI Governance Monitor Interpreter"

# ── Sprint 3 Step 1 — Interpreter role ──
# Cron-resumption 2026-04: workflow_run trigger added so Reasoner
# success auto-chains into Interpreter, extending the cron-dispatched
# chain (research → reasoner → interpreter via dispatcher; reviewer
# → composer → applier → curator via downstream workflow_run).
# Reasoner finishing means both weekly-latest.json and
# reasoner-latest.json are committed and present — the two artefacts
# Interpreter reads from `paths.weekly_latest` + `paths.reasoner_latest`.
# Topology mirrors the Interpreter → Reviewer → Composer → Applier →
# Curator chain established in Sprint 3.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (optional; blank = use metadata.yml default)'
        required: false
        default: ''
      weekly-file:
        description: 'Override weekly bundle filename (e.g. weekly-2026-04-10.json). Empty = use weekly-latest.json. Sprint 3 Step 4a.1.'
        required: false
        default: ''
      force:
        description: 'Bypass E5 same-day guard. Requires force-reason, force-ad, force-operator.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force-reason:
        description: 'Justification (required when force=true). Logged to AD trail.'
        required: false
        default: ''
      force-ad:
        description: 'Architectural Decision authorising the force-reissue (e.g. AD-2026-04-27-AT).'
        required: false
        default: ''
      force-operator:
        description: 'Operator handle authorising the force-reissue (e.g. Peter-Pink-Howitt).'
        required: false
        default: ''
  workflow_run:
    workflows: ["AGM Reasoner — AGM Capability Governance Reasoning"]
    types:
      - completed

jobs:
  interpret:
    # Gate: only run if upstream reasoner actually succeeded.
    # workflow_dispatch runs always pass this guard.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          # workflow_run always starts from default branch HEAD; make that
          # explicit so we see the weekly-latest.json + reasoner-latest.json
          # the upstream Reasoner job just committed.
          ref: main

      # ── Sprint 3 Step 1 — Interpreter role (structured-claim extraction only) ──
      # ── engine + bespoke config live in internal repo ──
      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/ai-governance
          sparse-checkout-cone-mode: false

      - name: Fetch AGM methodology + identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/methodology docs/identity

          # Identity card (analytical quality standard)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-AGM.md" \
            -o docs/identity/agm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/agm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

          # Methodology (private IP — stays in internal repo)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/ai-governance-full.md" \
            -o docs/methodology/ai-governance-full.md
          echo "AGM methodology fetched ($(wc -c < docs/methodology/ai-governance-full.md) bytes)"

          # Addendum (optional — don't fail if absent)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/ai-governance-euaiact-2026.md" \
            -o docs/methodology/ai-governance-addendum.md \
            && echo "AGM addendum fetched ($(wc -c < docs/methodology/ai-governance-addendum.md) bytes)" \
            || echo "No addendum found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml anthropic

      # The engine reads bespoke files via paths resolved relative to CWD
      # (public-main root). Stage the internal checkout's bespoke files there.
      # §15 IP boundary preserved — they are never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/ai-governance
          cp -v internal/pipeline/monitors/ai-governance/metadata.yml             pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/interpreter-prompt.txt   pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/interpreter-schema.json  pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/synthesiser-domain.md    pipeline/monitors/ai-governance/ || true

      - name: Run AGM interpreter (engine dispatch)
        env:
          PPLX_API_KEY:      ${{ secrets.PPLX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:         ${{ github.workspace }}
          SYNTH_MODEL:       ${{ github.event.inputs.model }}
          # Sprint 3 Step 4a.1 — weekly-file override passthrough. When the
          # dispatch input `weekly-file` is populated, the engine resolves
          # the named bundle inside pipeline/monitors/{slug}/weekly/ and
          # reads it instead of weekly-latest.json. Empty = default behaviour.
          WEEKLY_FILE_OVERRIDE: ${{ github.event.inputs.weekly-file }}
          FORCE_FLAG:        ${{ github.event.inputs.force }}
          FORCE_REASON:      ${{ github.event.inputs.force-reason }}
          FORCE_AD:          ${{ github.event.inputs.force-ad }}
          FORCE_OPERATOR:    ${{ github.event.inputs.force-operator }}
          PYTHONPATH:        internal
        run: |
          ARGS=(--monitor ai-governance)
          if [ "${FORCE_FLAG}" = "true" ]; then
            ARGS+=(--force --force-reason "${FORCE_REASON}" --force-ad "${FORCE_AD}" --force-operator "${FORCE_OPERATOR}")
            echo "::notice::Force-reissue requested: ad=${FORCE_AD} operator=${FORCE_OPERATOR}"
          fi
          python -m pipeline.engine.interpret_base "${ARGS[@]}"

      - name: Commit interpret output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/ai-governance/synthesised/
          git diff --cached --quiet || git commit -m "chore(agm): interpreter run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
