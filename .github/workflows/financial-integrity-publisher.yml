name: FIM Publisher — Weekly Report
# Sprint-2 G-PUBLISHER-REUSABLE — thin caller. Reusable body: _reusable-publisher.yml
# Schedule: Monday 18:00 UTC (after synthesiser completes).
#
# NOTE: FIM publisher preserves its original trigger semantics (workflow_dispatch
# only, no workflow_run upstream). This is consumer-specific and is NOT a
# defect — see G-AUDIT-REPLAY divergence D-040 (HK-tracked, out-of-Sprint-2
# scope per FIM being Class B).

on:
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Override output date (YYYY-MM-DD). Leave blank to use today (UTC). Use when re-running for a past cycle."
        required: false
        default: ""
        type: string
      force:
        description: 'AD-2026-04-24l governed re-issue — skip freshness/E5 guards.'
        required: false
        default: false
        type: boolean
      force_reason:
        required: false
        default: ''
        type: string
      force_ad:
        required: false
        default: ''
        type: string
      force_operator:
        required: false
        default: ''
        type: string

jobs:
  publish:
    uses: ./.github/workflows/_reusable-publisher.yml
    with:
      slug: financial-integrity
      publish_date: ${{ inputs.publish_date || '' }}
      force: ${{ inputs.force == true }}
      force_reason: ${{ inputs.force_reason || '' }}
      force_ad: ${{ inputs.force_ad || '' }}
      force_operator: ${{ inputs.force_operator || '' }}
    secrets: inherit
