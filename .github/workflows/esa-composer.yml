name: "European Strategic Autonomy Monitor Composer"

# ── Sprint AN — ESA Composer role — AD-2026-04-26-AN ──
# workflow_run trigger added (Sprint AN WS-AN-1) so Reviewer success
# auto-chains into Composer. Mirrors AGM topology.
# Reads interpret-latest.json + review-latest.json and composes a
# grounded weekly brief draft (no new claims; claim_trace[] tied to
# interpreter claim IDs). Topology mirrors AGM composer.
#
# Reviewer verdict handling:
#   APPROVE / APPROVE_WITH_FLAGS / SKIP_NULL_CYCLE → normal render.
#   REJECT / SKIP_ERROR_CYCLE                     → skip (publisher fallback).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override composer model (optional; blank = use metadata.yml default)'
        required: false
        default: ''
  workflow_run:
    workflows: ["European Strategic Autonomy Monitor Reviewer"]
    types:
      - completed

jobs:
  compose:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/european-strategic-autonomy
          sparse-checkout-cone-mode: false

      - name: Fetch ESA identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/identity

          # Identity card (analytical quality standard — shared across roles)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-ESA.md" \
            -o docs/identity/esa-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/esa-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      # §15 IP boundary preserved — bespoke files staged but never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/european-strategic-autonomy
          cp -v internal/pipeline/monitors/european-strategic-autonomy/metadata.yml         pipeline/monitors/european-strategic-autonomy/
          cp -v internal/pipeline/monitors/european-strategic-autonomy/composer-prompt.txt  pipeline/monitors/european-strategic-autonomy/
          cp -v internal/pipeline/monitors/european-strategic-autonomy/composer-schema.json pipeline/monitors/european-strategic-autonomy/

      # Skip-on-disposition guard. Two layers (workflow + engine) keep the
      # chain honest.
      # Interpreter disposition: error_cycle → skip (publisher fallback).
      # Reviewer verdict: REJECT / SKIP_ERROR_CYCLE → skip.
      # Missing review-latest.json → proceed (pre-reviewer behaviour).
      - name: Check interpreter disposition + reviewer verdict
        id: disposition
        run: |
          INTERPRET_PATH="pipeline/monitors/european-strategic-autonomy/synthesised/interpret-latest.json"
          REVIEW_PATH="pipeline/monitors/european-strategic-autonomy/synthesised/review-latest.json"

          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"       >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Composer."
            exit 0
          fi
          DISPOSITION=$(python -c "import json; d=json.load(open('$INTERPRET_PATH')); print((d.get('_meta') or {}).get('cycle_disposition',''))")
          echo "disposition=$DISPOSITION"
          if [ "$DISPOSITION" = "error_cycle" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=error_cycle" >> "$GITHUB_OUTPUT"
            echo "Interpreter reported error_cycle — skipping Composer."
            exit 0
          fi

          if [ -f "$REVIEW_PATH" ]; then
            VERDICT=$(python -c "import json; d=json.load(open('$REVIEW_PATH')); print(d.get('verdict',''))")
            echo "verdict=$VERDICT"
            if [ "$VERDICT" = "REJECT" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=reviewer_reject" >> "$GITHUB_OUTPUT"
              echo "Reviewer verdict=REJECT — skipping Composer."
              exit 0
            fi
            if [ "$VERDICT" = "SKIP_ERROR_CYCLE" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=reviewer_skip_error_cycle" >> "$GITHUB_OUTPUT"
              echo "Reviewer verdict=SKIP_ERROR_CYCLE — skipping Composer."
              exit 0
            fi
          else
            echo "verdict=(no review-latest.json; proceeding on Interpreter disposition alone)"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "reason=ok"  >> "$GITHUB_OUTPUT"

      - name: Run ESA composer (engine dispatch)
        if: steps.disposition.outputs.skip != 'true'
        env:
          PPLX_API_KEY:  ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:      ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:     ${{ github.workspace }}
          SYNTH_MODEL:   ${{ github.event.inputs.model }}
          monitor:       european-strategic-autonomy
          PYTHONPATH:    internal
        run: python -m pipeline.engine.compose_base --monitor european-strategic-autonomy

      - name: Commit compose output
        if: steps.disposition.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/european-strategic-autonomy/synthesised/
          git diff --cached --quiet || git commit -m "chore(esa): composer run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done

      # Trigger Applier via direct API dispatch (NOT workflow_run).
      # GitHub limits workflow_run-triggered chains to 3 levels deep.
      # Composer triggers Applier via gh workflow run (chain-depth reset),
      # matching the AGM pattern established 2026-04-26.
      - name: Trigger Applier (chain-depth reset)
        if: steps.disposition.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          gh workflow run esa-applier.yml \
            --repo ${{ github.repository }} \
            --ref main
