name: "Preflight Checks"

on:
  push:
    branches: [main, staging]
    paths:
      - '.github/workflows/*.yml'
      - 'pipeline/**'
      - 'static/monitors/**'
      - 'static/ops/**'
      - 'docs/crons/**'
      - 'tools/preflight.py'
      - 'tools/preflight_engine_chrome.py'
      - 'tools/preflight_ui_shim.py'
      - 'tools/public_surface_audit.py'
      - 'tools/public_surface_audit.allowlist'
      - 'tools/test_public_surface_audit.py'
      - 'ops/update-pipeline-status.py'
      - 'ops/test_update_pipeline_status.py'
      - 'static/**/*.css'
      - 'static/**/*.html'
      - 'assets/**/*.css'
      - 'layouts/**/*.html'
      - 'tools/preflight_monitor_links.py'
      - 'tools/test_preflight_monitor_links.py'
      - 'tools/inline_registry_into_navjs.py'
      - 'layouts/partials/footer.html'
      - 'layouts/partials/monitor-strip.html'
      - 'layouts/monitors/list.html'
      - 'content/commercial.md'
      - 'ops/ui-token-pairs.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    name: Pipeline preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install preflight test deps
        # Sprint BH BRIEF #2 (AD-2026-04-30-BJ): pyyaml is needed for the
        # ops/_pipeline_triggers_loader.py helper that the producer imports.
        # Without it the test runner exercises only the degraded code path.
        run: pip install pytest pyyaml

      - name: Run pipeline preflight
        run: python3 tools/preflight.py --verbose

      - name: Run engine-chrome preflight (footer + chip specs)
        run: python3 tools/preflight_engine_chrome.py

      - name: Run UI/accessibility preflight (SPEC-ENGINE-UI-FLOOR, AD-2026-04-19-02)
        # Supersedes preflight_mobile.py (retired per Q3/AD-2026-04-19-02).
        # Advisory during warn-phase (spec §5). Promote by removing continue-on-error.
        continue-on-error: true
        env:
          COMPUTER_SHIM_INTERNAL_READ: ${{ secrets.COMPUTER_SHIM_INTERNAL_READ }}
        run: python3 tools/preflight_ui_shim.py

      - name: Test monitor-links preflight regex (RX_CONCAT fixture suite)
        run: python3 tools/test_preflight_monitor_links.py

      - name: Run monitor-links preflight (ENGINE-RULES §17 — URL registry)
        run: python3 tools/preflight_monitor_links.py

      - name: Verify nav.js MONITOR_REGISTRY in sync with monitor-registry.json
        run: |
          python3 tools/inline_registry_into_navjs.py
          if ! git diff --quiet static/monitors/shared/js/nav.js; then
            echo "::error::nav.js MONITOR_REGISTRY drifted from monitor-registry.json"
            echo "Run: python3 tools/inline_registry_into_navjs.py and commit the result."
            git diff static/monitors/shared/js/nav.js
            exit 1
          fi
          echo "✓ nav.js MONITOR_REGISTRY in sync"

      - name: Test public-surface scanner (L1–L7 unit tests)
        run: python3 tools/test_public_surface_audit.py

      - name: Test pipeline-status producer (derive_public_rollup unit tests)
        run: python3 ops/test_update_pipeline_status.py

      - name: Run public-surface IP-leak audit (tools/public_surface_audit.py)
        # Hard-fails if any L1/L2/L3/L5/L7 redline pattern hits the public surface
        # (static/). docs/ deferred to separate triage sprint. See
        # tools/public_surface_audit.py header for rules.
        # Add legitimate exposures to tools/public_surface_audit.allowlist.
        run: python3 tools/public_surface_audit.py --root .
