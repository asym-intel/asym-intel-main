name: "Preflight Checks"

on:
  push:
    branches: [main, staging]
    paths:
      - '.github/workflows/*.yml'
      - 'pipeline/**'
      - 'static/monitors/**'
      - 'docs/crons/**'
      - 'tools/preflight.py'
      - 'tools/preflight_engine_chrome.py'
      - 'tools/preflight_ui_shim.py'
      - 'static/**/*.css'
      - 'static/**/*.html'
      - 'assets/**/*.css'
      - 'layouts/**/*.html'
      - 'tools/preflight_monitor_links.py'
      - 'tools/test_preflight_monitor_links.py'
      - 'tools/inline_registry_into_navjs.py'
      - 'layouts/partials/footer.html'
      - 'layouts/partials/monitor-strip.html'
      - 'layouts/monitors/list.html'
      - 'content/commercial.md'
      - 'ops/ui-token-pairs.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    name: Pipeline preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pipeline preflight
        run: python3 tools/preflight.py --verbose

      - name: Run engine-chrome preflight (footer + chip specs)
        run: python3 tools/preflight_engine_chrome.py

      - name: Run UI/accessibility preflight (SPEC-ENGINE-UI-FLOOR, AD-2026-04-19-02)
        # Supersedes preflight_mobile.py (retired per Q3/AD-2026-04-19-02).
        # Advisory during warn-phase (spec §5). Promote by removing continue-on-error.
        continue-on-error: true
        env:
          ENGINE_INTERNAL_READ_TOKEN: ${{ secrets.ENGINE_INTERNAL_READ_TOKEN }}
        run: python3 tools/preflight_ui_shim.py

      - name: Test monitor-links preflight regex (RX_CONCAT fixture suite)
        run: python3 tools/test_preflight_monitor_links.py

      - name: Run monitor-links preflight (ENGINE-RULES §17 — URL registry)
        run: python3 tools/preflight_monitor_links.py

      - name: Verify nav.js MONITOR_REGISTRY in sync with monitor-registry.json
        run: |
          python3 tools/inline_registry_into_navjs.py
          if ! git diff --quiet static/monitors/shared/js/nav.js; then
            echo "::error::nav.js MONITOR_REGISTRY drifted from monitor-registry.json"
            echo "Run: python3 tools/inline_registry_into_navjs.py and commit the result."
            git diff static/monitors/shared/js/nav.js
            exit 1
          fi
          echo "✓ nav.js MONITOR_REGISTRY in sync"
