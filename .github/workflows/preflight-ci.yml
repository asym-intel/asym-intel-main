name: "Preflight Checks"

on:
  push:
    branches: [main, staging]
    paths:
      - '.github/workflows/*.yml'
      - 'pipeline/**'
      - 'static/monitors/*/data/*.json'
      - 'docs/crons/**'
      - 'tools/preflight.py'
      - 'tools/preflight_engine_chrome.py'
      - 'tools/preflight_mobile.py'
      - 'static/**/*.css'
      - 'static/**/*.html'
      - 'assets/**/*.css'
      - 'layouts/**/*.html'
      - 'layouts/partials/footer.html'
      - 'content/commercial.md'
  workflow_dispatch:

jobs:
  preflight:
    name: Pipeline preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pipeline preflight
        run: python3 tools/preflight.py --verbose

      - name: Run engine-chrome preflight (footer + chip specs)
        run: python3 tools/preflight_engine_chrome.py

      - name: Run mobile/tablet preflight (advisory)
        # Governed by asym-intel-internal/ops/specs/mobile-tablet-spec.md
        # Advisory for first 2 weeks per new rule (spec §13). Failures surface
        # in logs but do not block the build. Promote rules to enforced by
        # removing `continue-on-error` or running without `|| true`.
        continue-on-error: true
        run: python3 tools/preflight_mobile.py
