name: SCEM Publisher — Weekly Report

on:
  # Schedule: Sunday 18:00 UTC (after synthesiser completes)
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish SCEM Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run SCEM Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: conflict-escalation
        run: python3 pipeline/publishers/publisher.py

      - name: Commit published report
        run: |
          git config user.name "SCEM Publisher Bot"
          git config user.email "scem-publisher@asym-intel.info"
          git add static/monitors/conflict-escalation/data/
          git add docs/monitors/conflict-escalation/data/
          git add content/monitors/conflict-escalation/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(scem): Issue $(python3 -c 'import json; print(json.load(open(\"static/monitors/conflict-escalation/data/report-latest.json\"))[\"meta\"][\"issue\"])') published by SCEM Publisher Bot"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
