name: Ramparts Publisher — Weekly WordPress Update

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill mode — override Step 0 freshness check (allows stale reports to publish). Use only for manual catch-up of missed weeks."
        type: boolean
        required: false
        default: false

jobs:
  publish:
    name: Publish to ramparts.gi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      # Ramparts repo = canonical source of front-end HTML/CSS/JS and ramparts-v2/data.
      # The publisher invokes node scripts/generate-static.js inside this checkout,
      # then POSTs the rendered HTML to WordPress.
      - name: Checkout Ramparts repo
        uses: actions/checkout@v6
        with:
          repository: asym-intel/Ramparts
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: ramparts-checkout
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch credentials from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/platform-config.md" \
            -o /tmp/platform-config.md

          python3 -c "
          import re
          text = open('/tmp/platform-config.md').read()
          def get(key):
              m = re.search(r'\| ' + key + r' \| ([^|]+)\|', text)
              return m.group(1).strip() if m else ''
          with open('/tmp/creds.env', 'w') as f:
              f.write(f'WP_USER={get(\"WP_USER\")}\n')
              f.write(f'WP_APP_PASS={get(\"WP_APP_PASS\")}\n')

          "
          # Mask the secret BEFORE exporting so any accidental echo in later
          # steps is redacted. (Prevents AD-2026-04-20 leak recurrence — see
          # run 24654557432 where WP_APP_PASS printed via env dump.)
          WP_APP_PASS_VALUE="$(grep '^WP_APP_PASS=' /tmp/creds.env | cut -d= -f2-)"
          echo "::add-mask::${WP_APP_PASS_VALUE}"
          cat /tmp/creds.env >> $GITHUB_ENV
          rm -f /tmp/platform-config.md /tmp/creds.env
          echo "Credentials loaded from internal repo (WP_APP_PASS masked)"

      - name: Run Ramparts Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          # WP_APP_PASS is already exported via $GITHUB_ENV and masked; do NOT
          # re-declare here — the explicit re-declare pattern was the surface
          # that echoed the secret in run 24654557432.
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
          BACKFILL: ${{ github.event.inputs.backfill }}
          RAMPARTS_REPO_CHECKOUT: ${{ github.workspace }}/ramparts-checkout
        run: python3 pipeline/publishers/ramparts-publisher.py

      # Post-publish snapshot + sanity check. Captures the live rendered page
      # as a regression baseline and hard-fails the run if M9 undefineds
      # reappear (P-011 class) or expected sections go missing.
      # Set repo variable SOFT_FAIL=true to demote hard-fail to warning.
      - name: Post-publish snapshot + sanity check
        env:
          SOFT_FAIL: ${{ vars.SNAPSHOT_SOFT_FAIL }}
        run: |
          SLUG=$(python3 -c "import json; d=json.load(open('static/monitors/ai-governance/data/report-latest.json')); print(d['meta']['slug'])")
          URL=$(python3 -c "import json; d=json.load(open('static/monitors/ai-governance/data/report-latest.json')); print(d['meta']['source_url'])")
          echo "Snapshot URL: $URL (slug=$SLUG)"
          # Give WP ~10s to flush post-publish cache before we fetch
          sleep 10
          python3 tools/snapshot.py \
            --url "$URL" \
            --issue-slug "$SLUG" \
            --label post-publish \
            --adapter-output static/monitors/ai-governance/data/report-latest.json \
            --sanity-check

      - name: Commit data updates
        run: |
          git config user.name "Ramparts Publisher Bot"
          git config user.email "build@ramparts.gi"
          git add static/monitors/ai-governance/data/ ops/snapshots/
          git diff --staged --quiet && echo "No data changes to commit" && exit 0
          git commit -m "data(ramparts): published to ramparts.gi — $(date -u +%Y-%m-%d) [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
