name: "Engine Post-Deploy Smoke — Layer B"

# Layer B of the Engine Audit Control Plane.
# Validates live CDN-served endpoints after each publisher workflow completes.
# Logic lives in asym-intel-internal/ops/engine_smoke_test.py (per §15 IP boundary).

on:
  workflow_run:
    workflows:
      - "AIM Publisher — Weekly Report"
      - "SCEM Publisher — Weekly Report"
      - "WDM Publisher — Weekly Report"
      - "ERM Publisher — Weekly Report"
      - "ESA Publisher — Weekly Report"
      - "FCW Publisher — Weekly Report"
      - "FIM Publisher — Weekly Report"
      - "GMM Publisher — Weekly Report"
    types: [completed]
  workflow_dispatch:
    inputs:
      monitor_slug:
        description: 'Monitor slug to smoke-test (e.g. european-strategic-autonomy)'
        required: true
        default: ''

jobs:
  smoke:
    name: Post-deploy smoke test
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6

      - name: Fetch smoke test script from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p ops
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/ops/engine_smoke_test.py" \
            -o ops/engine_smoke_test.py \
            && echo "✓ Smoke test script fetched ($(wc -c < ops/engine_smoke_test.py) bytes)" \
            || { echo "✗ Failed to fetch smoke test script"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run smoke test
        env:
          REPO_ROOT: ${{ github.workspace }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name || '' }}
          MONITOR_SLUG: ${{ github.event.inputs.monitor_slug || '' }}
          CF_ZONE_ID: "cc419b7519eba04ef0dc6a7b851930c7"
          CF_API_TOKEN: ${{ secrets.PPLX_COMPUTER_ASYM_ENGINE }}
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
          GH_REPO: ${{ github.repository }}
        run: python3 ops/engine_smoke_test.py
