# engine-post-deploy-smoke.yml — Layer B North Star post-deploy smoke test
#
# Runs engine_smoke_test.py against all 7 monitor reader URLs after any
# publisher deploy. Can also be triggered manually (workflow_dispatch).
#
# Gates:
#   GATE-P3-BRIEF-PRESENT  — HTTP 200 + body >= 5000 chars
#   GATE-P3-NORTH-STAR     — <h1>/<h2> present + no sentinel strings
#
# Authority: BX-9 PGTR (AD-2026-05-14-BX-PGTR)

name: Engine Post-Deploy Smoke Test

on:
  workflow_call:
    inputs:
      monitor-slug:
        description: "Monitor slug to test (leave empty to test all)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      monitor-slug:
        description: "Monitor slug to test (leave empty to test all)"
        required: false
        type: string
        default: ""

jobs:
  smoke-test:
    name: North Star Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke test (all monitors)
        if: ${{ inputs.monitor-slug == '' }}
        run: |
          python3 pipeline/tools/engine_smoke_test.py --all

      - name: Run smoke test (single monitor)
        if: ${{ inputs.monitor-slug != '' }}
        run: |
          python3 pipeline/tools/engine_smoke_test.py \
            --monitor "${{ inputs.monitor-slug }}"

      - name: Summarise result
        if: always()
        run: |
          echo "Smoke test complete. Exit code captured by prior step."
          echo "NORTH STAR: a real reader must see real content on a real page."
          echo "workflow exit 0 ≠ success — only north-star green is green."
