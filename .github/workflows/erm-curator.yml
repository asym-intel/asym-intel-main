name: "Environmental Risks Monitor Curator"

# ── Sprint AM — ERM Curator role ──
# workflow_dispatch only at Sprint AM merge time per AD-2026-04-26-AM
# §"What this AD does NOT do" item 6.
#
# Mirrors AGM curator workflow structure verbatim (AD-2026-04-26-AM).
# LLM-FREE — deterministic drift detection only (design F2). No PPLX_API_KEY
# needed. Four typed triggers (T1–T4) at advisory severity only (F5).
# NON-BLOCKING by design (F6). T2 tracked_predicates empty for ERM
# initially (see metadata.yml curator block — to be catalogued post
# first-material-cycle).
#
# workflow_run chained after Applier success (depth 0 → 1, valid per
# AGM applier 2026-04-26 chain-depth-reset topology).

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Environmental Risks Monitor Applier"]
    types:
      - completed

jobs:
  curate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      monitor: environmental-risks

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main
          # Curator needs prior cycle history for T1/T4 windows.
          fetch-depth: 0

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/environmental-risks
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/environmental-risks
          cp -v internal/pipeline/monitors/environmental-risks/metadata.yml \
                pipeline/monitors/environmental-risks/

      # Skip-on-missing guard. Curator needs apply-latest.json at minimum.
      - name: Check upstream artefacts
        id: check
        run: |
          A="pipeline/monitors/environmental-risks/applied/apply-latest.json"
          I="pipeline/monitors/environmental-risks/synthesised/interpret-latest.json"
          MISSING=""
          [ -f "$A" ] || MISSING="${MISSING} apply-latest"
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Curator."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run ERM curator (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:      ${{ github.workspace }}
          PYTHONPATH:     internal
          CURATOR_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_SHA:     ${{ github.sha }}
        run: python -m pipeline.engine.curator_base --monitor environmental-risks

      - name: Commit curator output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/environmental-risks/curator/
          git diff --cached --quiet || git commit -m "chore(erm): curator run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
