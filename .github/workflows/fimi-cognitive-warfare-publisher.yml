name: FCW Publisher — Weekly Report
# Sprint-2 G-PUBLISHER-REUSABLE — thin caller. Reusable body: _reusable-publisher.yml

on:
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Override output date (YYYY-MM-DD). Leave blank to use today (UTC). Use when re-running for a past cycle."
        required: false
        default: ""
        type: string
      force:
        description: 'AD-2026-04-24l governed re-issue — skip freshness/E5 guards.'
        required: false
        default: false
        type: boolean
      force_reason:
        required: false
        default: ''
        type: string
      force_ad:
        required: false
        default: ''
        type: string
      force_operator:
        required: false
        default: ''
        type: string
  workflow_run:
    workflows: ["FIMI & Cognitive Warfare Monitor Curator"]
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-publisher.yml
    with:
      slug: fimi-cognitive-warfare
      publish_date: ${{ inputs.publish_date || '' }}
      force: ${{ inputs.force == true }}
      force_reason: ${{ inputs.force_reason || '' }}
      force_ad: ${{ inputs.force_ad || '' }}
      force_operator: ${{ inputs.force_operator || '' }}
    secrets: inherit
