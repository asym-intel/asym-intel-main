name: "SCEM Curator"

# ── Sprint AM — Curator role (SCEM) ──
# Chained after SCEM Applier success. Reads the live cycle's
# interpret-latest.json + chains-latest.json + apply-latest.json, plus
# the prior N cycles' interpret/chains archives, and produces:
#   - drift-register-YYYY-MM-DD.json (immutable per-cycle)
#   - drift-register-latest.json (rolling pointer)
# LLM-FREE — deterministic drift detection only. No PPLX_API_KEY needed.
# No ANTHROPIC_API_KEY: stays on Sonar per D1 §7.1.
#
# Four typed triggers (T1-T4) at advisory severity — never blocks publish.
# T2 tracked_predicates LEFT EMPTY for SCEM at Sprint AM — populate
# in follow-up sprint after first material cycle per BRIEF §1.3.
#
# No schedule trigger: workflow_dispatch only at Sprint AM merge time.
# Per AD-2026-04-26-AM + AD-2026-04-23k.

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["SCEM Applier"]
    types:
      - completed

jobs:
  curate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      monitor: conflict-escalation

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main
          fetch-depth: 0

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/conflict-escalation
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/conflict-escalation
          cp -v internal/pipeline/monitors/conflict-escalation/metadata.yml \
                pipeline/monitors/conflict-escalation/

      - name: Check upstream artefacts
        id: check
        run: |
          A="pipeline/monitors/conflict-escalation/applied/apply-latest.json"
          I="pipeline/monitors/conflict-escalation/synthesised/interpret-latest.json"
          MISSING=""
          [ -f "$A" ] || MISSING="${MISSING} apply-latest"
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Curator."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run SCEM curator (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:      ${{ github.workspace }}
          PYTHONPATH:     internal
          CURATOR_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_SHA:     ${{ github.sha }}
        run: python -m pipeline.engine.curator_base --monitor conflict-escalation

      - name: Commit curator output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/conflict-escalation/curator/
          git diff --cached --quiet || git commit -m "chore(scem): curator run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
