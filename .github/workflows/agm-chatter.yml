name: AGM Chatter — Daily Signal

on:
  schedule:
    - cron: "0 6 * * 6"   # Sat 06:00 UTC — AGM day
  workflow_dispatch:

jobs:
  chatter:
    name: AGM Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run FCW Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/ai-governance/agm-chatter.py
      - name: Commit chatter output
        run: |
          git config user.name "AGM Chatter Bot"
          git config user.email "agm-chatter@asym-intel.info"
          git add static/monitors/ai-governance/data/chatter*.json
          git diff --staged --quiet && echo "No chatter output to commit" && exit 0
          git commit -m "data(agm-chatter): daily signal — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
