name: "Engine Runtime Audit — Layer C"

# Layer C of the Engine Audit Control Plane.
# Weekly cross-engine sweep: all monitors + sister sites.
# After audit, compiles consolidated audit-status.json.
# Logic lives in asym-intel-internal/ops/ (per §15 IP boundary).

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Weekly runtime audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Fetch audit scripts from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p ops
          for script in engine_runtime_audit.py compile_audit_status.py; do
            curl -sf -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/ops/${script}" \
              -o "ops/${script}" \
              && echo "✓ ${script} fetched ($(wc -c < ops/${script}) bytes)" \
              || { echo "✗ Failed to fetch ${script}"; exit 1; }
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run runtime audit
        env:
          REPO_ROOT: ${{ github.workspace }}
          CF_ZONE_ID: "cc419b7519eba04ef0dc6a7b851930c7"
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
          GH_REPO: ${{ github.repository }}
        run: python3 ops/engine_runtime_audit.py

      - name: Compile audit status
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: python3 ops/compile_audit_status.py

      - name: Commit audit-status.json
        run: |
          git config user.name "Engine Audit Bot"
          git config user.email "audit@asym-intel.info"
          git add static/ops/audit-status.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ops(audit): update audit-status.json — Layer C runtime audit"
          git push origin main
