name: "Engine Runtime Audit — Layer C"

# Layer C of the Engine Audit Control Plane.
# Weekly cross-engine sweep: all monitors + sister sites.
# Logic lives in asym-intel-internal/ops/engine_runtime_audit.py (per §15 IP boundary).

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Weekly runtime audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v5

      - name: Fetch runtime audit script from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p ops
          # Fetch runtime audit script
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/ops/engine_runtime_audit.py" \
            -o ops/engine_runtime_audit.py \
            && echo "✓ Runtime audit script fetched ($(wc -c < ops/engine_runtime_audit.py) bytes)" \
            || { echo "✗ Failed to fetch runtime audit script"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run runtime audit
        env:
          REPO_ROOT: ${{ github.workspace }}
          CF_ZONE_ID: "cc419b7519eba04ef0dc6a7b851930c7"
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python3 ops/engine_runtime_audit.py
