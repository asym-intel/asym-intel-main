name: "Cross-Monitor Synthesiser"

on:
  workflow_dispatch:

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run cross-monitor synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          python pipeline/synthesisers/cross-monitor/cross-monitor-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/cross-monitor/
          git diff --cached --quiet || git commit -m "data(xm): cross-monitor synthesis $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
