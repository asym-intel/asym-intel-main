name: "Cross-Monitor Synthesiser"

on:
  workflow_dispatch:
  schedule:
    # Sunday 18:30 UTC — 30 min after SCEM publisher (Sun 18:00 UTC).
    # See docs/cross-monitor-methodology.md — synthesiser reads all 7 monitor
    # report-latest.json files at synthesis time, so must run after SCEM closes
    # the week.
    - cron: '30 18 * * 0'

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run cross-monitor synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          python pipeline/synthesisers/cross-monitor/cross-monitor-synthesiser.py

      # X-2: publish synthesis JSON to the public /data/ path for /synthesis/
      # page and homepage widget to consume. Dated archive (future: /synthesis/
      # archive page once ≥4 weeks accumulate).
      - name: Publish synthesis JSON to static/data
        run: |
          set -euo pipefail
          mkdir -p static/data/synthesis
          src="pipeline/cross-monitor/synthesis-latest.json"
          if [ ! -f "$src" ]; then
            echo "No synthesis-latest.json to publish — skipping."
            exit 0
          fi
          # Public copies: latest + dated archive
          cp "$src" static/data/synthesis-latest.json
          week=$(python3 -c "import json,sys; d=json.load(open('$src')); print(d.get('week_ending') or d.get('_meta',{}).get('week_ending') or '')")
          if [ -n "$week" ]; then
            cp "$src" "static/data/synthesis/synthesis-$week.json"
          fi

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/cross-monitor/ static/data/synthesis-latest.json static/data/synthesis/ || true
          git diff --cached --quiet || git commit -m "data(xm): cross-monitor synthesis $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push

      # CF cache purge — non-blocking. Data is still republished via commit;
      # cache will expire naturally within the configured TTL if purge fails.
      # CF_API_TOKEN needs Zone > Cache Purge on zone cc419b7519eba04ef0dc6a7b851930c7.
      - name: Purge Cloudflare cache for synthesis JSON
        if: success()
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.PPLX_COMPUTER_ASYM_ENGINE }}
          CF_ZONE_ID:   cc419b7519eba04ef0dc6a7b851930c7
        run: |
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::warning::CF_API_TOKEN not set — skipping CF purge."
            exit 0
          fi
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://asym-intel.info/data/synthesis-latest.json"]}' \
            | tee /tmp/cf-purge.json
          if ! grep -q '"success":true' /tmp/cf-purge.json; then
            echo "::warning::CF cache purge failed — TTL expiry will catch up."
          fi
