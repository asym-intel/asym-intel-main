name: "European Strategic Autonomy Monitor Interpreter"

# ── Sprint AM — ESA Interpreter role ──
# workflow_dispatch-only at Sprint AM merge time per AD-2026-04-26-AM
# §"What this AD does NOT do" item 6. Cron chaining is a separate sprint
# after first-Friday observation lands clean.
# Reads weekly-latest.json + reasoner-latest.json (via paths.weekly_latest
# + paths.reasoner_latest in metadata) and emits interpret-latest.json.
# Topology mirrors AGM interpreter; emits_patches: false for ESA initially
# (see metadata.yml interpreter: block — flip to true after first stable cycle).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (default: sonar-pro)'
        required: false
        default: ''
      weekly-file:
        description: 'Override weekly bundle filename (e.g. weekly-2026-04-23.json). Empty = use weekly-latest.json.'
        required: false
        default: ''

jobs:
  interpret:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      # ── engine + bespoke config live in internal repo ──
      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.GH_TOKEN }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/monitors/european-strategic-autonomy
          sparse-checkout-cone-mode: false

      - name: Fetch ESA methodology + identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/methodology docs/identity

          # Identity card (analytical quality standard)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-ESA.md" \
            -o docs/identity/esa-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/esa-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

          # Methodology (private IP — stays in internal repo)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/european-strategic-autonomy-full.md" \
            -o docs/methodology/european-strategic-autonomy-full.md \
            && echo "ESA methodology fetched ($(wc -c < docs/methodology/european-strategic-autonomy-full.md) bytes)" \
            || echo "WARNING: Methodology not found — continuing without it"

          # Addendum (optional — don't fail if absent)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/european-strategic-autonomy-ecfr-2026.md" \
            -o docs/methodology/european-strategic-autonomy-addendum.md \
            && echo "ESA addendum fetched ($(wc -c < docs/methodology/european-strategic-autonomy-addendum.md) bytes)" \
            || echo "No addendum found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      # The engine reads bespoke files via paths resolved relative to CWD
      # (public-main root). Stage the internal checkout's bespoke files there.
      # §15 IP boundary preserved — they are never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/european-strategic-autonomy
          cp -v internal/pipeline/monitors/european-strategic-autonomy/metadata.yml            pipeline/monitors/european-strategic-autonomy/
          cp -v internal/pipeline/monitors/european-strategic-autonomy/interpreter-prompt.txt  pipeline/monitors/european-strategic-autonomy/
          cp -v internal/pipeline/monitors/european-strategic-autonomy/interpreter-schema.json pipeline/monitors/european-strategic-autonomy/

      - name: Run ESA interpreter (engine dispatch)
        env:
          PPLX_API_KEY:             ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:                 ${{ secrets.GH_TOKEN }}
          REPO_ROOT:                ${{ github.workspace }}
          SYNTH_MODEL:              ${{ github.event.inputs.model }}
          WEEKLY_FILE_OVERRIDE:     ${{ github.event.inputs.weekly-file }}
          monitor:                  european-strategic-autonomy
          PYTHONPATH:               internal
        run: python -m pipeline.engine.interpret_base --monitor european-strategic-autonomy

      - name: Commit interpret output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/european-strategic-autonomy/synthesised/
          git diff --cached --quiet || git commit -m "chore(esa): interpreter run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
