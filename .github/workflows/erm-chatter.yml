name: ERM Chatter — Daily Signal

on:
  workflow_dispatch:  # Schedule DISABLED 13 Apr 2026 — replaced by unified-chatter.yml

jobs:
  chatter:
    name: ERM Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run ERM Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/environmental-risks/erm-chatter.py
      - name: Commit chatter output
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          commit-message: "data(erm-chatter): daily signal — $(date -u +%Y-%m-%d)"
          add-paths: "static/monitors/environmental-risks/data/chatter*.json"
          bot-name: "ERM Chatter Bot"
          bot-email: "erm-chatter@asym-intel.info"
