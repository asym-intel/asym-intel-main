name: "Environmental Risks Monitor Reviewer"

# ── Sprint AM — ERM Reviewer role ──
# workflow_dispatch only at Sprint AM merge time per AD-2026-04-26-AM
# §"What this AD does NOT do" item 6. Cron-resumption and workflow_run
# chaining to be added in a follow-up sprint after first-Friday
# observation lands clean.
#
# Mirrors AGM reviewer workflow structure verbatim (AD-2026-04-26-AM).
# Independence mechanism: rule-engine verdict is LLM-independent (R1–R7).
# No ANTHROPIC_API_KEY — stays on Sonar per D1 §7.1.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (default: sonar-pro)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (rule engine only) — "1" to enable'
        required: false
        default: ''

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      monitor: environmental-risks

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.GH_TOKEN }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/monitors/environmental-risks
          sparse-checkout-cone-mode: false

      - name: Fetch ERM identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/identity

          # Identity card (analytical quality standard — shared across roles)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-ERM.md" \
            -o docs/identity/erm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/erm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/environmental-risks
          cp -v internal/pipeline/monitors/environmental-risks/metadata.yml          pipeline/monitors/environmental-risks/
          cp -v internal/pipeline/monitors/environmental-risks/reviewer-prompt.txt   pipeline/monitors/environmental-risks/
          cp -v internal/pipeline/monitors/environmental-risks/reviewer-schema.json  pipeline/monitors/environmental-risks/

      - name: Check upstream interpret output
        id: check
        run: |
          INTERPRET_PATH="pipeline/monitors/environmental-risks/synthesised/interpret-latest.json"
          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Reviewer."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run ERM reviewer (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          PPLX_API_KEY:    ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          REPO_ROOT:       ${{ github.workspace }}
          REVIEW_MODEL:    ${{ github.event.inputs.model }}
          REVIEWER_NO_LLM: ${{ github.event.inputs.no_llm }}
          PYTHONPATH:      internal
        run: python -m pipeline.engine.review_base --monitor environmental-risks

      - name: Commit review output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/environmental-risks/synthesised/
          git diff --cached --quiet || git commit -m "chore(erm): reviewer run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
