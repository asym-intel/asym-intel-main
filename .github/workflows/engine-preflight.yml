name: "Engine Preflight — Layer A"

# Layer A of the Engine Audit Control Plane.
# Validates structural schema conformance of published report JSON.
# Logic lives in asym-intel-internal/ops/engine_preflight.py (per §15 IP boundary).
#
# IMPORTANT: This workflow is listed as a required status check on main.
# GitHub treats a required check as "pending" (blocking) if the workflow
# never fires for a given push or PR. To avoid blocking non-report changes
# (collectors, reasoners, synthesisers, etc.), a skip job always runs and
# emits a passing status when the paths filter means the preflight job
# won't run. The branch protection check name "Engine Preflight — Layer A"
# matches the check-paths job name, so a skip always satisfies it.
#
# Trigger surface (AD-2026-04-20f):
#   push           → main branch commits (existing)
#   pull_request   → PRs targeting main (added — fixes Layer A PR-trigger gap)
#   workflow_dispatch → manual run, optional monitor_slug
#
# pull_request (not pull_request_target) is correct here: this repo is
# private, all PRs come from internal branches, no fork-PR threat model.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      monitor_slug:
        description: 'Monitor slug to check (empty = all monitors)'
        required: false
        default: ''

jobs:
  # Runs on every push and PR. Detects whether any report JSON changed.
  # If not, emits a pass so the required status check is satisfied.
  check-paths:
    name: Engine Preflight — Layer A
    runs-on: ubuntu-latest
    outputs:
      run_preflight: ${{ steps.filter.outputs.reports }}
    steps:
      - uses: actions/checkout@v6
        with:
          # On PR events, fetch enough history to diff against base.
          # On push, depth 0 lets us reach event.before reliably.
          fetch-depth: 0

      - name: Check if report JSON changed
        id: filter
        run: |
          # workflow_dispatch: always run preflight
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "reports=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — running preflight."
            exit 0
          fi

          # Determine diff base by event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "pull_request event — base=$BASE_SHA head=$HEAD_SHA"
          else
            # push event
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            echo "push event — before=$BASE_SHA sha=$HEAD_SHA"
          fi

          # Guard against missing/zero base (initial push, force-push, shallow clone).
          # Treat as "run preflight" — fail-safe toward checking, not skipping.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "reports=true" >> "$GITHUB_OUTPUT"
            echo "Base SHA missing or zero — running preflight (fail-safe)."
            exit 0
          fi

          git fetch origin "$BASE_SHA" --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null \
            | grep -E "^static/monitors/.*/data/report" || true)
          if [ -n "$CHANGED" ]; then
            echo "reports=true" >> "$GITHUB_OUTPUT"
            echo "Report JSON changed — running preflight on: $CHANGED"
          else
            echo "reports=false" >> "$GITHUB_OUTPUT"
            echo "No report JSON changed — preflight skipped (pass)."
          fi

  preflight:
    name: Engine schema preflight
    needs: check-paths
    if: needs.check-paths.outputs.run_preflight == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6

      - name: Fetch preflight script from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p ops
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/ops/engine_preflight.py" \
            -o ops/engine_preflight.py \
            && echo "✓ Preflight script fetched ($(wc -c < ops/engine_preflight.py) bytes)" \
            || { echo "✗ Failed to fetch preflight script"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run preflight
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: ${{ github.event.inputs.monitor_slug || '' }}
        run: python3 ops/engine_preflight.py
