name: Rebuild Network Graph

on:
  # Run daily at 20:00 UTC — after all publishers have completed for the day
  schedule:
    - cron: "0 20 * * *"
  # Also trigger after any publisher completes
  workflow_run:
    workflows:
      - "AIM Publisher — Weekly Report"
      - "SCEM Publisher — Weekly Report"
      - "WDM Publisher — Weekly Report"
      - "GMM Publisher — Weekly Report"
      - "ESA Publisher — Weekly Report"
      - "FCW Publisher — Weekly Report"
      - "ERM Publisher — Weekly Report"
    types: [completed]
  workflow_dispatch:

concurrency:
  group: rebuild-network-graph
  cancel-in-progress: true

jobs:
  rebuild:
    name: Rebuild graph.json from live data
    runs-on: ubuntu-latest
    # Only run on workflow_run if the publisher succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run build_graph.py
        run: python3 pipeline/tools/build_graph.py

      - name: Commit updated graph.json
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          commit-message: "data(network): auto-update graph.json [skip ci]"
          add-paths: "static/network/data/graph.json docs/network/data/graph.json"
          bot-name: "github-actions[bot]"
          bot-email: "github-actions[bot]@users.noreply.github.com"
