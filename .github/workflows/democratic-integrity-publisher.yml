name: WDM Publisher — Weekly Report

on:
  # Schedule: Monday 06:00 UTC (after synthesiser completes)
  # DISABLED until validated — enable by uncommenting the schedule line
  schedule:
    - cron: "30 9 * * 1"    # Monday 14:00 UTC — final stage, synthesiser at 12:00
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish WDM Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run WDM Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: democratic-integrity
        run: python3 pipeline/publishers/publisher.py

      - name: Commit published report
        run: |
          git config user.name "WDM Publisher Bot"
          git config user.email "wdm-publisher@asym-intel.info"
          git add static/monitors/democratic-integrity/data/
          git add docs/monitors/democratic-integrity/data/
          git add content/monitors/democratic-integrity/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(wdm): Issue $(python3 -c 'import json; print(json.load(open(\"static/monitors/democratic-integrity/data/report-latest.json\"))[\"meta\"][\"issue\"])') published by WDM Publisher Bot"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
