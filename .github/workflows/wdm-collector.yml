name: WDM Collector — Tier 0 daily pre-verification

on:
  schedule:
    - cron: "0 7 * * *"     # daily 07:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab for testing

jobs:
  collect:
    name: WDM Tier 0 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to commit pipeline/ output back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run WDM Collector
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/democratic-integrity/collect.py

      - name: Commit Collector output
        run: |
          git config user.name  "WDM Collector Bot"
          git config user.email "wdm-collector@asym-intel.info"
          git add pipeline/monitors/democratic-integrity/daily/
          git diff --staged --quiet && echo "No new findings to commit" && exit 0
          git commit -m "data(wdm-collector): Tier 0 daily pre-verification — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
