name: FIM Chatter — Standalone fallback (emergency single-monitor re-run)

on:
  workflow_dispatch:        # Manual trigger only — normal chatter via unified-chatter.yml

jobs:
  chatter:
    name: FIM Standalone Chatter
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run FIM Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/financial-integrity/fim-chatter.py

      - name: Commit Chatter output
        run: |
          git config user.name  "FIM Chatter Bot"
          git config user.email "fim-chatter@asym-intel.info"
          git add static/monitors/financial-integrity/data/
          git diff --staged --quiet && echo "No new chatter to commit" && exit 0
          git commit -m "data(fim-chatter): standalone fallback — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
