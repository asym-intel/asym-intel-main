name: "WDM Reviewer"
# Sprint CD — thin caller. Reusable body: _reusable-reviewer.yml
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (optional)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call — "1" to enable'
        required: false
        default: ''
      force:
        description: 'AD-2026-04-24l force-rerun (skip E5 same-day guard)'
        type: boolean
        default: false
      force_reason:
        description: 'Required with force. 20-500 chars.'
        type: string
        default: ''
      force_ad:
        description: 'Required with force. AD reference.'
        type: string
        default: ''
      force_operator:
        description: 'Required with force. GitHub handle.'
        type: string
        default: ''
  workflow_run:
    workflows: ["WDM Interpreter"]
    types: [completed]
jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-reviewer.yml
    with:
      slug: democratic-integrity
      model: ${{ inputs.model || '' }}
      no_llm: ${{ inputs.no_llm || '' }}
      force: ${{ inputs.force }}
      force_reason: ${{ inputs.force_reason || '' }}
      force_ad: ${{ inputs.force_ad || '' }}
      force_operator: ${{ inputs.force_operator || '' }}
    secrets: inherit
