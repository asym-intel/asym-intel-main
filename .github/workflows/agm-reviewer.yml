name: "AI Governance Monitor Reviewer"

# ── Sprint 3 Step 2b — Reviewer role ──
# Chained after Interpreter success, upstream of Composer. Reads
# interpret-latest.json and produces review-latest.json with a
# deterministic verdict (set by rule engine R1–R7 in review_base.py)
# plus LLM-advisory notes[]. The Composer downstream honours the
# verdict: REJECT / SKIP_ERROR_CYCLE → early exit; APPROVE /
# APPROVE_WITH_FLAGS / SKIP_NULL_CYCLE → normal render path.
#
# Design: session-artefacts/2026-04-23-sprint3-step2/step-2-design.md
# Ratified: AD-2026-04-23i (internal@352df92)
# Topology: D5 Option A — separate workflow, workflow_run chained.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (default: sonar-pro)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (rule engine only) — "1" to enable'
        required: false
        default: ''
  workflow_run:
    workflows: ["AI Governance Monitor Interpreter"]
    types:
      - completed

jobs:
  review:
    # Gate: only run if upstream interpreter actually succeeded.
    # workflow_dispatch runs always pass this guard.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          # workflow_run always starts from default branch HEAD; make that
          # explicit so we see the interpret-latest.json the upstream job
          # just committed.
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/ai-governance
          sparse-checkout-cone-mode: false

      - name: Fetch AGM identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/identity

          # Identity card (analytical quality standard — shared across roles)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-AGM.md" \
            -o docs/identity/agm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/agm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      # The engine reads bespoke files via paths resolved relative to CWD
      # (public-main root). Stage the internal checkout's bespoke files
      # there. §15 IP boundary preserved — they are never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/ai-governance
          cp -v internal/pipeline/monitors/ai-governance/metadata.yml          pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/reviewer-prompt.txt   pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/reviewer-schema.json  pipeline/monitors/ai-governance/

      # Skip-on-missing guard. If upstream Interpreter didn't produce
      # interpret-latest.json (e.g. the workflow errored before commit),
      # exit 0 so the chain doesn't block. Composer will fall back via
      # its own missing-interpret guard.
      - name: Check upstream interpret output
        id: check
        run: |
          INTERPRET_PATH="pipeline/monitors/ai-governance/synthesised/interpret-latest.json"
          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Reviewer."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run AGM reviewer (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          PPLX_API_KEY:   ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:       ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:      ${{ github.workspace }}
          REVIEW_MODEL:   ${{ github.event.inputs.model }}
          REVIEWER_NO_LLM: ${{ github.event.inputs.no_llm }}
          PYTHONPATH:     internal
        run: python -m pipeline.engine.review_base --monitor ai-governance

      - name: Commit review output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/ai-governance/synthesised/
          git diff --cached --quiet || git commit -m "chore(agm): reviewer run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
