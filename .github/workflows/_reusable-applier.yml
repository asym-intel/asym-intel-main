name: "_reusable-applier"
# Reusable applier workflow — called by 8 per-monitor thin callers.
# Sprint CD, AD-2026-05-03-CD.
# DO NOT add workflow_dispatch or workflow_run triggers here.
# DO NOT hardcode any monitor slug. All slug-specific values derive from `inputs.slug`.
#
# LLM-FREE — deterministic stitching only (design E6). No PPLX_API_KEY,
# no ANTHROPIC_API_KEY, no SYNTH_MODEL. No prompt/schema staging. The
# applier reads interpret-latest.json + review-latest.json +
# compose-latest.json and emits apply-*.json + chains-*.json manifests.
# Replay-safe given the same three input SHAs + today's date.
#
# Chain-depth reset: applier callers use workflow_dispatch ONLY (no
# workflow_run trigger). The cron path is Reasoner [dispatch] →
# Interpreter [wf_run-1] → Reviewer [wf_run-2] → Composer [wf_run-3 —
# LIMIT]. Composer triggers Applier via `gh workflow run` (depth-0
# dispatch) so Applier→Curator [wf_run-1] remains valid.

on:
  workflow_call:
    inputs:
      slug:
        description: 'Monitor slug (e.g. ai-governance, financial-integrity)'
        type: string
        required: true
    secrets:
      ASYM_INTEL_PIPELINE:
        required: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/${{ inputs.slug }}
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      # The engine reads bespoke metadata.yml via paths resolved relative
      # to CWD (public-main root). Stage the internal checkout's metadata
      # there. §15 IP boundary preserved — it is never committed back.
      # No prompt/schema staging (LLM-free).
      - name: Stage bespoke config into expected paths
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          mkdir -p "pipeline/monitors/${SLUG}"
          cp -v "internal/pipeline/monitors/${SLUG}/metadata.yml" \
                "pipeline/monitors/${SLUG}/"

      # Skip-on-missing guard. All three upstream artefacts are required;
      # if any is absent (upstream errored before commit) exit 0 so the
      # chain doesn't block. Pre-empt the engine's applier_error manifest
      # so we don't commit transient upstream hiccups to the public repo.
      - name: Check upstream artefacts
        id: check
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          I="pipeline/monitors/${SLUG}/synthesised/interpret-latest.json"
          R="pipeline/monitors/${SLUG}/synthesised/review-latest.json"
          C="pipeline/monitors/${SLUG}/synthesised/compose-latest.json"
          MISSING=""
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          [ -f "$R" ] || MISSING="${MISSING} review-latest"
          [ -f "$C" ] || MISSING="${MISSING} compose-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Applier."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run applier (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:        ${{ github.workspace }}
          PYTHONPATH:       internal
          # Provenance telemetry — stripped from public apply-latest.json
          # by sanitise_manifest_for_public() (design §3.1 + E7). Retained
          # in the dated manifest for internal replay.
          INTERPRET_RUN_ID: ${{ github.event.workflow_run.id }}
          REVIEW_RUN_ID:    ${{ github.event.workflow_run.id }}
          COMPOSE_RUN_ID:   ${{ github.event.workflow_run.id }}
        run: python -m pipeline.engine.apply_base --monitor ${{ inputs.slug }}

      - name: Commit applier output
        if: steps.check.outputs.skip != 'true'
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          # apply-debug-*.json is engine-internal telemetry (keeps full
          # provenance run IDs for debugging). It is intentionally NOT
          # committed to the public repo — per engine docstring §3.1.
          rm -f "pipeline/monitors/${SLUG}/applied/apply-debug-*.json"
          git add "pipeline/monitors/${SLUG}/applied/"
          git diff --cached --quiet || git commit -m "chore(${SLUG}): applier run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
