name: "World Democracy Monitor Synthesiser"

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (default: sonar-deep-research)'
        required: false
        default: ''

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests


      - name: Fetch identity card from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-WDM.md" \
            -o docs/identity/wdm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/wdm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Run WDM synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
          SYNTH_MODEL: ${{ github.event.inputs.model }}
        run: |
          python pipeline/synthesisers/wdm/democratic-integrity-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/democratic-integrity/synthesised/
          git diff --cached --quiet || git commit -m "chore(wdm): synthesiser run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
