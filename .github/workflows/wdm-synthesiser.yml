name: "World Democracy Monitor Synthesiser"

on:
  schedule:
    - cron: "0 21 * * 0"  # Sunday 21:00 UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (default: sonar-deep-research)'
        required: false
        default: ''

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run WDM synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
          SYNTH_MODEL: ${{ github.event.inputs.model }}
        run: |
          python pipeline/synthesisers/wdm/democratic-integrity-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/democratic-integrity/synthesised/
          git diff --cached --quiet || git commit -m "chore(wdm): synthesiser run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
