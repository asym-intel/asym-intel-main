name: Inject network bar into all monitor pages

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'static/monitors/**/*.html'
      - '.github/network-bar.html'

concurrency:
  group: inject-network-bar-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  inject:
    name: Inject network bar into all monitor pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject network bar into all monitor HTML pages
        run: |
          CHANGED=0

          # Write the strip script to a temp file (heredoc inside run: breaks YAML parsing)
          cat > /tmp/strip_bar.py << 'EOF'
          import sys, re
          path = sys.argv[1]
          with open(path) as f:
              c = f.read()
          c = re.sub(
              r'</head>\s*<style>\s*body\{padding-top:40px[^<]*</style>'
              r'<nav data-asym-network-bar[^>]*>.*?</nav>'
              r'(?:<style>[^<]*\.nb-links[^<]*</style>)?\s*(<body>)',
              r'</head>\n\n\1', c, flags=re.DOTALL)
          c = re.sub(
              r'(<body>)\s*\n<style>\s*body\{padding-top:40px[^<]*</style>'
              r'<nav data-asym-network-bar[^>]*>.*?</nav>'
              r'(?:<style>[^<]*\.nb-links[^<]*</style>)?\s*\n',
              r'\1\n\n', c, flags=re.DOTALL)
          with open(path, 'w') as f:
              f.write(c)
          print(f"  Stripped inline bar from {path}")
          EOF

          # All standard monitor pages — all 8 per monitor
          for PAGE in static/monitors/*/*.html; do
            if [ ! -f "$PAGE" ]; then continue; fi

            # Skip shared templates (they are partials, not served pages)
            if [[ "$PAGE" == *"/shared/"* ]]; then continue; fi

            # nav.js now auto-injects the network bar — verify it is referenced
            if ! grep -q 'shared/js/nav.js' "$PAGE"; then
              echo "WARNING: $PAGE does not reference nav.js — network bar will not auto-inject"
            fi

            # Check for stale inline network bar HTML (pre-Blueprint-v2.1 pages)
            if grep -q '<nav data-asym-network-bar' "$PAGE"; then
              echo "STALE: $PAGE has inline network bar — stripping"
              python3 /tmp/strip_bar.py "$PAGE"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ]; then
            echo "All pages clean — no inline network bars found"
            exit 0
          fi

      - name: Commit cleaned pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet static/monitors/; then
            echo "No changes — skipping commit"
          else
            git add static/monitors/
            git commit -m "build: strip stale inline network bars — nav.js handles injection [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
