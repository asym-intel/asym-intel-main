name: "European Strategic Autonomy Monitor Curator"

# ── Sprint AM — ESA Curator role ──
# workflow_dispatch-only at Sprint AM merge time per AD-2026-04-26-AM
# §"What this AD does NOT do" item 6. Cron chaining is a separate sprint
# after first-Friday observation lands clean.
# Chained after Applier success. Reads the live cycle's interpret-latest.json
# + chains-latest.json + apply-latest.json, plus prior N cycles' archives,
# and produces drift-register-YYYY-MM-DD.json + drift-register-latest.json.
# LLM-FREE — deterministic drift detection (design F2). Four typed triggers
# (T1–T4) at advisory severity only (F5). Non-blocking (F6). Topology mirrors
# AGM curator.
#
# ESA T2 note: tracked_predicates intentionally empty in metadata.yml — to be
# populated in a follow-up sprint after first material cycle observation.

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["European Strategic Autonomy Monitor Applier"]
    types:
      - completed

jobs:
  curate:
    # Gate: only run if upstream applier actually succeeded.
    # workflow_dispatch runs always pass this guard.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main
          # Curator needs prior cycle history to compute T1/T4 windows.
          # Fetch full history so interpret-YYYY-MM-DD.json / chains-*.json
          # archives from prior cycles are available.
          fetch-depth: 0

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/european-strategic-autonomy
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      # The engine reads bespoke metadata.yml via paths resolved relative
      # to CWD (public-main root). Stage the internal checkout's metadata
      # there. §15 IP boundary preserved — it is never committed back.
      # No prompt/schema staging (LLM-free).
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/european-strategic-autonomy
          cp -v internal/pipeline/monitors/european-strategic-autonomy/metadata.yml \
                pipeline/monitors/european-strategic-autonomy/

      # Skip-on-missing guard. Curator needs apply-latest.json + interpret-latest.json.
      - name: Check upstream artefacts
        id: check
        run: |
          A="pipeline/monitors/european-strategic-autonomy/applied/apply-latest.json"
          I="pipeline/monitors/european-strategic-autonomy/synthesised/interpret-latest.json"
          MISSING=""
          [ -f "$A" ] || MISSING="${MISSING} apply-latest"
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Curator."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run ESA curator (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:       ${{ github.workspace }}
          monitor:         european-strategic-autonomy
          PYTHONPATH:      internal
          CURATOR_RUN_ID:  ${{ github.event.workflow_run.id }}
          GITHUB_SHA:      ${{ github.sha }}
        run: python -m pipeline.engine.curator_base --monitor european-strategic-autonomy

      - name: Commit curator output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/european-strategic-autonomy/curator/
          git diff --cached --quiet || git commit -m "chore(esa): curator run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
