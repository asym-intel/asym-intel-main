name: "Environmental Risks Monitor Interpreter"
# Sprint CD — thin caller. Reusable body: _reusable-interpreter.yml
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Operator override (optional; blank = defer to metadata + central model_routing.yml)'
        required: false
        default: ''
      weekly-file:
        description: 'Override weekly bundle filename. Empty = use weekly-latest.json.'
        required: false
        default: ''
      force:
        description: 'Bypass E5 same-day guard.'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force-reason:
        required: false
        default: ''
      force-ad:
        required: false
        default: ''
      force-operator:
        required: false
        default: ''
  workflow_run:
    workflows: ["ERM Reasoner — ERM Earth System Reasoning"]
    types: [completed]
jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-interpreter.yml
    with:
      slug: environmental-risks
      # No default_model: routing owned by pipeline/engine/model_routing.yml.
      model: ${{ inputs.model || '' }}
      weekly_file: ${{ inputs['weekly-file'] || '' }}
      force: ${{ inputs.force || 'false' }}
      force_reason: ${{ inputs['force-reason'] || '' }}
      force_ad: ${{ inputs['force-ad'] || '' }}
      force_operator: ${{ inputs['force-operator'] || '' }}
    secrets: inherit
