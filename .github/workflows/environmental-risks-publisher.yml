name: ERM Publisher — Weekly Report

on:
  # Schedule: Saturday 05:00 UTC (after synthesiser completes)
  # DISABLED until validated — enable by uncommenting the schedule line
  schedule:
    - cron: "30 9 * * 6"    # Saturday 14:00 UTC — final stage, synthesiser at 12:00
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish ERM Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ERM Publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: environmental-risks
        run: python3 pipeline/publishers/publisher.py

      - name: Commit published report
        run: |
          git config user.name "ERM Publisher Bot"
          git config user.email "erm-publisher@asym-intel.info"
          git add static/monitors/environmental-risks/data/
          git add docs/monitors/environmental-risks/data/
          git add content/monitors/environmental-risks/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(erm): Issue $(python3 -c 'import json; print(json.load(open(\"static/monitors/environmental-risks/data/report-latest.json\"))[\"meta\"][\"issue\"])') published by ERM Publisher Bot"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
