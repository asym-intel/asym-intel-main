name: "FIM Curator"
# BX-3 — thin caller. Reusable body: _reusable-curator.yml
# AD-2026-05-14-SPRINT-3-BX-READER-IMPACT-BATCH.
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass curator same-day / re-emit guards. Requires force-reason, force-ad, force-operator.'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force-reason:
        description: 'Justification (required when force=true). Logged to AD trail.'
        required: false
        default: ''
      force-ad:
        description: 'Architectural Decision authorising the force-reissue.'
        required: false
        default: ''
      force-operator:
        description: 'Operator handle authorising the force-reissue.'
        required: false
        default: ''
  workflow_run:
    workflows: ["FIM Applier"]
    types:
      - completed

jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-curator.yml
    with:
      slug: financial-integrity
      slug_abbr: fim
      applier_workflow_name: "FIM Applier"
      force: ${{ inputs.force || 'false' }}
      force_reason: ${{ inputs['force-reason'] || '' }}
      force_ad: ${{ inputs['force-ad'] || '' }}
      force_operator: ${{ inputs['force-operator'] || '' }}
    secrets: inherit
