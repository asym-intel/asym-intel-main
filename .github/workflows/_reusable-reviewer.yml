name: "_reusable-reviewer"
# Reusable reviewer workflow — called by 8 per-monitor thin callers.
# Sprint CD, AD-2026-05-03-CD.
#
# Doctrine: ANTHROPIC_API_KEY is intentionally NOT passed to the reviewer.
# Reviewer stays on Sonar (PPLX) per D1 §7.1. Do not add it to env: here
# or in any thin caller.

on:
  workflow_call:
    inputs:
      slug:
        description: 'Monitor slug (e.g. ai-governance, financial-integrity)'
        type: string
        required: true
      model:
        description: 'Reviewer model override. Empty = use metadata.yml default.'
        type: string
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (rule engine only). "1" to enable.'
        type: string
        required: false
        default: ''
    secrets:
      ASYM_INTEL_PIPELINE:
        required: true
      PPLX_API_KEY:
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/${{ inputs.slug }}
          sparse-checkout-cone-mode: false

      - name: Derive slug-to-identity mapping
        id: slug_map
        run: |
          case "${{ inputs.slug }}" in
            ai-governance)               SLUG_ID="AGM" ;;
            financial-integrity)         SLUG_ID="FIM" ;;
            fimi-cognitive-warfare)      SLUG_ID="FCW" ;;
            european-strategic-autonomy) SLUG_ID="ESA" ;;
            democratic-integrity)        SLUG_ID="WDM" ;;
            macro-monitor)               SLUG_ID="GMM" ;;
            environmental-risks)         SLUG_ID="ERM" ;;
            conflict-escalation)         SLUG_ID="SCEM" ;;
            advennt)                     SLUG_ID="ADV" ;;
            *) echo "Unknown slug: ${{ inputs.slug }}"; exit 1 ;;
          esac
          echo "slug_id=${SLUG_ID}" >> "$GITHUB_OUTPUT"

      - name: Fetch identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
          SLUG_ID: ${{ steps.slug_map.outputs.slug_id }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-${SLUG_ID}.md" \
            -o "docs/identity/${SLUG_ID,,}-identity.md" \
            && echo "Identity card fetched ($(wc -c < "docs/identity/${SLUG_ID,,}-identity.md") bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          mkdir -p "pipeline/monitors/${SLUG}"
          cp -v "internal/pipeline/monitors/${SLUG}/metadata.yml"          "pipeline/monitors/${SLUG}/"
          cp -v "internal/pipeline/monitors/${SLUG}/reviewer-prompt.txt"   "pipeline/monitors/${SLUG}/"
          cp -v "internal/pipeline/monitors/${SLUG}/reviewer-schema.json"  "pipeline/monitors/${SLUG}/"

      - name: Check upstream interpret output
        id: check
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          INTERPRET_PATH="pipeline/monitors/${SLUG}/synthesised/interpret-latest.json"
          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Reviewer."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run reviewer (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          PPLX_API_KEY:      ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:          ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:         ${{ github.workspace }}
          REVIEW_MODEL:      ${{ inputs.model }}
          REVIEWER_NO_LLM:   ${{ inputs.no_llm }}
          PYTHONPATH:        internal
        run: python -m pipeline.engine.review_base --monitor ${{ inputs.slug }}

      - name: Commit review output
        if: steps.check.outputs.skip != 'true'
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add "pipeline/monitors/${SLUG}/synthesised/"
          git diff --cached --quiet || git commit -m "chore(${SLUG}): reviewer run $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
