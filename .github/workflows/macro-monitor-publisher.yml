name: GMM Publisher — Weekly Report

on:
  # Schedule: Tuesday 08:00 UTC (after synthesiser completes)
  workflow_dispatch:          # manual trigger for testing

jobs:
  publish:
    name: Publish GMM Weekly Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run GMM Publisher
        id: run_publisher
        env:
          REPO_ROOT: ${{ github.workspace }}
          MONITOR_SLUG: macro-monitor
        run: |
          python3 pipeline/publishers/publisher.py
          ISSUE=$(python3 -c 'import json; print(json.load(open("static/monitors/macro-monitor/data/report-latest.json"))["meta"]["issue"])')
          echo "issue_number=$ISSUE" >> $GITHUB_OUTPUT


      - name: Pre-publication integrity gate
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Fetch integrity_sweep.py from internal repo (engine IP boundary — tool stays internal)
          gh api /repos/asym-intel/asym-intel-internal/contents/ops/integrity_sweep.py \
            --jq '.content' | base64 -d > /tmp/integrity_sweep.py
          # Run pre-publication gate — hard-fail on C1,C2,C3,C4,C5,C6,C10; warn on C7,C9; skip C8
          python3 /tmp/integrity_sweep.py \
            --local $GITHUB_WORKSPACE \
            --monitor macro-monitor \
            --output /tmp/integrity-sweeps
          # Exit code 1 blocks the commit step below

      - name: Commit published report
        run: |
          git config user.name "GMM Publisher Bot"
          git config user.email "gmm-publisher@asym-intel.info"
          git add static/monitors/macro-monitor/data/
          git add docs/monitors/macro-monitor/data/
          git add content/monitors/macro-monitor/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data(gmm): Issue ${{ steps.run_publisher.outputs.issue_number }} published by GMM Publisher Bot"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE: cc419b7519eba04ef0dc6a7b851930c7
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "files": [
                "https://asym-intel.info/monitors/macro-monitor/data/report-latest.json",
                "https://asym-intel.info/monitors/macro-monitor/data/report-latest.md"
              ]
            }' | python3 -c "import json,sys; d=json.load(sys.stdin); print('CF purge:', 'ok' if d.get('success') else d.get('errors'))"
