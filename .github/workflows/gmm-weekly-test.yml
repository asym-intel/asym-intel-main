name: TEST — GMM Weekly Research Sample

on:
  workflow_dispatch:

jobs:
  test:
    name: GMM Weekly sonar-pro test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run GMM weekly test
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/monitors/macro-monitor/gmm-weekly-test.py
      - name: Commit test output
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          commit-message: "test(gmm): weekly sonar-pro sample output"
          add-paths: "pipeline/monitors/macro-monitor/weekly/"
          bot-name: "Test Bot"
          bot-email: "test@asym-intel.info"
