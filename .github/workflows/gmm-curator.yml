name: "Global Macro Monitor Curator"

# ── Sprint AM (AD-2026-04-26-AM) — GMM Curator role ──
# Cascade-trio wire for Global Macro Monitor (GMM). Mirrors AGM topology.
# workflow_dispatch only at Sprint AM merge time — cron chaining deferred
# to a separate sprint after first-Friday observation lands clean
# (AD-AM §"What this AD does NOT do" item 6).
# LLM-FREE — deterministic drift detection only (design F2).
# Four typed triggers T1-T4 at advisory severity only (F5).
# Non-blocking by design (F6). Runs on null cycles (F7).
# T2 tracked_predicates LEFT EMPTY for GMM per metadata.yml curator block —
# populate in follow-up sprint once stable-state predicates are catalogued.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass curator same-day / re-emit guards. Requires force-reason, force-ad, force-operator.'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force-reason:
        description: 'Justification (required when force=true). Logged to AD trail and stamped into _meta.force_reissue.'
        required: false
        default: ''
      force-ad:
        description: 'Architectural Decision authorising the force-reissue.'
        required: false
        default: ''
      force-operator:
        description: 'Operator handle authorising the force-reissue.'
        required: false
        default: ''
  workflow_run:
    workflows: ["Global Macro Monitor Applier"]
    types:
      - completed

jobs:
  curate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main
          # Curator needs prior cycle history to compute T1/T4 windows.
          fetch-depth: 0

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/macro-monitor
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/macro-monitor
          cp -v internal/pipeline/monitors/macro-monitor/metadata.yml \
                pipeline/monitors/macro-monitor/

      - name: Check upstream artefacts
        id: check
        run: |
          A="pipeline/monitors/macro-monitor/applied/apply-latest.json"
          I="pipeline/monitors/macro-monitor/synthesised/interpret-latest.json"
          MISSING=""
          [ -f "$A" ] || MISSING="${MISSING} apply-latest"
          [ -f "$I" ] || MISSING="${MISSING} interpret-latest"
          if [ -n "$MISSING" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing:${MISSING}" >> "$GITHUB_OUTPUT"
            echo "Missing upstream artefacts:${MISSING} — skipping Curator."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run GMM curator (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          REPO_ROOT:      ${{ github.workspace }}
          monitor:        macro-monitor
          PYTHONPATH:     internal
          CURATOR_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_SHA:     ${{ github.sha }}
          FORCE_FLAG:     ${{ inputs.force }}
          FORCE_REASON:   ${{ inputs['force-reason'] }}
          FORCE_AD:       ${{ inputs['force-ad'] }}
          FORCE_OPERATOR: ${{ inputs['force-operator'] }}
        run: |
          ARGS=(--monitor macro-monitor)
          if [ "${FORCE_FLAG}" = "true" ]; then
            ARGS+=(--force --force-reason "${FORCE_REASON}" --force-ad "${FORCE_AD}" --force-operator "${FORCE_OPERATOR}")
            echo "::notice::Force-reissue requested: ad=${FORCE_AD} operator=${FORCE_OPERATOR}"
          fi
          python -m pipeline.engine.curator_base "${ARGS[@]}"

      - name: Commit curator output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/macro-monitor/curator/
          git diff --cached --quiet || git commit -m "chore(gmm): curator run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
