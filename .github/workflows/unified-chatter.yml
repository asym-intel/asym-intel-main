name: Unified Chatter — Daily Signal (all monitors)

on:
  workflow_dispatch:

jobs:
  chatter:
    name: Unified Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run Unified Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/chatter/unified-chatter.py
      - name: Commit chatter output
        run: |
          git config user.name "Chatter Bot"
          git config user.email "chatter@asym-intel.info"
          git add static/monitors/*/data/chatter*.json
          git diff --staged --quiet && echo "No chatter output to commit" && exit 0
          git commit -m "data(chatter): unified daily signal — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
