name: Unified Chatter — Daily Signal (all monitors)

on:
  workflow_dispatch:

jobs:
  chatter:
    name: Unified Daily Chatter (sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run Unified Chatter
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: python pipeline/chatter/unified-chatter.py
      - name: Commit chatter output
        uses: ./.github/actions/authenticated-push
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          commit-message: "data(chatter): unified daily signal — $(date -u +%Y-%m-%d)"
          add-paths: "static/monitors/*/data/chatter*.json"
          bot-name: "Chatter Bot"
          bot-email: "chatter@asym-intel.info"
