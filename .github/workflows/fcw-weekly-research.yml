name: FCW Weekly Deep Research

on:
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  research:
    name: FCW Weekly Deep Research (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly deep research
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/fimi-cognitive-warfare/weekly-research.py

      - name: Commit research output
        run: |
          git config user.name  "FCW Research Bot"
          git config user.email "fcw-research@asym-intel.info"
          git pull --rebase --autostash origin main
          git add pipeline/monitors/fimi-cognitive-warfare/weekly/
          git diff --staged --quiet && echo "No research output to commit" && exit 0
          git commit -m "data(fcw-research): weekly deep research — $(date -u +%Y-%m-%d)"
          git push
