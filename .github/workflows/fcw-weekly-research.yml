name: FCW Weekly Deep Research

on:
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  research:
    name: FCW Weekly Deep Research (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      # ── Phase B Step 6 cutover — engine + bespoke config live in internal ──
      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.GH_TOKEN }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/fimi-cognitive-warfare
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml anthropic

      # The engine reads bespoke files via paths like
      # `pipeline/monitors/{slug}/weekly-research-prompt.txt`, resolved
      # relative to the process CWD (public-main root). Stage those files
      # from the internal checkout into the expected public-root path.
      # §15 IP boundary preserved — they are never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/fimi-cognitive-warfare
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/metadata.yml                pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/weekly-research-prompt.txt  pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/domain.md                   pipeline/monitors/fimi-cognitive-warfare/ || true
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/instructions.md             pipeline/monitors/fimi-cognitive-warfare/ || true
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/weekly-research-schema.json pipeline/monitors/fimi-cognitive-warfare/ || true

      - name: Run weekly deep research (engine dispatch)
        env:
          PPLX_API_KEY:      ${{ secrets.PPLX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          PYTHONPATH:        internal
        run: python -m pipeline.engine.weekly_research_base --monitor fimi-cognitive-warfare

      - name: Commit research output
        run: |
          git config user.name  "FCW Research Bot"
          git config user.email "fcw-research@asym-intel.info"
          git pull --rebase --autostash origin main
          # Only stage output dirs — bespoke files in-tree are ephemeral-runtime only
          git add pipeline/monitors/fimi-cognitive-warfare/weekly/
          git diff --staged --quiet && echo "No research output to commit" && exit 0
          git commit -m "data(fcw-research): weekly deep research — $(date -u +%Y-%m-%d)"
          git push

      - name: Archive prompt exchanges to internal repo
        if: always()
        env:
          GH_TOKEN:      ${{ secrets.GH_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python tools/commit_exchange_log.py
