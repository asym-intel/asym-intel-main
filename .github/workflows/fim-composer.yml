name: "FIM Composer"
# Sprint CD — thin caller. Reusable body: _reusable-composer.yml
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override composer model (optional; blank = use metadata.yml default)'
        required: false
        default: ''
  workflow_run:
    workflows: ["FIM Reviewer"]
    types: [completed]
jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-composer.yml
    with:
      slug: financial-integrity
      applier_workflow: fim-applier.yml
      model: ${{ inputs.model || '' }}
    secrets: inherit
