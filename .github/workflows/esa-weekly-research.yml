name: ESA Weekly Deep Research

on:
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  research:
    name: ESA Weekly Deep Research (sonar-pro)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly deep research
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/european-strategic-autonomy/weekly-research.py

      - name: Commit weekly research output
        run: |
          git config user.name  "ESA Weekly Research Bot"
          git config user.email "european-strategic-autonomy-weekly@asym-intel.info"
          git pull --rebase origin main
          git add pipeline/monitors/european-strategic-autonomy/weekly/
          git diff --staged --quiet && echo "No new research to commit" && exit 0
          git commit -m "data(european-strategic-autonomy-weekly): weekly deep research — $(date -u +%Y-%m-%d)"
          git push
