name: "Global Macro Monitor Interpreter"

# ── Sprint AN (AD-2026-04-26-AN) — GMM Interpreter role ──
# Cascade-trio wire for Global Macro Monitor (GMM). Mirrors AGM topology.
# Sprint AN: added workflow_run trigger on GMM Reasoner so cron-dispatched
# runs cascade end-to-end (Reasoner → Interpreter → Reviewer → Composer).
# Sonar-only per D1 §7.1 (no Anthropic env var injection).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override model (default: sonar-pro)'
        required: false
        default: ''
      weekly-file:
        description: 'Override weekly bundle filename (e.g. weekly-2026-05-01.json). Empty = use weekly-latest.json.'
        required: false
        default: ''
  workflow_run:
    workflows: ["GMM Reasoner — Macro Regime Analysis"]
    types:
      - completed

jobs:
  interpret:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.GH_TOKEN }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/macro-monitor
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/macro-monitor
          cp -v internal/pipeline/monitors/macro-monitor/metadata.yml             pipeline/monitors/macro-monitor/
          cp -v internal/pipeline/monitors/macro-monitor/interpreter-prompt.txt   pipeline/monitors/macro-monitor/
          cp -v internal/pipeline/monitors/macro-monitor/interpreter-schema.json  pipeline/monitors/macro-monitor/

      - name: Run GMM interpreter (engine dispatch)
        env:
          PPLX_API_KEY:         ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          REPO_ROOT:            ${{ github.workspace }}
          monitor:              macro-monitor
          SYNTH_MODEL:          ${{ github.event.inputs.model }}
          WEEKLY_FILE_OVERRIDE: ${{ github.event.inputs.weekly-file }}
          PYTHONPATH:           internal
        run: python -m pipeline.engine.interpret_base --monitor macro-monitor

      - name: Commit interpret output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/macro-monitor/synthesised/
          git diff --cached --quiet || git commit -m "chore(gmm): interpreter run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
