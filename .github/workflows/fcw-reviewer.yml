name: "FIMI & Cognitive Warfare Monitor Reviewer"

# ── Sprint AM (AD-2026-04-26-AM) — FCW Reviewer role ──
# Chained after FCW Interpreter success, upstream of Composer. Reads
# interpret-latest.json and produces review-latest.json with a
# deterministic verdict (rule engine R1–R7 in review_base.py) plus
# LLM-advisory notes[]. The Composer downstream honours the verdict.
#
# Independence mechanism: rule_engine_verdict_is_llm_independent — the
# verdict path is LLM-free even when Interpreter and Reviewer share sonar-pro.
# No cron schedule — workflow_dispatch only at Sprint AM merge time.
# No ANTHROPIC_API_KEY — stays on Sonar per D1 §7.1.
#
# Topology mirrors AGM reviewer.yml (Sprint 3 Step 2b, AD-2026-04-23i).
# Paired with asym-intel-internal:pipeline/monitors/fimi-cognitive-warfare/
# cascade-trio artefacts wired in Sprint AM (AD-2026-04-26-AM).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (default: sonar-pro)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (rule engine only) — "1" to enable'
        required: false
        default: ''
  workflow_run:
    workflows: ["FIMI & Cognitive Warfare Monitor Interpreter"]
    types:
      - completed

jobs:
  review:
    # Gate: only run if upstream interpreter actually succeeded.
    # workflow_dispatch runs always pass this guard.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v5
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.GH_TOKEN }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/monitors/fimi-cognitive-warfare
          sparse-checkout-cone-mode: false

      - name: Fetch FCW identity from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/identity

          # Identity card (analytical quality standard — shared across roles)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-FCW.md" \
            -o docs/identity/fcw-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/fcw-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/fimi-cognitive-warfare
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/metadata.yml          pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/reviewer-prompt.txt   pipeline/monitors/fimi-cognitive-warfare/
          cp -v internal/pipeline/monitors/fimi-cognitive-warfare/reviewer-schema.json  pipeline/monitors/fimi-cognitive-warfare/

      - name: Check upstream interpret output
        id: check
        run: |
          INTERPRET_PATH="pipeline/monitors/fimi-cognitive-warfare/synthesised/interpret-latest.json"
          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Reviewer."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run FCW reviewer (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          PPLX_API_KEY:    ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          REPO_ROOT:       ${{ github.workspace }}
          REVIEW_MODEL:    ${{ github.event.inputs.model }}
          REVIEWER_NO_LLM: ${{ github.event.inputs.no_llm }}
          monitor:         fimi-cognitive-warfare
          PYTHONPATH:      internal
        run: python -m pipeline.engine.review_base --monitor fimi-cognitive-warfare

      - name: Commit review output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/fimi-cognitive-warfare/synthesised/
          git diff --cached --quiet || git commit -m "chore(fcw): reviewer run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
