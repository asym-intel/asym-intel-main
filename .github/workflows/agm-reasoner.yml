name: AGM Reasoner — AGM Capability Governance Reasoning

on:
  schedule:
    - cron: "0 20 * * 4"  # Thursday 20:00 UTC (weekly-research Thu 18:00, synthesiser Thu 22:00)
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  reason:
    name: AGM Capability Governance Reasoning (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run reasoner
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/monitors/ai-governance/agm-reasoner.py

      - name: Commit reasoner output
        run: |
          git config user.name  "AGM Reasoner Bot"
          git config user.email "ai-governance-reasoner@asym-intel.info"
          git add pipeline/monitors/ai-governance/reasoner/
          git diff --staged --quiet && echo "No reasoner output to commit" && exit 0
          git commit -m "data(ai-governance-reasoner): pattern reasoning — $(date -u +%Y-%m-%d)"
          git push
