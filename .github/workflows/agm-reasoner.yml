name: AGM Reasoner — AGM Capability Governance Reasoning

on:
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  reason:
    name: AGM Capability Governance Reasoning
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}

      # ── Phase B Step 6 cutover — engine + bespoke config live in internal ──
      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/ai-governance
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch identity card from internal repo
        env:
          GH_TOKEN: ${{ secrets.ASYM_INTEL_PIPELINE }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-AGM.md" \
            -o docs/identity/agm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/agm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      # The engine reads bespoke files via paths resolved relative to CWD
      # (public-main root). Stage the internal checkout's bespoke files there.
      # §15 IP boundary preserved — they are never committed back.
      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/ai-governance
          cp -v internal/pipeline/monitors/ai-governance/metadata.yml            pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/reasoner-prompt.txt     pipeline/monitors/ai-governance/
          cp -v internal/pipeline/monitors/ai-governance/reasoner-instructions.md pipeline/monitors/ai-governance/ || true
          cp -v internal/pipeline/monitors/ai-governance/reasoner-schema.json    pipeline/monitors/ai-governance/ || true

      - name: Run AGM Reasoner (engine dispatch)
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:     ${{ secrets.ASYM_INTEL_PIPELINE }}
          PYTHONPATH:   internal
        run: python -m pipeline.engine.reasoner_base --monitor ai-governance

      - name: Commit reasoner output
        run: |
          git config user.name  "AGM Reasoner Bot"
          git config user.email "ai-governance-reasoner@asym-intel.info"
          git add pipeline/monitors/ai-governance/reasoner/
          git diff --staged --quiet && echo "No reasoner output to commit" && exit 0
          git commit -m "data(ai-governance-reasoner): pattern reasoning — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
