name: FCW Synthesiser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 4"  # Thursday 12:00 UTC — reasoner at 10:00, publisher at 14:00

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests


      - name: Fetch identity card from internal repo
        env:
          INTERNAL_REPO_PAT: ${{ secrets.INTERNAL_REPO_PAT }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${INTERNAL_REPO_PAT}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-FCW.md" \
            -o docs/identity/fcw-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/fcw-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Run FCW Synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        run: |
          python3 pipeline/synthesisers/fcw/fcw-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "FCW Synthesiser Bot"
          git config user.email "fcw-synthesiser@asym-intel.info"
          if git diff --quiet; then
            echo "No changes to commit — synthesis output unchanged."
            exit 0
          fi
          git add pipeline/monitors/fimi-cognitive-warfare/synthesised/
          git commit -m "data(fcw-synthesiser): weekly synthesis $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main
          git push
