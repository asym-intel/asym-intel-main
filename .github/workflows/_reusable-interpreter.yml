name: "_reusable-interpreter"
# Reusable interpreter workflow — called by 8 per-monitor thin callers.
# Sprint CD, AD-2026-05-03-CD.
# DO NOT add workflow_dispatch or workflow_run triggers here.
# DO NOT hardcode any monitor slug. All slug-specific values derive from `inputs.slug`.

on:
  workflow_call:
    inputs:
      slug:
        description: 'Monitor slug (e.g. ai-governance, financial-integrity)'
        type: string
        required: true
      # NOTE: no `default_model` input. Per-monitor interpreter routing is owned
      # by pipeline/engine/model_routing.yml; the workflow layer must not shadow
      # it with a per-caller default. `model` below is an OPERATOR override only.
      model:
        description: 'Operator model override (workflow_dispatch only). Empty = defer to metadata + central registry.'
        type: string
        required: false
        default: ''
      weekly_file:
        description: 'Weekly file override (e.g. weekly-2026-04-10.json). Empty = use weekly-latest.json.'
        type: string
        required: false
        default: ''
      force:
        description: 'Bypass E5 same-day guard. Requires force_reason, force_ad, force_operator.'
        type: boolean
        required: false
        default: false
      force_reason:
        description: 'Justification (required when force=true). Logged to AD trail.'
        type: string
        required: false
        default: ''
      force_ad:
        description: 'Architectural Decision authorising the force-reissue.'
        type: string
        required: false
        default: ''
      force_operator:
        description: 'Operator handle authorising the force-reissue.'
        type: string
        required: false
        default: ''
    secrets:
      # Mode G class-cure (FLEET-2026-05-18-015): split token lanes per
      # canonical TOKEN-REGISTRY.md doctrine. Three lanes:
      #   - CALLER_WRITE_TOKEN: step "Checkout public repo" + step "Push commit"
      #     (NEEDS WRITE on caller repo). Cross-repo callers must map this from
      #     ASYM_ENGINE_PUBLISHER. Same-repo callers using `secrets: inherit`
      #     can omit (legacy ASYM_INTEL_PIPELINE fallback below).
      #   - INTERNAL_READ_TOKEN: step "Checkout internal repo" (sparse) + runtime
      #     GH_TOKEN for gh api reads. READ-only sufficient. Cross-repo callers
      #     must map this from COMPUTER_SHIM_INTERNAL_READ. Same-repo callers
      #     using `secrets: inherit` can omit (legacy ASYM_INTEL_PIPELINE fallback below).
      #   - ASYM_INTEL_PIPELINE: legacy single-token alias. Kept required for
      #     back-compat with `secrets: inherit` same-repo callers in
      #     asym-intel-main. Token-lane discipline cures token-scope-creep
      #     (TOKEN-REGISTRY.md lines 162-174). Removal in next cycle once all
      #     callers migrated. Authority: AD-2026-05-18-MODE-G-TOKEN-LANE-SPLIT.
      CALLER_WRITE_TOKEN:
        required: false
      INTERNAL_READ_TOKEN:
        required: false
      ASYM_INTEL_PIPELINE:
        required: true
      PPLX_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false

jobs:
  interpret:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout public repo (asym-intel-main)
        # Mode G class-cure: WRITE lane. Step 13 (Push commit) reuses the
        # credentials this checkout configures. Prefer CALLER_WRITE_TOKEN
        # (cross-repo callers map this to ASYM_ENGINE_PUBLISHER) and fall
        # back to legacy ASYM_INTEL_PIPELINE for same-repo `secrets: inherit`
        # callers that have not yet migrated.
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CALLER_WRITE_TOKEN || secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        # Mode G class-cure: READ lane (sparse-checkout of asym-intel-internal).
        # Prefer INTERNAL_READ_TOKEN (cross-repo callers map this to
        # COMPUTER_SHIM_INTERNAL_READ — registry doctrine §1: "Default to
        # COMPUTER_SHIM_INTERNAL_READ for any consumer workflow that needs to
        # READ from asym-intel-internal"). Fall back to ASYM_INTEL_PIPELINE.
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.INTERNAL_READ_TOKEN || secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/${{ inputs.slug }}
          sparse-checkout-cone-mode: false

      - name: Derive slug-to-identity mapping
        id: slug_map
        run: |
          case "${{ inputs.slug }}" in
            ai-governance)               SLUG_ID="AGM" ;;
            financial-integrity)         SLUG_ID="FIM" ;;
            fimi-cognitive-warfare)      SLUG_ID="FCW" ;;
            european-strategic-autonomy) SLUG_ID="ESA" ;;
            democratic-integrity)        SLUG_ID="WDM" ;;
            macro-monitor)               SLUG_ID="GMM" ;;
            environmental-risks)         SLUG_ID="ERM" ;;
            conflict-escalation)         SLUG_ID="SCEM" ;;
            advennt)                     SLUG_ID="ADV" ;;
            *) echo "Unknown slug: ${{ inputs.slug }}"; exit 1 ;;
          esac
          echo "slug_id=${SLUG_ID}" >> "$GITHUB_OUTPUT"

      - name: Fetch methodology + identity from internal repo
        # Mode G class-cure: READ lane (curl asym-intel-internal raw contents).
        # Prefer INTERNAL_READ_TOKEN; fall back to ASYM_INTEL_PIPELINE for
        # legacy `secrets: inherit` callers.
        env:
          GH_TOKEN: ${{ secrets.INTERNAL_READ_TOKEN || secrets.ASYM_INTEL_PIPELINE }}
          SLUG: ${{ inputs.slug }}
          SLUG_ID: ${{ steps.slug_map.outputs.slug_id }}
        run: |
          mkdir -p docs/methodology docs/identity

          # Identity card (analytical quality standard)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-${SLUG_ID}.md" \
            -o "docs/identity/${SLUG_ID,,}-identity.md" \
            && echo "Identity card fetched ($(wc -c < "docs/identity/${SLUG_ID,,}-identity.md") bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

          # Methodology (private IP — stays in internal repo)
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/${SLUG}-full.md" \
            -o "docs/methodology/${SLUG}-full.md"
          echo "Methodology fetched ($(wc -c < "docs/methodology/${SLUG}-full.md") bytes)"

          # Addendum (optional — don't fail if absent)
          # Attempt the most common addendum naming conventions; first match wins.
          ADDENDUM_FETCHED=false
          for ADDENDUM_SUFFIX in "-euaiact-2026" "-addendum" "-vdem-2026"; do
            if curl -sf -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/methodology/${SLUG}${ADDENDUM_SUFFIX}.md" \
              -o "docs/methodology/${SLUG}-addendum.md"; then
              echo "Addendum fetched (${ADDENDUM_SUFFIX}) ($(wc -c < "docs/methodology/${SLUG}-addendum.md") bytes)"
              ADDENDUM_FETCHED=true
              break
            fi
          done
          ${ADDENDUM_FETCHED} || echo "No addendum found — continuing without it"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r internal/pipeline/engine/requirements.txt

      - name: Stage bespoke config into expected paths
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          mkdir -p "pipeline/monitors/${SLUG}"
          cp -v "internal/pipeline/monitors/${SLUG}/metadata.yml"            "pipeline/monitors/${SLUG}/"
          cp -v "internal/pipeline/monitors/${SLUG}/interpreter-prompt.txt"  "pipeline/monitors/${SLUG}/"
          cp -v "internal/pipeline/monitors/${SLUG}/interpreter-schema.json" "pipeline/monitors/${SLUG}/"
          cp -v "internal/pipeline/monitors/${SLUG}/synthesiser-domain.md"   "pipeline/monitors/${SLUG}/" || true
          # Engine-v1.0 Jinja2 template path (PR #1046, AD-2026-05-14-BX-PGTR).
          # Stage the shared engine .j2 template AND per-monitor config + output-schema
          # block into the monitor dir so interpret_base.py's prompt_p.parent lookup
          # of monitor-config.yml resolves correctly. Best-effort — `|| true` keeps
          # the workflow green for monitors still on the legacy .txt path.
          # Activation is per-monitor: flip metadata.yml::paths.interpreter_prompt to
          # the .j2 filename in a follow-up sprint. Until then, .txt path is taken.
          cp -v "internal/pipeline/engine/templates/interpreter-prompt.j2"   "pipeline/monitors/${SLUG}/" || true
          cp -v "internal/pipeline/monitors/${SLUG}/monitor-config.yml"      "pipeline/monitors/${SLUG}/" || true
          cp -v "internal/pipeline/monitors/${SLUG}/interpreter-output-schema.txt" "pipeline/monitors/${SLUG}/" || true

      - name: Cure fan_out source-data layout split (FLEET-INBOX Stage 2 Failure Mode E)
        # Class-cure for fan_out path-resolution mismatch in two-repo layouts.
        #
        # Engine `pipeline/engine/metadata.py` derives `_REPO_ROOT` from
        # `Path(__file__).resolve().parent.parent.parent` — in CI this is the
        # sparse-checkout dir `internal/`. `resolve_paths_fanout()` enumerates
        # `enumerate_from.path` against `_REPO_ROOT` (e.g.
        # `internal/pipeline/monitors/advennt/jurisdictions`). Downstream
        # `resolve_paths()` returns RELATIVE path strings that are then
        # `open()`-ed from CWD (= workspace root, ${github.workspace}).
        #
        # For consumers whose jurisdiction/entity data lives in the caller repo
        # (per BT.3 IP boundary: metadata in internal, data in caller) — today
        # advennt is the only such consumer — the engine's fan_out enumeration
        # cannot find the data: it's at workspace-root
        # `pipeline/monitors/${SLUG}/jurisdictions/`, not under `internal/`.
        #
        # Class-cure: when caller-repo fan_out data exists at workspace root
        # AND the engine-rooted location is empty/absent, symlink the latter to
        # the former. Both views (engine-rooted enum + CWD-rooted open) now see
        # the same directory; writes from the interpreter land in the caller
        # checkout naturally; no copy cost; no engine code change required.
        #
        # Monitors without fan_out (FIM/AGM/GMM/WDM/FIMI/ESA/ERM/SCEM today) skip
        # this step harmlessly because the caller-repo jurisdictions dir does
        # not exist for them.
        #
        # Authority: BRIEF-STAGE-2-OPERATOR-SMOKE Mode E (fleet-2026-05-18-0016).
        # Evidence pack: /tmp/fleet-2026-05-18-0016/stage-2-failure-e/evidence-pack.json.
        # Operator approval: 2026-05-18T12:53 CEST.
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          CALLER_JX="pipeline/monitors/${SLUG}/jurisdictions"
          ENGINE_JX="internal/pipeline/monitors/${SLUG}/jurisdictions"
          if [ -d "${CALLER_JX}" ]; then
            CALLER_COUNT=$(find "${CALLER_JX}" -mindepth 1 -maxdepth 1 -type d | wc -l)
            echo "::notice::Mode E class-cure — caller-repo fan_out data detected: ${CALLER_COUNT} entries at ${CALLER_JX}"
            if [ -e "${ENGINE_JX}" ]; then
              echo "::notice::Engine-rooted ${ENGINE_JX} already present — leaving untouched (no symlink needed)"
            else
              mkdir -p "$(dirname "${ENGINE_JX}")"
              # Symlink target is absolute to make it independent of where the
              # symlink is resolved from.
              ln -s "${GITHUB_WORKSPACE}/${CALLER_JX}" "${ENGINE_JX}"
              echo "::notice::Symlinked ${ENGINE_JX} -> ${GITHUB_WORKSPACE}/${CALLER_JX}"
              ls -la "${ENGINE_JX}" | head -3
            fi
          else
            echo "::notice::No caller-repo fan_out data at ${CALLER_JX} — Mode E not triggered for this consumer"
          fi

      - name: Cure caller-repo pipeline/engine shadowing (FLEET-INBOX Stage 2 Failure Mode D)
        # Class-cure for shadowing: if the calling consumer repo carries a legacy
        # `pipeline/engine/__init__.py` at workspace root (e.g. advennt did, post-LIFT-v2
        # tombstone files), Python resolves `pipeline.engine` as a regular package
        # rooted there — shadowing `internal/pipeline/engine/` and breaking
        # `python -m pipeline.engine.run.interpret` with `No module named
        # pipeline.engine.run.interpret`.
        # NOTE: The runner must install pipeline/engine/ dependencies before step.
        # Dispatch is via python -m pipeline.engine.run.interpret (canonical W4.7+).
        #
        # Namespace-package merge (PEP 420) works only when NEITHER portion has
        # `__init__.py`. asym-intel-main's `pipeline/engine/` has no __init__.py,
        # so namespace merge succeeds for commons callers (FIM/AGM/GMM/WDM etc).
        # advennt-style consumer callers carry an __init__.py and fail.
        #
        # Runner workspace is ephemeral. Step 11 (Commit interpret output) only
        # `git add`s pipeline/monitors/${SLUG}/synthesised/, so removing the
        # workspace-root pipeline/engine/ does not affect the commit or the
        # source-of-truth consumer repo. Defensive runner-only mutation.
        #
        # Authority: BRIEF-STAGE-2-OPERATOR-SMOKE Mode D (fleet-2026-05-18-0016).
        # Evidence pack: /tmp/fleet-2026-05-18-0016/stage-2-failure-d/evidence-pack.json.
        run: |
          if [ -d pipeline/engine ]; then
            echo "::notice::Mode D class-cure — removing caller-repo pipeline/engine/ (would shadow internal/pipeline/engine/)"
            ls -la pipeline/engine/ | head -20
            rm -rf pipeline/engine
          else
            echo "::notice::No caller-repo pipeline/engine/ found — Mode D not triggered for this consumer"
          fi

      - name: Run interpreter (engine dispatch)
        # SYNTH_MODEL is set ONLY when the operator passes an explicit `model`
        # via workflow_dispatch. Empty `inputs.model` => SYNTH_MODEL unset =>
        # interpret_base.py resolves model via metadata + pipeline/engine/
        # model_routing.yml (central registry). DO NOT reintroduce a per-caller
        # Sonar default here; it would shadow the registry and reproduce the
        # pre-AD-2026-04-25-AK Step 7 Sonar fallback that the fleet-wide flip
        # to claude-sonnet-4-5 was designed to remove.
        env:
          PPLX_API_KEY:         ${{ secrets.PPLX_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:             ${{ secrets.INTERNAL_READ_TOKEN || secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:            ${{ github.workspace }}
          SYNTH_MODEL:          ${{ inputs.model }}
          WEEKLY_FILE_OVERRIDE: ${{ inputs.weekly_file }}
          FORCE_FLAG:           ${{ inputs.force }}
          FORCE_REASON:         ${{ inputs.force_reason }}
          FORCE_AD:             ${{ inputs.force_ad }}
          FORCE_OPERATOR:       ${{ inputs.force_operator }}
          PYTHONPATH:           internal
        run: |
          ARGS=(--monitor ${{ inputs.slug }})
          if [ "${FORCE_FLAG}" = "true" ]; then
            ARGS+=(--force --force-reason "${FORCE_REASON}" --force-ad "${FORCE_AD}" --force-operator "${FORCE_OPERATOR}")
            echo "::notice::Force-reissue requested: ad=${FORCE_AD} operator=${FORCE_OPERATOR}"
          fi
          python -m pipeline.engine.run.interpret "${ARGS[@]}"

      - name: Commit interpret output
        # Metadata-driven git add: post-AT canonicalisation, the canonical
        # interpreter output directory is `paths.interpreter_out_dir` in each
        # monitor's metadata.yml (read by pipeline/engine/interpret_base.py via
        # _require_path). Pre-cure this step hardcoded
        # `pipeline/monitors/${SLUG}/synthesised/`, which matched
        # FIM/AGM/GMM/WDM/FIMI/ESA/ERM/SCEM but mismatched advennt
        # (`pipeline/monitors/{slug}/jurisdictions`). On advennt the git add
        # exited 128 with `pathspec ... did not match any files`. For FIM-class
        # the bug was latent — `git diff --cached --quiet` short-circuits when
        # nothing was added, masking the missing path until a real commit was
        # needed.
        #
        # Class-cure: resolve `paths.interpreter_out_dir` from
        # `internal/pipeline/monitors/${SLUG}/metadata.yml` (or
        # `fan_out.interpreter_out_dir` for fan_out monitors), substitute
        # `{slug}`, and git add that path. Falls back to `synthesised/` if no
        # metadata is found or the key is absent, preserving prior behaviour.
        #
        # Authority: BRIEF-STAGE-2-OPERATOR-SMOKE Mode F (fleet-2026-05-18-0016).
        # Evidence pack: /tmp/fleet-2026-05-18-0016/stage-2-failure-f/evidence-pack.json.
        # Operator approval: 2026-05-18T13:05 CEST (F1).
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"

          META="internal/pipeline/monitors/${SLUG}/metadata.yml"
          OUT_DIR=""
          if [ -f "${META}" ]; then
            # Prefer fan_out.interpreter_out_dir (per-fragment out_dir) when present;
            # else paths.interpreter_out_dir (single-monitor canonical key);
            # else legacy paths.synthesiser_out_dir (pre-rename alt_key in interpret_base.py).
            OUT_DIR="$(python3 -c '
          import os, sys, yaml
          slug = os.environ["SLUG"]
          meta_path = f"internal/pipeline/monitors/{slug}/metadata.yml"
          try:
              with open(meta_path) as f:
                  m = yaml.safe_load(f) or {}
          except Exception:
              sys.exit(0)
          fan_out = (m.get("fan_out") or {})
          paths = (m.get("paths") or {})
          for candidate in (fan_out.get("interpreter_out_dir"),
                            paths.get("interpreter_out_dir"),
                            paths.get("synthesiser_out_dir")):
              if candidate:
                  print(candidate.replace("{slug}", slug))
                  break
          ')"
          fi
          if [ -z "${OUT_DIR}" ]; then
            OUT_DIR="pipeline/monitors/${SLUG}/synthesised"
            echo "::notice::Mode F cure — no interpreter_out_dir in metadata.yml; falling back to ${OUT_DIR}"
          else
            echo "::notice::Mode F cure — interpreter_out_dir resolved to ${OUT_DIR}"
          fi

          # Trailing slash so git add treats it as a directory; harmless on files.
          git add "${OUT_DIR%/}/" || {
            echo "::warning::git add ${OUT_DIR%/}/ failed (path may not exist); falling back to synthesised/"
            git add "pipeline/monitors/${SLUG}/synthesised/" || true
          }
          git diff --cached --quiet || git commit -m "chore(${SLUG}): interpreter run $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
