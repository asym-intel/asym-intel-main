name: "Global Macro Monitor Reviewer"

# ── Sprint AN (AD-2026-04-26-AN) — GMM Reviewer role ──
# Cascade-trio wire for Global Macro Monitor (GMM). Mirrors AGM topology.
# Sprint AN: added workflow_run trigger on GMM Interpreter so cron-dispatched
# runs cascade end-to-end (Reasoner → Interpreter → Reviewer → Composer).
# Sonar-only per D1 §7.1 (no Anthropic env var injection).
# Independence mechanism: rule_engine_verdict_is_llm_independent = true
# (verdict path is LLM-free per review_base.py R1-R7 rule engine).

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (optional; blank = use metadata.yml default)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (rule engine only) — "1" to enable'
        required: false
        default: ''
  workflow_run:
    workflows: ["Global Macro Monitor Interpreter"]
    types:
      - completed

jobs:
  review:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public repo (asym-intel-main)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          ref: main

      - name: Checkout internal repo (engine + bespoke config)
        uses: actions/checkout@v6
        with:
          repository: asym-intel/asym-intel-internal
          token: ${{ secrets.ASYM_INTEL_PIPELINE }}
          path: internal
          sparse-checkout: |
            pipeline/engine
            pipeline/policy
            pipeline/monitors/macro-monitor
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Stage bespoke config into expected paths
        run: |
          mkdir -p pipeline/monitors/macro-monitor
          cp -v internal/pipeline/monitors/macro-monitor/metadata.yml          pipeline/monitors/macro-monitor/
          cp -v internal/pipeline/monitors/macro-monitor/reviewer-prompt.txt   pipeline/monitors/macro-monitor/
          cp -v internal/pipeline/monitors/macro-monitor/reviewer-schema.json  pipeline/monitors/macro-monitor/

      - name: Check upstream interpret output
        id: check
        run: |
          INTERPRET_PATH="pipeline/monitors/macro-monitor/synthesised/interpret-latest.json"
          if [ ! -f "$INTERPRET_PATH" ]; then
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=missing-interpret-latest" >> "$GITHUB_OUTPUT"
            echo "No interpret-latest.json found — skipping Reviewer."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run GMM reviewer (engine dispatch)
        if: steps.check.outputs.skip != 'true'
        env:
          PPLX_API_KEY:    ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN:        ${{ secrets.ASYM_INTEL_PIPELINE }}
          REPO_ROOT:       ${{ github.workspace }}
          monitor:         macro-monitor
          REVIEW_MODEL:    ${{ github.event.inputs.model }}
          REVIEWER_NO_LLM: ${{ github.event.inputs.no_llm }}
          PYTHONPATH:      internal
        run: python -m pipeline.engine.review_base --monitor macro-monitor

      - name: Commit review output
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/macro-monitor/synthesised/
          git diff --cached --quiet || git commit -m "chore(gmm): reviewer run $(date -u +%Y-%m-%d)"
          # Retry loop guards against concurrent bot pushes losing this stage's
          # output: a successful rebase can still be followed by a push race.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
