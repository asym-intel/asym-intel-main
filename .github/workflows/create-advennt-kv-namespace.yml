name: Create ADMIN_PACKETS KV namespace (one-shot, Session E PR1)

on:
  workflow_dispatch:

jobs:
  create-kv:
    name: Create KV namespaces
    runs-on: ubuntu-latest
    steps:
      - name: Verify token + create prod namespace
        id: kv_prod
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          # First verify token is valid
          VERIFY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "Token verify: $VERIFY"

          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"title":"ADMIN_PACKETS"}')
          echo "Create response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success'))" 2>/dev/null)
          if [ "$SUCCESS" = "True" ]; then
            KV_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['id'])")
            echo "prod_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "PROD ID: $KV_ID"
          else
            # Fallback: list and find existing
            LIST=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
            echo "List response: $LIST"
            KV_ID=$(echo "$LIST" | python3 -c "
import sys,json
d=json.load(sys.stdin)
ns=[r for r in (d.get('result') or []) if r.get('title')=='ADMIN_PACKETS']
print(ns[0]['id'] if ns else 'NOT_FOUND')
")
            echo "prod_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "PROD ID (from list): $KV_ID"
          fi

      - name: Create preview namespace
        id: kv_preview
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"title":"ADMIN_PACKETS_preview"}')
          echo "Create response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success'))" 2>/dev/null)
          if [ "$SUCCESS" = "True" ]; then
            KV_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['id'])")
            echo "preview_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "PREVIEW ID: $KV_ID"
          else
            LIST=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
            KV_ID=$(echo "$LIST" | python3 -c "
import sys,json
d=json.load(sys.stdin)
ns=[r for r in (d.get('result') or []) if r.get('title')=='ADMIN_PACKETS_preview']
print(ns[0]['id'] if ns else 'NOT_FOUND')
")
            echo "preview_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "PREVIEW ID (from list): $KV_ID"
          fi

      - name: Summary
        run: |
          echo "=== wrangler.toml block ==="
          echo "[[kv_namespaces]]"
          echo "binding = \"ADMIN_PACKETS\""
          echo "id = \"${{ steps.kv_prod.outputs.prod_id }}\""
          echo "preview_id = \"${{ steps.kv_preview.outputs.preview_id }}\""
