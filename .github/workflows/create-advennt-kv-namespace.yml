name: Create ADMIN_PACKETS KV namespace (one-shot, Session E PR1)

on:
  workflow_dispatch:

jobs:
  create-kv:
    name: Create KV namespaces
    runs-on: ubuntu-latest
    steps:
      - name: Create namespaces and output IDs
        id: kv
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          VERIFY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "Token verify: $VERIFY"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" -d '{"title":"ADMIN_PACKETS"}' > /tmp/prod.json
          echo "Prod create: $(cat /tmp/prod.json)"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces" -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" -d '{"title":"ADMIN_PACKETS_preview"}' > /tmp/prev.json
          echo "Preview create: $(cat /tmp/prev.json)"
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces?per_page=100" -H "Authorization: Bearer ${CF_API_TOKEN}" > /tmp/list.json
          echo "List: $(cat /tmp/list.json)"
          python3 - <<'PYEOF'
          import json
          with open('/tmp/list.json') as f:
              data = json.load(f)
          ns = {r['title']: r['id'] for r in (data.get('result') or [])}
          prod = ns.get('ADMIN_PACKETS', 'NOT_FOUND')
          prev = ns.get('ADMIN_PACKETS_preview', 'NOT_FOUND')
          print(f'prod_id={prod}')
          print(f'preview_id={prev}')
          print('=== wrangler.toml block ===')
          print('[[kv_namespaces]]')
          print('binding = "ADMIN_PACKETS"')
          print(f'id = "{prod}"')
          print(f'preview_id = "{prev}"')
          with open('/tmp/kv_ids.env', 'w') as f:
              f.write(f'prod_id={prod}\npreview_id={prev}\n')
          PYEOF
          cat /tmp/kv_ids.env >> $GITHUB_OUTPUT
