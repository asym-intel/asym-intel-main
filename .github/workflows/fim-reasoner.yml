name: FIM Reasoner — Financial Integrity Risk Analysis
# Thin-caller — delegates body to _reusable-reasoner.yml.
# Sprint-2 G-REASONER-REUSABLE (PR #319). BX-3 prerequisite.
# Precedent: #318 publisher pattern, #316 G-NORMALISE-FORCE-TYPE.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-run override (skip freshness guards)'
        type: boolean
        required: false
        default: false
      force_reason:
        description: 'Required when force=true. 20-500 chars.'
        type: string
        required: false
        default: ''

jobs:
  reason:
    name: FIM Financial Integrity Reasoning
    uses: ./.github/workflows/_reusable-reasoner.yml
    with:
      slug: financial-integrity
      force: ${{ inputs.force || false }}
      force_reason: ${{ inputs.force_reason || '' }}
    secrets:
      ASYM_INTEL_PIPELINE: ${{ secrets.ASYM_INTEL_PIPELINE }}
      PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
