name: FIM Reasoner — Financial Integrity Architecture Analysis

on:
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  reason:
    name: FIM Financial Integrity Reasoning (sonar-pro)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch identity card from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-FIM.md" \
            -o docs/identity/fim-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/fim-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Run FIM Reasoner
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/financial-integrity/fim-reasoner.py

      - name: Commit reasoner output
        run: |
          git config user.name  "FIM Reasoner Bot"
          git config user.email "fim-reasoner@asym-intel.info"
          git add pipeline/monitors/financial-integrity/reasoner/
          git diff --staged --quiet && echo "No reasoner output to commit" && exit 0
          git commit -m "data(fim-reasoner): financial integrity analysis — $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            git push && break
            echo "Push attempt $attempt/3 failed — retrying in ${attempt}0s..."
            sleep $((attempt * 10))
          done
