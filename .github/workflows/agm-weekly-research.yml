# Thin caller — Phase 4 class fix per BRIEF §11. Logic lives in _reusable-weekly-research.yml.
name: AGM Weekly Deep Research
on:
  workflow_dispatch:
    inputs:
      force: { type: boolean, default: false }
      force_reason: { type: string }
      force_ad: { type: string }
      force_operator: { type: string }
permissions:
  contents: write
jobs:
  research:
    uses: ./.github/workflows/_reusable-weekly-research.yml
    secrets: inherit
    with:
      slug: ai-governance
      bot_name: "AGM Weekly Research Bot"
      bot_email: "ai-governance-weekly@asym-intel.info"
      commit_scope: "ai-governance-weekly"
      force: ${{ inputs.force || false }}
      force_reason: ${{ inputs.force_reason || '' }}
      force_ad: ${{ inputs.force_ad || '' }}
      force_operator: ${{ inputs.force_operator || '' }}
