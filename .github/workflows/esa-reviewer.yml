name: "European Strategic Autonomy Monitor Reviewer"
# Sprint CD — thin caller. Reusable body: _reusable-reviewer.yml
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Override reviewer model (optional)'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call — "1" to enable'
        required: false
        default: ''
  workflow_run:
    workflows: ["European Strategic Autonomy Monitor Interpreter"]
    types: [completed]
jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_reusable-reviewer.yml
    with:
      slug: european-strategic-autonomy
      model: ${{ inputs.model || '' }}
      no_llm: ${{ inputs.no_llm || '' }}
    secrets: inherit
