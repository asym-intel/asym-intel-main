name: "AI Governance Monitor Synthesiser"

on:
  schedule:
    - cron: "0 22 * * 4"  # Thursday 22:00 UTC
  workflow_dispatch:

jobs:
  synthesise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run AGM synthesiser
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          python pipeline/synthesisers/agm/ai-governance-synthesiser.py

      - name: Commit synthesis output
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@asym-intel.info"
          git add pipeline/monitors/ai-governance/synthesised/
          git diff --cached --quiet || git commit -m "chore(agm): synthesiser run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
