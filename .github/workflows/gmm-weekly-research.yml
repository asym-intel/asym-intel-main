name: GMM Weekly Deep Research

on:
  schedule:
    - cron: "0 16 * * 1"  # Monday 16:00 UTC (synthesiser fires Mon 20:00)
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  research:
    name: GMM Weekly Deep Research (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly deep research
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/macro-monitor/weekly-research.py

      - name: Commit research output
        run: |
          git config user.name  "GMM Research Bot"
          git config user.email "gmm-research@asym-intel.info"
          git add pipeline/monitors/macro-monitor/weekly/
          git diff --staged --quiet && echo "No research output to commit" && exit 0
          git commit -m "data(gmm-research): weekly deep research — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
