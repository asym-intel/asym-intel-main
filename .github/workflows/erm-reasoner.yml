name: ERM Reasoner — ERM Earth System Reasoning

on:
  schedule:
    - cron: "30 8 * * 6"  # Saturday 10:00 UTC — research at 08:00, synthesiser at 12:00
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  reason:
    name: ERM Earth System Reasoning (sonar-deep-research)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch identity card from internal repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p docs/identity
          curl -sf -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/asym-intel/asym-intel-internal/contents/identities/IDENTITY-ERM.md" \
            -o docs/identity/erm-identity.md \
            && echo "Identity card fetched ($(wc -c < docs/identity/erm-identity.md) bytes)" \
            || echo "WARNING: Identity card not found — continuing without it"

      - name: Run reasoner
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python pipeline/monitors/environmental-risks/erm-reasoner.py

      - name: Commit reasoner output
        run: |
          git config user.name  "ERM Reasoner Bot"
          git config user.email "environmental-risks-reasoner@asym-intel.info"
          git add pipeline/monitors/environmental-risks/reasoner/
          git diff --staged --quiet && echo "No reasoner output to commit" && exit 0
          git commit -m "data(environmental-risks-reasoner): pattern reasoning — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
