    /* ============================================================
       TRIAGE STRIP COMPONENT — Shared across 7 monitor dashboards
       Classes prefixed .triage- for base.css integration

       ============================================================ */

    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap');

    /* ─── Triage Strip Container ───────────────────────────── */
    .triage-strip {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-4);
      padding: var(--space-4);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      overflow-x: clip;
      font-family: var(--font-sans, sans-serif);
    }

    /* ─── Triage Zones (4 zones L→R: KPI, Signal, Snapshot, Delta) ── */
    .triage-zone {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      flex: 1;
      min-width: 0; /* Enable flex item text truncation */
    }

    /* ─── Desktop: 4 zones in row (>900px) ──────────────────── */
    @media (min-width: 901px) {
      .triage-zone { flex: 1; }
    }

    /* ─── Tablet: 2 zones per row (600–900px) ───────────────── */
    @media (min-width: 601px) and (max-width: 900px) {
      .triage-zone:nth-child(1) { flex-basis: 50%; } /* KPI */
      .triage-zone:nth-child(2) { flex-basis: 50%; } /* Signal */
      .triage-zone:nth-child(3) { flex-basis: 50%; } /* Snapshot */
      .triage-zone:nth-child(4) { flex-basis: 50%; } /* Delta */
    }

    /* ─── Mobile: Stacked full-width (<600px) ───────────────── */
    @media (max-width: 600px) {
      .triage-zone { flex-basis: 100%; }
    }

    /* ─── 1. KPI ZONE (Large bold metric) ───────────────────── */
    .triage-zone--kpi {
      text-align: center;
      align-items: center;
    }

    .triage-kpi-value {
      font-size: var(--text-3xl);
      font-weight: 700;
      line-height: 1;
      color: var(--color-text);
      margin: 0;
    }

    .triage-kpi-label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.025em;
      margin: 0;
    }

    /* ─── 2. LEAD SIGNAL ZONE ───────────────────────────────── */
    .triage-zone--signal {
      font-size: var(--text-base);
      line-height: 1.4;
    }

    .triage-signal-headline {
      font-weight: 500;
      color: var(--color-text);
      margin: 0;
      hyphens: auto;
    }

    /* ─── 3. STRUCTURAL SNAPSHOT ZONE ───────────────────────── */
    .triage-zone--snapshot {
      align-items: flex-start;
    }

    .triage-snapshot-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .triage-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 500;
      background: var(--color-bg);
      color: var(--color-text);
      white-space: nowrap;
    }

    /* Severity chip variants */
    .triage-chip.severity-badge--critical   { background: var(--critical-bg);   color: var(--critical);   border-color: var(--critical);   }
    .triage-chip.severity-badge--high       { background: var(--high-bg);       color: var(--high);       border-color: var(--high);       }
    .triage-chip.severity-badge--moderate   { background: var(--moderate-bg);   color: var(--moderate);   border-color: var(--moderate);   }
    .triage-chip.severity-badge--positive   { background: var(--positive-bg);   color: var(--positive);   border-color: var(--positive);   }
    .triage-chip.severity-badge--contested  { background: var(--contested-bg);  color: var(--contested);  border-color: var(--contested);  }
    .triage-chip.severity-badge--watchlist  { background: var(--high-bg);       color: var(--high);       border-color: var(--high);       }
    .triage-chip.severity-badge--recovery   { background: var(--positive-bg);   color: var(--positive);   border-color: var(--positive);   }

    /* ─── 4. DELTA ZONE ─────────────────────────────────────── */
    .triage-zone--delta {
      gap: var(--space-1);
    }

    .triage-delta-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .triage-delta-label {
      color: var(--color-text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    /* Severity badges for delta items */
    .triage-delta-badge.severity-badge--critical   { background: var(--critical-bg);   color: var(--critical);   }
    .triage-delta-badge.severity-badge--high       { background: var(--high-bg);       color: var(--high);       }
    .triage-delta-badge.severity-badge--moderate   { background: var(--moderate-bg);   color: var(--moderate);   }
    .triage-delta-badge.severity-badge--positive   { background: var(--positive-bg);   color: var(--positive);   }

  <!-- ═══════════════════════════════════════════════════════════════
       2. RENDER FUNCTION (self-contained, no dependencies)
       Call: renderTriageStrip(reportLatestJson)
       Handles field variance across monitors + null safety
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    /**
     * RENDER TRIAGE STRIP FROM report-latest.json
     * @param {Object} data - Full report-latest.json payload
     * Handles monitor field variance + null safety
     */
    function renderTriageStrip(data = {}) {
      // 1. KPI ZONE — single most important metric
      const kpiValue = document.querySelector('.triage-kpi-value');
      const kpiLabel = document.querySelector('.triage-kpi-label');
      const kpiData = data.kpi || data.metric || { value: '—', label: 'No data' };
      kpiValue.textContent = kpiData.value || '—';
      kpiLabel.textContent = kpiData.label || 'Loading';

      // 2. LEAD SIGNAL — try multiple field paths
      const signalHeadline = document.querySelector('.triage-signal-headline');
      const headline = data.signal_panel?.headline || 
                      data.signal?.headline || 
                      data.headline || 
                      'No lead signal available';
      signalHeadline.textContent = headline;

      // 3. STRUCTURAL SNAPSHOT — 2-3 status chips
      const snapshotChips = document.querySelector('#triage-snapshot-chips');
      snapshotChips.innerHTML = '';
      const chipsData = data.snapshot || data.status || [];
      chipsData.forEach(chip => {
        const chipEl = document.createElement('div');
        chipEl.className = `triage-chip ${chip.severity ? `severity-badge--${chip.severity}` : ''}`;
        chipEl.textContent = chip.label || chip.text || '—';
        snapshotChips.appendChild(chipEl);
      });

      // 4. DELTA ZONE — 1-2 highest severity items
      const deltaContainer = document.querySelector('#triage-delta');
      deltaContainer.innerHTML = '';
      const deltaData = data.delta_strip || data.deltas || data.alerts || [];
      deltaData.slice(0, 2).forEach(delta => {
        const deltaEl = document.createElement('div');
        deltaEl.className = 'triage-delta-item';
        deltaEl.innerHTML = `
          <span class="triage-delta-badge severity-badge--${delta.severity || 'moderate'}">${delta.severity?.toUpperCase() || '—'}</span>
          <span class="triage-delta-label">${delta.label || delta.title || 'No label'}</span>
        `;
        deltaContainer.appendChild(deltaEl);
      });
    }
  </script>
